<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FFFFFF;--bg2:#F7F7F8;--bg3:#EEEFF1;
--border:#E5E5EA;--border2:#D1D1D6;
--text:#111;--text2:#636366;--text3:#AEAEB2;
--black:#111;--white:#FFF;
--green:#34C759;--red:#FF3B30;--orange:#FF9500;
--gold:#C5970A;--silver:#8E8E93;--bronze:#B5651D;
--r:16px;--r2:12px;--r3:8px;
--sh:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.03);
--sh2:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
}
html,body{
font-family:'Inter',system-ui,-apple-system,sans-serif;
background:var(--bg);color:var(--text);
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
overflow-x:hidden;min-height:100vh;
}
body{padding-bottom:calc(86px + env(safe-area-inset-bottom,0px))}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.afu{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
.asi{animation:scaleIn .35s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.03s}.d2{animation-delay:.06s}.d3{animation-delay:.09s}
.d4{animation-delay:.12s}.d5{animation-delay:.15s}.d6{animation-delay:.18s}
.d7{animation-delay:.21s}.d8{animation-delay:.24s}

/* === BACK === */
.back{
display:inline-flex;align-items:center;gap:5px;
padding:8px 14px 8px 8px;margin-bottom:16px;
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;font-size:13px;font-weight:600;
color:var(--text2);cursor:pointer;
transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.back:active{transform:scale(.96);background:var(--bg3)}
.back svg{width:18px;height:18px}

.page{min-height:100vh;padding:20px 16px 28px}
.ptitle{font-size:28px;font-weight:900;letter-spacing:-.6px;line-height:1.1;margin-bottom:4px}
.psub{font-size:14px;color:var(--text3);margin-bottom:20px;line-height:1.4}

/* === CONTEST ICON — unified premium badge === */
.ci{
width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:var(--bg2);position:relative;overflow:hidden;
}
.ci::after{
content:'';position:absolute;inset:0;
background:linear-gradient(135deg,rgba(0,0,0,.02),transparent 60%);
}
.ci svg{width:32px;height:32px;color:var(--text3);position:relative;z-index:1}

/* === CARD contest — полный редизайн === */
.cc{
background:var(--white);border:1px solid var(--border);
border-radius:var(--r);overflow:hidden;
box-shadow:var(--sh);transition:all .2s;cursor:pointer;
-webkit-tap-highlight-color:transparent;
}
.cc:active{transform:scale(.985);box-shadow:var(--sh2)}
.cc+.cc{margin-top:12px}
.cc-top{display:flex;align-items:stretch}
.cc-icon{
width:76px;min-height:76px;flex-shrink:0;
border-right:1px solid var(--border);
}
.cc-body{
flex:1;padding:14px 16px;min-width:0;
display:flex;flex-direction:column;justify-content:center;
}
.cc-name{
font-size:15px;font-weight:800;letter-spacing:-.2px;
line-height:1.3;margin-bottom:3px;
overflow:hidden;text-overflow:ellipsis;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.cc-ch{font-size:12px;color:var(--text3);font-weight:600}
.cc-foot{
display:flex;align-items:center;gap:14px;
padding:10px 16px;border-top:1px solid var(--border);
background:var(--bg2);font-size:12px;color:var(--text3);font-weight:500;
}
.cc-m{display:flex;align-items:center;gap:4px}
.cc-m svg{width:12px;height:12px;opacity:.55}
.cc-live{
margin-left:auto;display:flex;align-items:center;gap:5px;
font-weight:700;color:var(--green);
}
.cc-live-dot{
width:6px;height:6px;border-radius:3px;
background:var(--green);animation:pulse 2s infinite;
}

/* === GENERIC CARD === */
.card{
background:var(--white);border:1px solid var(--border);
border-radius:var(--r);padding:16px;
box-shadow:var(--sh);transition:all .2s;
}
.card:active{transform:scale(.985)}
.card+.card{margin-top:10px}
.cr{display:flex;align-items:center;gap:12px}
.cb{flex:1;min-width:0}
.ct{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:2px}
.cd{font-size:12px;color:var(--text3);line-height:1.3}

/* Icon box */
.ib{
width:40px;height:40px;border-radius:12px;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ib svg{width:18px;height:18px}
.ib-b{background:var(--black);color:var(--white)}
.ib-s{background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
.ib-34{width:34px;height:34px;border-radius:10px}
.ib-34 svg{width:15px;height:15px}

/* Badges */
.bdg{
display:inline-flex;align-items:center;gap:4px;
padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
letter-spacing:.3px;text-transform:uppercase;
}
.bdg-live{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.bdg-end{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.bdg-pts{
background:var(--black);color:var(--white);
font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;
padding:5px 12px;text-transform:none;letter-spacing:0;
}
.bdg-g{background:#FEF9C3;color:var(--gold);border:1px solid #FDE68A}
.bdg-s{background:#F4F4F5;color:var(--silver);border:1px solid #D4D4D8}
.bdg-b{background:#FFF7ED;color:var(--bronze);border:1px solid #FDBA74}

/* Buttons */
.btn{
display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;padding:14px 22px;border:none;border-radius:var(--r2);
font-family:inherit;font-size:15px;font-weight:700;
cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.975)}
.btn svg{width:18px;height:18px;flex-shrink:0}
.btn-b{background:var(--black);color:var(--white)}
.btn-s{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-r{background:var(--red);color:var(--white)}
.btn-sm{padding:10px 14px;font-size:13px;border-radius:var(--r3)}

/* Fields */
.fld{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.2px}
.fh{font-size:11px;color:var(--text3);margin-top:4px}
.inp{
width:100%;padding:12px 16px;border:1.5px solid var(--border);
border-radius:var(--r2);font-family:inherit;font-size:15px;
background:var(--white);color:var(--text);transition:border-color .2s;
-webkit-appearance:none;
}
.inp:focus{outline:none;border-color:var(--black)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer}

/* Toggle */
.tgl-r{
display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;background:var(--bg2);border-radius:var(--r2);
margin-bottom:8px;border:1px solid var(--border);
}
.tgl-l{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.tgl-l svg{width:18px;height:18px;color:var(--text3)}
.tgl{
position:relative;width:48px;height:28px;
background:var(--border2);border-radius:14px;
cursor:pointer;transition:background .25s;flex-shrink:0;border:none;
}
.tgl.on{background:var(--black)}
.tgl::after{
content:'';position:absolute;top:2px;left:2px;
width:24px;height:24px;border-radius:12px;
background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.15);
transition:transform .25s cubic-bezier(.22,1,.36,1);
}
.tgl.on::after{transform:translateX(20px)}
.tgl-sub{
padding:14px 16px;background:var(--white);
border:1px solid var(--border);border-radius:var(--r2);
margin-bottom:8px;margin-top:-4px;
}
.tgl-sub .fld{margin-bottom:0}

/* Avatar */
.av{
display:flex;align-items:center;justify-content:center;
font-weight:700;color:var(--white);flex-shrink:0;letter-spacing:-.3px;
}
.av-40{width:40px;height:40px;border-radius:20px;font-size:14px}
.av-34{width:34px;height:34px;border-radius:17px;font-size:12px}
.av-56{width:56px;height:56px;border-radius:28px;font-size:20px}
.av-80{width:80px;height:80px;border-radius:24px;font-size:28px}

/* Leaderboard */
.lb{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.li{
display:flex;align-items:center;gap:12px;
padding:14px 16px;cursor:pointer;
transition:background .15s;border-bottom:1px solid var(--border);
}
.li:last-child{border-bottom:none}
.li:active{background:var(--bg2)}
.lr{
width:28px;text-align:center;font-size:14px;font-weight:800;
color:var(--text3);flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.ln{flex:1;min-width:0}
.ln-n{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ln-u{font-size:11px;color:var(--text3);margin-top:1px}
.lp{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.l1{background:#FFFDE7}.l1 .lr{color:var(--gold)}
.l2{background:#FAFAFA}.l2 .lr{color:var(--silver)}
.l3{background:#FFF8F0}.l3 .lr{color:var(--bronze)}
.lm{background:#F0F4FF}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{
text-align:center;padding:18px 10px;
background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border);
}
.sv{font-size:24px;font-weight:900;letter-spacing:-.5px;font-family:'JetBrains Mono',monospace}
.sl{font-size:10px;color:var(--text3);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}

.sec{margin-bottom:20px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-size:18px;font-weight:800;letter-spacing:-.3px}

/* Hero */
.hero{
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:32px 24px;margin-bottom:20px;text-align:center;
}
.hero-i{
width:56px;height:56px;border-radius:16px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
margin:0 auto 14px;box-shadow:0 4px 16px rgba(0,0,0,.12);
}
.hero-i svg{width:24px;height:24px}
.hero-t{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:5px}
.hero-s{font-size:13px;color:var(--text3);line-height:1.5}
.hero-chip{
display:inline-flex;align-items:center;gap:5px;
padding:5px 12px;background:var(--white);border:1px solid var(--border);
border-radius:18px;font-size:12px;font-weight:600;color:var(--text2);margin-top:12px;
}
.hero-chip-dot{width:6px;height:6px;border-radius:3px;background:var(--green);animation:pulse 2s infinite}

/* Referral */
.ref{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
padding:16px;margin-top:14px;
}
.ref-box{
display:flex;align-items:center;gap:8px;
padding:11px 12px;background:var(--white);border:1.5px dashed var(--border2);
border-radius:var(--r2);margin-top:10px;
font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);
word-break:break-all;line-height:1.4;
}
.ref-box span{flex:1}
.ref-cp{
width:36px;height:36px;border-radius:10px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
border:none;cursor:pointer;flex-shrink:0;transition:transform .15s;
}
.ref-cp:active{transform:scale(.9)}
.ref-cp svg{width:15px;height:15px}

/* Prizes */
.pi{
display:flex;align-items:center;gap:10px;
padding:11px 14px;background:var(--bg2);
border-radius:var(--r3);margin-bottom:6px;border:1px solid var(--border);
}
.pn{
width:26px;height:26px;border-radius:13px;
display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:800;flex-shrink:0;
background:var(--bg3);color:var(--text2);
}
.pt{flex:1;font-size:13px;font-weight:600}
.pd{
width:26px;height:26px;border-radius:13px;
display:flex;align-items:center;justify-content:center;
background:var(--bg3);border:none;cursor:pointer;
color:var(--text3);transition:all .15s;
}
.pd:hover{background:var(--red);color:var(--white)}
.pd svg{width:13px;height:13px}

/* Detail header */
.dh{
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:20px;margin-bottom:18px;
}
.dh-ch{
display:inline-flex;align-items:center;gap:4px;
padding:4px 10px;background:var(--white);border:1px solid var(--border);
border-radius:16px;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;
}
.dh-ch svg{width:13px;height:13px}
.dh-n{font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:6px;line-height:1.2}
.dh-d{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:12px}
.dh-m{display:flex;flex-wrap:wrap;gap:6px}
.dh-acts{display:flex;gap:8px;margin-top:14px}

/* Admin card */
.ac{
border:1px solid var(--border);border-radius:var(--r);
padding:16px;margin-bottom:12px;background:var(--white);box-shadow:var(--sh);
}
.ac-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ac-t{font-size:15px;font-weight:800;line-height:1.25}
.ac-s{font-size:12px;color:var(--text3);margin-top:2px}
.ac-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ac-b{
padding:7px 12px;border-radius:var(--r3);
font-size:12px;font-weight:700;border:1px solid var(--border);
background:var(--white);cursor:pointer;transition:all .15s;
display:flex;align-items:center;gap:4px;font-family:inherit;
}
.ac-b:active{transform:scale(.96)}
.ac-b svg{width:13px;height:13px}
.ac-b-r{border-color:#FCA5A5;color:var(--red);background:#FEF2F2}

.sc-r{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.sc{
display:inline-flex;align-items:center;gap:3px;
padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;
}
.sc svg{width:11px;height:11px}
.sc-on{background:#ECFDF5;border:1px solid #A7F3D0;color:#166534}
.sc-off{background:var(--bg2);border:1px solid var(--border);color:var(--text3);text-decoration:line-through}

.toast{
position:fixed;top:16px;left:16px;right:16px;z-index:9999;
padding:14px 18px;border-radius:var(--r2);
font-size:14px;font-weight:700;animation:fadeUp .3s ease;box-shadow:var(--sh2);
}
.toast-ok{background:var(--black);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{
padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;
white-space:nowrap;border:1.5px solid var(--border);
background:var(--white);color:var(--text2);cursor:pointer;
transition:all .15s;flex-shrink:0;
}
.tab.on{background:var(--black);color:var(--white);border-color:var(--black)}

.divider{height:1px;background:var(--border);margin:18px 0}

.notice{
padding:13px 14px;border-radius:var(--r3);
font-size:12px;line-height:1.5;display:flex;gap:8px;align-items:flex-start;
}
.notice svg{width:15px;height:15px;flex-shrink:0;margin-top:1px}
.notice-w{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.notice-i{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}

/* Channel connect */
.ch-connect{
padding:16px;background:var(--bg2);border:1px solid var(--border);
border-radius:var(--r);margin-bottom:16px;
}
.ch-step{
display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;
}
.ch-step:last-child{margin-bottom:0}
.ch-num{
width:28px;height:28px;border-radius:14px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
font-size:12px;font-weight:800;flex-shrink:0;
}
.ch-step-body{flex:1;min-width:0}
.ch-step-t{font-size:13px;font-weight:700;margin-bottom:4px}
.ch-step-d{font-size:12px;color:var(--text3);line-height:1.4}
.ch-btn{
display:inline-flex;align-items:center;gap:6px;
padding:9px 16px;background:var(--black);color:var(--white);
border:none;border-radius:var(--r3);font-family:inherit;
font-size:13px;font-weight:700;cursor:pointer;
margin-top:8px;transition:all .15s;
}
.ch-btn:active{transform:scale(.96)}
.ch-btn svg{width:15px;height:15px}
.ch-status{
display:flex;align-items:center;gap:6px;
padding:8px 12px;border-radius:var(--r3);
font-size:12px;font-weight:700;margin-top:8px;
}
.ch-ok{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.ch-fail{background:#FEF2F2;color:var(--red);border:1px solid #FCA5A5}

/* === TAB BAR — pixel-perfect, no text pixelation === */
.tabbar{
position:fixed;bottom:0;left:0;right:0;
background:rgba(255,255,255,.97);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-top:1px solid var(--border);
display:grid;grid-template-columns:repeat(5,1fr);
padding:0 0 env(safe-area-inset-bottom,0px);z-index:100;
}
.tb{
display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:3px;padding:10px 0 8px;
cursor:pointer;border:none;background:none;
-webkit-tap-highlight-color:transparent;position:relative;
}
.tb svg{width:22px;height:22px;color:var(--text3);transition:color .2s}
.tb-t{
font-size:10px;color:var(--text3);line-height:1;
transition:color .2s;
/* ФИКС ПИКСЕЛЕЙ: фиксированный вес, без изменения при active */
font-weight:600;
letter-spacing:0;
}
.tb.on svg{color:var(--black)}
.tb.on .tb-t{color:var(--black)}
.tb.on::before{
content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
width:28px;height:2.5px;background:var(--black);border-radius:0 0 2px 2px;
}
/* Center */
.tb-c{padding-top:0}
.tb-c-circle{
width:48px;height:48px;border-radius:50%;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
border:3px solid var(--white);
box-shadow:0 2px 14px rgba(0,0,0,.18);
margin-top:-14px;transition:transform .15s;
}
.tb-c-circle:active{transform:scale(.92)}
.tb-c-circle svg{width:24px;height:24px;color:var(--white)!important}
.tb-c .tb-t{margin-top:2px}

/* Profile menu */
.pm{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.pm-i{
display:flex;align-items:center;gap:12px;padding:15px 16px;
cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);
}
.pm-i:last-child{border-bottom:none}
.pm-i:active{background:var(--bg2)}
.pm-b{flex:1;min-width:0}
.pm-t{font-size:14px;font-weight:700}
.pm-d{font-size:12px;color:var(--text3);margin-top:1px}
.pm-a{color:var(--text3)}
.pm-a svg{width:15px;height:15px}

.empty{text-align:center;padding:48px 24px}
.empty-i{width:56px;height:56px;border-radius:16px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-i svg{width:24px;height:24px;color:var(--text3)}

async function loadContests(){
  if(useFirebase){
    try{
      const snap=await db.collection('contests').get();
      contests=[];
      for(const doc of snap.docs){
        const d=doc.data();d.id=doc.id;
        const pSnap=await db.collection('contests').doc(doc.id).collection('participants').get();
        d.participants=pSnap.docs.map(p=>({...p.data(),docId:p.id}));
        contests.push(d);
      }
      if(!contests.length)contests=[...DEMO];
    }catch(e){console.warn(e);contests=[...DEMO]}
  }else{
    contests=[...DEMO];
  }
}

async function saveContest(d){
  d.participants=d.participants||[];
  if(useFirebase){
    try{
      const ref=await db.collection('contests').add({...d,participants:undefined,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      d.id=ref.id;contests.push(d);return d;
    }catch(e){console.warn(e)}
  }
  d.id='c'+Date.now();contests.push(d);return d;
}
async function updateContest(id,upd){
  const c=contests.find(x=>x.id===id);if(!c)return;
  Object.assign(c,upd);
  if(useFirebase){try{await db.collection('contests').doc(id).update(upd)}catch(e){console.warn(e)}}
}
async function deleteContest(id){
  contests=contests.filter(x=>x.id!==id);
  if(useFirebase){try{
    const pSnap=await db.collection('contests').doc(id).collection('participants').get();
    const batch=db.batch();pSnap.forEach(d=>batch.delete(d.ref));
    batch.delete(db.collection('contests').doc(id));await batch.commit();
  }catch(e){console.warn(e)}}
}
async function joinContest(id,user){
  const c=contests.find(x=>x.id===id);if(!c)return;
  if(c.participants.find(p=>p.tgId===user.id))return;
  const p={tgId:user.id,name:user.first_name,username:user.username||'',points:c.initialPoints||0};
  c.participants.push(p);
  if(useFirebase){try{await db.collection('contests').doc(id).collection('participants').add(p)}catch(e){console.warn(e)}}
}

async function tgApi(method,body){
  try{
    const r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    return await r.json();
  }catch(e){console.warn('TG API error:',e);return{ok:false}}
}

// Проверить что бот — админ канала
async function checkBotAdmin(channel){
  const res=await tgApi('getChatAdministrators',{chat_id:channel});
  if(!res.ok)return{botAdmin:false,userAdmin:false};
  const botInfo=await tgApi('getMe',{});
  const botId=botInfo.result?.id;
  const botAdmin=res.result?.some(a=>a.user.id===botId);
  const userAdmin=res.result?.some(a=>a.user.id===tgUser?.id);
  return{botAdmin:!!botAdmin,userAdmin:!!userAdmin};
}

// Пост о создании конкурса
async function sendPost(channel,name,desc,cond,prizes,endDate){
  let text=`<b>🎉 Новый конкурс!</b>\n\n<b>${name}</b>`;
  if(desc)text+=`\n\n${desc}`;
  if(cond)text+=`\n\n<b>Условия:</b> ${cond}`;
  if(prizes?.length)text+=`\n\n<b>Призы:</b>\n${prizes.map((p,i)=>`${i+1}. ${p}`).join('\n')}`;
  if(endDate)text+=`\n\n<b>До:</b> ${new Date(endDate).toLocaleString('ru-RU',{timeZone:'Europe/Moscow'})} МСК`;
  text+=`\n\n<i>Нажмите кнопку ниже для участия</i>`;
  await tgApi('sendMessage',{chat_id:channel,text,parse_mode:'HTML',reply_markup:{inline_keyboard:[[{text:'Участвовать',web_app:{url:MINI_APP_URL}}]]}});
}

// Пост с итогами + кнопка "Посмотреть итоги"
async function sendResultsPost(contest){
  const sorted=[...contest.participants].sort((a,b)=>b.points-a.points);
  const winners=sorted.slice(0,contest.winnersCount||1);
  const medals=['🥇','🥈','🥉'];
  let text=`<b>Конкурс завершён!</b>\n\n<b>${contest.name}</b>\n\n<b>Победители:</b>\n`;
  winners.forEach((w,i)=>{
    const medal=medals[i]||`${i+1}.`;
    text+=`${medal} <b>${w.name}</b>${w.username?` (@${w.username})`:''} — ${w.points} баллов\n`;
  });
  text+=`\n<i>Всего участников: ${contest.participants.length}</i>`;
  const resultsUrl=MINI_APP_URL+(MINI_APP_URL.includes('?')?'&':'?')+'contest='+contest.id;
  await tgApi('sendMessage',{chat_id:contest.channel,text,parse_mode:'HTML',reply_markup:{inline_keyboard:[[{text:'Посмотреть итоги',web_app:{url:resultsUrl}}]]}});
}

const COLORS=['#FF6B6B','#845EF7','#339AF0','#20C997','#FF922B','#F06595','#5C7CFA','#12B886','#E64980','#3BC9DB','#FF8787','#7950F2'];
function avaColor(name){let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function initials(name){const p=name.split(' ');return p.length>1?(p[0][0]+p[1][0]).toUpperCase():(name.slice(0,2).toUpperCase())}
function timeLeft(d){
  const now=Date.now(),end=new Date(d).getTime(),diff=end-now;
  if(diff<=0)return'Завершён';
  const days=Math.floor(diff/864e5),hrs=Math.floor((diff%864e5)/36e5);
  if(days>0)return`${days} дн ${hrs} ч`;
  const mins=Math.floor((diff%36e5)/6e4);
  return`${hrs} ч ${mins} мин`;
}

let toastTimer;
function toast(msg,type='ok'){
  let el=document.getElementById('toast');
  if(el)el.remove();
  el=document.createElement('div');el.id='toast';
  el.className=`toast toast-${type}`;el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.remove(),3000);
}

function rTabBar(){
  const tabs=[
    {id:'home',icon:'home',label:'Главная'},
    {id:'points',icon:'star',label:'Баллы'},
    {id:'create',icon:'plus',label:'Создать',center:true},
    {id:'admin',icon:'settings',label:'Панель'},
    {id:'profile',icon:'user',label:'Профиль'},
  ];
  let h='<div class="tabbar">';
  tabs.forEach(t=>{
    const on=currentScreen===t.id;
    if(t.center){
      h+=`<button class="tb tb-c${on?' on':''}" data-nav="${t.id}">
        <div class="tb-c-circle">${ic(t.icon)}</div>
        <span class="tb-t">${t.label}</span>

    }else{
      h+=`<button class="tb${on?' on':''}" data-nav="${t.id}">
        ${ic(t.icon)}<span class="tb-t">${t.label}</span>
      </button>`;
    }
  });
  h+='</div>';return h;
}

  // Leaderboard
  if(sorted.length){

      <span style="font-size:14px;color:var(--text3);font-weight:600">${sorted.length}</span></div>`;

        <div class="lp">${p.points}</div>
      </div>`;
    });
    h+='</div></div>';
  }

  h+='</div>';return h;

  <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Измените настройки</div>

  <div class="tgl-r"><div class="tgl-l">${ic('users')} Приглашения</div>
    <button type="button" class="tgl${c.scoring?.invites?.on?' on':''}" id="et_inv"></button></div>
  <div class="tgl-sub" id="es_inv" style="display:${c.scoring?.invites?.on?'block':'none'}">
    <div class="fld"><label class="fl">Баллов за друга</label>
      <input class="inp" id="ef_inv" type="number" min="1" value="${c.scoring?.invites?.pts||5}"></div></div>

  <div class="tgl-r"><div class="tgl-l">${ic('heart')} Реакции</div>
    <button type="button" class="tgl${c.scoring?.reactions?.on?' on':''}" id="et_react"></button></div>
  <div class="tgl-sub" id="es_react" style="display:${c.scoring?.reactions?.on?'block':'none'}">
    <div class="fld"><label class="fl">Баллов за реакцию</label>
      <input class="inp" id="ef_react" type="number" min="1" value="${c.scoring?.reactions?.pts||1}"></div></div>

  <div class="tgl-r"><div class="tgl-l">${ic('play')} Реклама</div>
    <button type="button" class="tgl${c.scoring?.ads?.on?' on':''}" id="et_ads"></button></div>
  <div class="tgl-sub" id="es_ads" style="display:${c.scoring?.ads?.on?'block':'none'}">
    <div class="fld"><label class="fl">Баллов за просмотр</label>
      <input class="inp" id="ef_ads" type="number" min="1" value="${c.scoring?.ads?.pts||3}"></div>
    <div class="notice notice-w">${ic('info')} Модуль рекламы в разработке</div></div>

  <div class="divider"></div>
  <button type="submit" class="btn btn-b">${ic('check')} Сохранить</button>
  </form></div>`;
  return h;
}

// ╔══════════════════════════════════════════╗
// ║  СОБЫТИЯ                                  ║
// ╚══════════════════════════════════════════╝
function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>go(el.dataset.nav));
  });
  document.querySelectorAll('[data-go]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      go(el.dataset.go,{id:el.dataset.id});
    });
  });
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      const act=el.dataset.act;
      if(act==='join'){
        await joinContest(el.dataset.id,tgUser);
        toast('Вы участвуете!');
        try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success')}catch(e){}
        render();
      }else if(act==='end'){
        if(confirm('Завершить конкурс досрочно?')){
          const contest=contests.find(x=>x.id===el.dataset.id);
          await updateContest(el.dataset.id,{status:'ended'});
          if(contest)await sendResultsPost(contest);
          toast('Конкурс завершён. Итоги опубликованы в канале.');
          render();
        }
      }else if(act==='delete'){
        if(confirm('Удалить конкурс навсегда?')){
          await deleteContest(el.dataset.id);
          toast('Конкурс удалён');go('admin');
        }
      }else if(act==='copyRef'){
        try{await navigator.clipboard.writeText(el.dataset.ref);toast('Ссылка скопирована!')}
        catch(e){const ta=document.createElement('textarea');ta.value=el.dataset.ref;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Скопировано!')}
        try{window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light')}catch(e){}
      }else if(act==='openUser'){
        if(el.dataset.link)window.open(el.dataset.link,'_blank');
      }
    });
  });

  // Admin tabs filter
  document.querySelectorAll('[data-atab]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('[data-atab]').forEach(t=>t.classList.remove('on'));
      el.classList.add('on');
      const f=el.dataset.atab;
      document.querySelectorAll('[data-filter]').forEach(card=>{
        card.style.display=(f==='all'||card.dataset.filter===f)?'':'none';
      });
    });
  });

  // Outcome type threshold toggle
  const oc=document.getElementById('cf_outcome');
  if(oc)oc.addEventListener('change',()=>{
    const w=document.getElementById('cf_thr_wrap');
    if(w)w.style.display=oc.value==='2'?'block':'none';
  });

  // All toggles
  [['t_inv','s_inv'],['t_react','s_react'],['t_ads','s_ads'],
   ['et_inv','es_inv'],['et_react','es_react'],['et_ads','es_ads']].forEach(([tid,sid])=>{
    const t=document.getElementById(tid),s=document.getElementById(sid);
    if(t&&s)t.addEventListener('click',()=>{t.classList.toggle('on');s.style.display=t.classList.contains('on')?'block':'none'});
  });

  // Add prize
  const pb=document.getElementById('addPrize'),pi=document.getElementById('cf_prize'),pl=document.getElementById('prizes_list');
  if(pb&&pi&&pl){
    pb.addEventListener('click',()=>{
      const v=pi.value.trim();if(!v)return;
      const n=pl.children.length+1;
      const d=document.createElement('div');d.className='pi asi';
      d.innerHTML=`<div class="pn">${n}</div><div class="pt">${v}</div>
        <button type="button" class="pd" onclick="this.parentElement.remove()">${ic('x')}</button>`;
      pl.appendChild(d);pi.value='';pi.focus();
    });
  }

  // Check channel button
  const chBtn=document.getElementById('checkChannel');
  if(chBtn){
    chBtn.addEventListener('click',async()=>{
      const chInp=document.getElementById('cf_ch');
      const statusDiv=document.getElementById('channelStatus');
      let ch=chInp.value.trim();
      if(!ch){toast('Введите @username канала','err');return}
      if(!ch.startsWith('@'))ch='@'+ch;
      chInp.value=ch;
      statusDiv.innerHTML='<div style="padding:8px;font-size:12px;color:var(--text3)">Проверяю...</div>';
      const result=await checkBotAdmin(ch);
      if(result.botAdmin&&result.userAdmin){
        statusDiv.innerHTML=`<div class="ch-status ch-ok">${ic('check')} Бот и вы — администраторы ${ch}. Всё готово!</div>`;
      }else if(result.botAdmin&&!result.userAdmin){
        statusDiv.innerHTML=`<div class="ch-status ch-fail">${ic('x')} Бот есть в ${ch}, но вы не являетесь администратором этого канала</div>`;
      }else{
        statusDiv.innerHTML=`<div class="ch-status ch-fail">${ic('x')} Бот не найден в ${ch}. Сначала добавьте бота как администратора</div>`;
      }
    });
  }

  // Create form submit
  const cf=document.getElementById('cForm');
  if(cf)cf.addEventListener('submit',async e=>{
    e.preventDefault();
    const ch=document.getElementById('cf_ch').value.trim();
    const name=document.getElementById('cf_name').value.trim();
    const endDate=document.getElementById('cf_end').value;
    if(!name){toast('Введите название','err');return}
    if(!ch){toast('Укажите канал','err');return}
    if(!endDate){toast('Укажите дату окончания','err');return}

    // Проверяем канал
    const check=await checkBotAdmin(ch.startsWith('@')?ch:'@'+ch);
    if(!check.botAdmin){toast('Сначала добавьте бота в канал как администратора','err');return}
    if(!check.userAdmin){toast('Вы не являетесь администратором этого канала','err');return}

    const contestData={
      name,
      channel:ch.startsWith('@')?ch:'@'+ch,
      desc:document.getElementById('cf_desc').value.trim(),
      conditions:document.getElementById('cf_cond').value.trim(),
      endDate,status:'active',
      winnersCount:parseInt(document.getElementById('cf_winners').value)||1,
      buttonText:document.getElementById('cf_btn').value.trim()||'Участвовать',
      initialPoints:parseInt(document.getElementById('cf_initpts').value)||0,
      outcomeType:parseInt(document.getElementById('cf_outcome').value)||1,
      threshold:parseInt(document.getElementById('cf_thr')?.value)||0,
      creatorId:tgUser?.id||MAIN_ADMIN_ID,
      scoring:{
        invites:{on:!!document.getElementById('t_inv')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_inv_pts')?.value)||5},
        reactions:{on:!!document.getElementById('t_react')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_react_pts')?.value)||1},
        ads:{on:!!document.getElementById('t_ads')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_ads_pts')?.value)||3},
      },
      prizes:[]
    };
    document.querySelectorAll('#prizes_list .pt').forEach(el=>contestData.prizes.push(el.textContent));

    const saved=await saveContest(contestData);
    if(saved)await sendPost(contestData.channel,contestData.name,contestData.desc,contestData.conditions,contestData.prizes,endDate);

    toast('Конкурс создан и опубликован в канале!');
    try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success')}catch(e){}
    go('home');
  });

  // Edit form submit
  const ef=document.getElementById('eForm');
  if(ef)ef.addEventListener('submit',async e=>{
    e.preventDefault();
    const id=screenParams.id;
    const updates={
      name:document.getElementById('ef_name').value.trim(),
      desc:document.getElementById('ef_desc').value.trim(),
      conditions:document.getElementById('ef_cond').value.trim(),
      scoring:{
        invites:{on:document.getElementById('et_inv')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_inv')?.value)||5},
        reactions:{on:document.getElementById('et_react')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_react')?.value)||1},
        ads:{on:document.getElementById('et_ads')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_ads')?.value)||3},
      }
    };
    await updateContest(id,updates);
    toast('Изменения сохранены');go('detail',{id});
  });
}

// ╔══════════════════════════════════════════╗
// ║  НАВИГАЦИЯ                                ║
// ╚══════════════════════════════════════════╝
function go(screen,params={}){
  currentScreen=screen;screenParams=params;
  render();window.scrollTo({top:0,behavior:'smooth'});
}

function handleDeepLink(){
  const p=new URLSearchParams(window.location.search);
  const cid=p.get('contest');
  if(cid){currentScreen='detail';screenParams={id:cid}}
}

async function init(){
  try{
    const tg=window.Telegram?.WebApp;
    if(tg){tg.ready();tg.expand();tgUser=tg.initDataUnsafe?.user||null}
  }catch(e){}
  if(!tgUser)tgUser={id:MAIN_ADMIN_ID,first_name:'Admin',username:'Tru5tNoBody'};
  await loadContests();
  handleDeepLink();
  render();
}

init();
</script>
</body>
</html>
