<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CONTESTS</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#000;--bg2:#0a0a0a;--bg3:#111;--bg4:#161616;--bg5:#1a1a1a;
--border:#1f1f1f;--border2:#2a2a2a;--border3:#333;
--t1:#fff;--t2:#b0b0b0;--t3:#666;--t4:#444;
--accent:#fff;--accent2:#ccc;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* === NOISE TEXTURE === */
#root::before{
content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
pointer-events:none;z-index:9999
}

/* === GRID PATTERN === */
.grid-bg{
position:fixed;top:0;left:0;width:100%;height:100%;
background-image:
linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
background-size:60px 60px;
pointer-events:none;z-index:0
}

/* === SCAN LINE === */
.scanline{
position:fixed;top:0;left:0;width:100%;height:2px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
animation:scanMove 4s linear infinite;
pointer-events:none;z-index:9998
}
@keyframes scanMove{0%{top:-2px}100%{top:100%}}

/* === SCROLLABLE AREA === */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px 100px;position:relative;z-index:1;
-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:0}

/* === TYPOGRAPHY === */
.h1{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1.1;text-transform:uppercase}
.h2{font-size:22px;font-weight:800;letter-spacing:-0.8px;line-height:1.2;text-transform:uppercase}
.h3{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.mono{font-family:'Space Mono',monospace}
.label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.sub{font-size:13px;color:var(--t2);line-height:1.5}
.sub2{font-size:12px;color:var(--t3);line-height:1.4}

/* === CARDS === */
.card{
background:var(--bg2);
border:1px solid var(--border);
border-radius:16px;
padding:20px;
position:relative;
overflow:hidden;
transition:all .3s cubic-bezier(.4,0,.2,1);
}
.card::before{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
}
.card:active{transform:scale(.98);border-color:var(--border2)}
.card:hover{border-color:var(--border2)}

.card-elevated{
background:linear-gradient(165deg,var(--bg3),var(--bg2));
border-color:var(--border2);
box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.03) inset;
}

/* === GLASS CARD === */
.glass{
background:rgba(255,255,255,.03);
backdrop-filter:blur(40px) saturate(1.2);
-webkit-backdrop-filter:blur(40px) saturate(1.2);
border:1px solid rgba(255,255,255,.06);
}

/* === BUTTONS === */
.btn{
width:100%;padding:16px;border:none;border-radius:12px;
font-family:'Inter',sans-serif;font-size:14px;font-weight:700;
letter-spacing:.5px;text-transform:uppercase;
cursor:pointer;position:relative;overflow:hidden;
transition:all .2s cubic-bezier(.4,0,.2,1);
}
.btn-primary{
background:var(--t1);color:var(--bg);
box-shadow:0 4px 24px rgba(255,255,255,.1);
}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 12px rgba(255,255,255,.05)}
.btn-primary::after{
content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
transition:left .5s;
}
.btn-primary:hover::after{left:100%}

.btn-outline{
background:transparent;color:var(--t1);
border:1px solid var(--border2);
}
.btn-outline:active{background:var(--bg3);transform:scale(.97)}

.btn-ghost{
background:var(--bg3);color:var(--t2);
border:1px solid var(--border);
}

.btn-sm{padding:10px 16px;font-size:12px;border-radius:8px;width:auto}

/* === BADGE === */
.badge{
display:inline-flex;align-items:center;gap:6px;
padding:4px 10px;border-radius:6px;
font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
border:1px solid var(--border2);background:var(--bg3);color:var(--t2);
}
.badge-live{border-color:var(--t1);color:var(--t1)}
.badge-live .dot{width:6px;height:6px;border-radius:50%;background:var(--t1);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* === INPUT === */
.input-group{margin-bottom:16px}
.input-label{display:block;margin-bottom:6px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
.input{
width:100%;padding:14px 16px;
background:var(--bg2);border:1px solid var(--border);border-radius:10px;
color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;
transition:border-color .2s;outline:none;
}
.input:focus{border-color:var(--t3)}
.input::placeholder{color:var(--t4)}
textarea.input{resize:vertical;min-height:80px}
select.input{appearance:none;cursor:pointer}

/* === ICON CONTAINERS === */
.icon-box{
width:44px;height:44px;display:flex;align-items:center;justify-content:center;
border-radius:12px;border:1px solid var(--border2);background:var(--bg3);
flex-shrink:0;
}
.icon-box svg{width:20px;height:20px;stroke:var(--t2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.icon-box-lg{width:56px;height:56px;border-radius:14px}
.icon-box-lg svg{width:26px;height:26px}

/* === TAB BAR === */
.tab-bar{
position:fixed;bottom:0;left:0;right:0;
display:flex;align-items:flex-end;justify-content:space-around;
padding:8px 8px calc(env(safe-area-inset-bottom,8px) + 8px);
background:rgba(0,0,0,.85);
backdrop-filter:blur(40px) saturate(1.5);
-webkit-backdrop-filter:blur(40px) saturate(1.5);
border-top:1px solid var(--border);
z-index:100;
}
.tab{
display:flex;flex-direction:column;align-items:center;gap:4px;
padding:8px 12px;border-radius:10px;
cursor:pointer;transition:all .2s;
border:none;background:none;
}
.tab svg{width:20px;height:20px;stroke:var(--t4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.tab span{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t4);transition:all .2s}
.tab.active svg{stroke:var(--t1)}
.tab.active span{color:var(--t1)}
.tab.active{position:relative}
.tab.active::before{
content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
width:20px;height:2px;background:var(--t1);border-radius:1px;
}

.tab-create{
margin-top:-20px;
width:52px;height:52px;
border-radius:14px;
background:var(--t1);
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 20px rgba(255,255,255,.15);
border:none;cursor:pointer;
transition:all .2s;
}
.tab-create:active{transform:scale(.9)}
.tab-create svg{stroke:var(--bg)!important;width:24px;height:24px}

/* === HERO === */
.hero{
padding:40px 24px;
border-radius:20px;
border:1px solid var(--border);
background:var(--bg2);
position:relative;overflow:hidden;
margin-bottom:24px;
}
.hero::before{
content:'';position:absolute;top:-50%;right:-30%;
width:300px;height:300px;
background:radial-gradient(circle,rgba(255,255,255,.03),transparent 70%);
pointer-events:none;
}
.hero::after{
content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
}
.hero-icon{
width:72px;height:72px;
border:2px solid var(--border2);
border-radius:20px;
display:flex;align-items:center;justify-content:center;
margin-bottom:20px;
background:linear-gradient(135deg,var(--bg3),var(--bg));
animation:float 6s ease-in-out infinite;
}
.hero-icon svg{width:32px;height:32px;stroke:var(--t1);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* === STAT BLOCKS === */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0}
.stat{
text-align:center;padding:16px 8px;
border-radius:12px;border:1px solid var(--border);
background:var(--bg2);
}
.stat-value{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--t1);line-height:1}
.stat-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:6px}

/* === LIST ITEMS === */
.list-item{
display:flex;align-items:center;gap:14px;
padding:16px;
border-radius:14px;
border:1px solid var(--border);
background:var(--bg2);
margin-bottom:8px;
transition:all .2s;
cursor:pointer;
}
.list-item:active{transform:scale(.98);border-color:var(--border2)}
.list-item-content{flex:1;min-width:0}
.list-item-right{text-align:right;flex-shrink:0}

/* === PROGRESS BAR === */
.progress{
width:100%;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:8px 0;
}
.progress-bar{
height:100%;background:var(--t1);border-radius:2px;
position:relative;transition:width .6s cubic-bezier(.4,0,.2,1);
}
.progress-bar::after{
content:'';position:absolute;right:0;top:-1px;width:6px;height:6px;
border-radius:50%;background:var(--t1);
box-shadow:0 0 8px rgba(255,255,255,.5);
}

/* === LEADERBOARD === */
.lb-row{
display:flex;align-items:center;gap:12px;
padding:14px 16px;
border-radius:12px;
border:1px solid var(--border);
background:var(--bg2);
margin-bottom:6px;
transition:all .2s;
}
.lb-row.top1{border-color:var(--border3);background:linear-gradient(135deg,var(--bg3),var(--bg2))}
.lb-row.top1 .lb-rank{color:var(--t1);font-weight:900}
.lb-row.me{border-color:var(--t3);background:var(--bg3)}
.lb-rank{
width:28px;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--t3);text-align:center;
}
.lb-name{flex:1;font-size:14px;font-weight:600;color:var(--t1)}
.lb-pts{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--t2)}

/* === DIVIDER === */
.divider{
height:1px;
background:linear-gradient(90deg,transparent,var(--border2),transparent);
margin:24px 0;
}

/* === SPACER === */
.sp-4{height:4px}.sp-8{height:8px}.sp-12{height:12px}.sp-16{height:16px}.sp-20{height:20px}.sp-24{height:24px}.sp-32{height:32px}

/* === ROW === */
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}.gap-16{gap:16px}

/* === ANIMATIONS === */
.fade-in{animation:fadeIn .5s ease both}
.fade-up{animation:fadeUp .5s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}
.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* === TOGGLE === */
.toggle{
position:relative;width:44px;height:24px;border-radius:12px;
background:var(--bg4);border:1px solid var(--border2);
cursor:pointer;transition:all .3s;flex-shrink:0;
}
.toggle.on{background:var(--t1);border-color:var(--t1)}
.toggle::after{
content:'';position:absolute;top:2px;left:2px;
width:18px;height:18px;border-radius:9px;
background:var(--t3);transition:all .3s;
}
.toggle.on::after{left:22px;background:var(--bg)}

/* === TOAST === */
.toast{
position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
padding:14px 24px;border-radius:12px;
background:var(--t1);color:var(--bg);
font-size:13px;font-weight:600;
z-index:10000;
transition:transform .4s cubic-bezier(.4,0,.2,1);
box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* === CONTEST CARD SPECIAL === */
.contest-card{position:relative;overflow:hidden}
.contest-card .cc-line{
position:absolute;top:0;left:20px;bottom:0;width:1px;
background:linear-gradient(180deg,var(--border2),transparent);
}
.contest-card .cc-dot{
position:absolute;top:20px;left:17px;width:7px;height:7px;
border-radius:50%;border:1.5px solid var(--t3);background:var(--bg2);
}
.contest-card.live .cc-dot{border-color:var(--t1);background:var(--t1);box-shadow:0 0 8px rgba(255,255,255,.3)}
.contest-card .cc-body{padding-left:20px}

/* === COUNTER ANIMATION === */
.count-num{
font-family:'Space Mono',monospace;
font-size:42px;
font-weight:700;
line-height:1;
color:var(--t1);
}

/* === HEADER BAR === */
.header{
display:flex;align-items:center;gap:12px;
padding:4px 0 20px;
}
.back-btn{
width:36px;height:36px;display:flex;align-items:center;justify-content:center;
border-radius:10px;border:1px solid var(--border);background:var(--bg2);
cursor:pointer;transition:all .2s;
}
.back-btn:active{transform:scale(.9)}
.back-btn svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* === SCROLLBAR HIDE === */
.no-scroll::-webkit-scrollbar{display:none}

/* === PRIZE TAG === */
.prize-tag{
display:inline-flex;align-items:center;gap:6px;
padding:8px 14px;border-radius:8px;
border:1px solid var(--border2);background:var(--bg3);
font-size:13px;font-weight:500;color:var(--t2);
}

/* === SKELETON === */
.skeleton{
background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
background-size:200% 100%;
animation:shimmer 1.5s infinite;
border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* === SECTION HEADER === */
.section-head{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:16px;
}
.section-head .label{margin:0}
.section-head .see-all{font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;letter-spacing:.5px}
</style>
</head>

/* ═══════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════ */
function timeLeft(end) {
  const diff = new Date(end) - new Date();
  if (diff <= 0) return 'Завершён';
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  if (d > 0) return `${d}д ${h}ч`;
  if (h > 0) return `${h}ч ${m}м`;
  return `${m}м`;
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) + ' МСК';
}

function showToast(msg) {
  state.toast = msg;
  render();
  if (state.toastTimer) clearTimeout(state.toastTimer);
  setTimeout(() => { document.querySelector('.toast')?.classList.add('show'); }, 10);
  state.toastTimer = setTimeout(() => {
    document.querySelector('.toast')?.classList.remove('show');
    setTimeout(() => { state.toast = null; render(); }, 400);
  }, 2500);
}

function go(screen, contest) {
  state.prev = state.screen;
  state.screen = screen;
  if (contest !== undefined) state.selectedContest = contest;
  render();
  document.querySelector('.main')?.scrollTo(0,0);
}

  // Screen content
  html += `<div class="main no-scroll">`;
  switch(state.screen) {
    case 'home': html += renderHome(); break;
    case 'points': html += renderPoints(); break;
    case 'create': html += renderCreate(); break;
    case 'admin': html += renderAdmin(); break;
    case 'detail': html += renderDetail(); break;
    case 'scoring': html += renderScoring(); break;
    case 'manual': html += renderManual(); break;
    case 'logs': html += renderLogs(); break;
  }
  html += `</div>`;

  html += renderTabBar();

  root.innerHTML = html;
  bindEvents();
}

  const actions = [
    {icon:'zap',label:'НАЧИСЛЕНИЯ',sub:'Настройка scoring для конкурсов',action:'go-scoring'},
    {icon:'edit',label:'РУЧНЫЕ БАЛЛЫ',sub:'Добавить баллы участнику',action:'go-manual'},
    {icon:'log',label:'ЛОГИ',sub:'История всех действий',action:'go-logs'},
  ];
  actions.forEach((a,i) => {
    h += `<div class="list-item fade-up d${1+i}" data-action="${a.action}">`;
    h += `<div class="icon-box">${iconRaw(a.icon)}</div>`;
    h += `<div class="list-item-content">`;
    h += `<div class="h3" style="font-size:14px">${a.label}</div>`;
    h += `<div class="sub2">${a.sub}</div>`;
    h += `</div>`;
    h += `<span style="width:20px;height:20px;display:flex">${iconRaw('arrow').replace('<svg','<svg style="width:20px;height:20px;stroke:var(--t4)"')}</span>`;
    h += `</div>`;
  });

  h += `<div class="divider"></div>`;
  h += `<div class="section-head"><div class="label">Все конкурсы</div></div>`;

  contests.forEach((c,i) => {
    h += `<div class="card fade-up d${4+i}" style="margin-bottom:10px;padding:16px" data-action="detail" data-id="${c.id}">`;
    h += `<div class="row-between" style="margin-bottom:8px">`;
    h += `<div class="h3" style="font-size:14px">${c.name}</div>`;
    h += `<div class="badge ${c.status==='active'?'badge-live':''}">${c.status==='active'?'<div class=dot></div>':''} ${c.status.toUpperCase()}</div>`;
    h += `</div>`;
    h += `<div class="row-between">`;
    h += `<div class="sub2">${c.channel} &middot; ${c.participants.length} участников</div>`;
    h += `<div class="sub2">Scoring: ${c.scoring_enabled?'ON':'OFF'}</div>`;
    h += `</div>`;
    if (c.status === 'active') {
      h += `<div class="sp-8"></div>`;
      h += `<button class="btn btn-ghost btn-sm" data-action="end-contest" data-id="${c.id}" style="width:100%">ЗАВЕРШИТЬ ДОСРОЧНО</button>`;
    }
    h += `</div>`;
  });

  return h;
}

/* ═══════════════════════════════════════════════
   SCORING SETTINGS
   ═══════════════════════════════════════════════ */
function renderScoring() {
  if (!isAdmin) return '';
  let h = '';
  h += `<div class="header fade-up"><div class="back-btn" data-action="go-admin">${iconRaw('back')}</div><div class="h2">Начисления</div></div>`;

  // Select contest
  h += `<div class="input-group fade-up d1"><div class="input-label">Конкурс</div>`;
  h += `<select class="input" id="sc-contest">`;
  contests.forEach(c => {
    h += `<option value="${c.id}" ${state.selectedContest===c.id?'selected':''}>${c.name}</option>`;
  });
  h += `</select></div>`;

  const c = contests.find(x=>x.id===(state.selectedContest||contests[0]?.id));
  if (!c) return h;
  const sc = c.scoring_config || {reactions:{enabled:false,coeff:1,daily_limit:10},invites:{enabled:false,points:50},ads:{enabled:false,points:10,url:''}};

  // Scoring enabled toggle
  h += `<div class="card fade-up d2" style="margin-bottom:12px">`;
  h += `<div class="row-between">`;
  h += `<div><div class="h3" style="font-size:14px">Scoring активен</div><div class="sub2">Включить начисление баллов</div></div>`;
  h += `<div class="toggle ${c.scoring_enabled?'on':''}" data-action="toggle-scoring" data-id="${c.id}"></div>`;
  h += `</div></div>`;

  // Reactions
  h += `<div class="card fade-up d3" style="margin-bottom:12px">`;
  h += `<div class="row-between" style="margin-bottom:12px">`;
  h += `<div class="row gap-8"><div class="icon-box">${iconRaw('star')}</div><div><div class="h3" style="font-size:14px">Реакции</div><div class="sub2">Баллы за реакции на посты</div></div></div>`;
  h += `<div class="toggle ${sc.reactions.enabled?'on':''}" data-action="toggle-reactions" data-id="${c.id}"></div>`;
  h += `</div>`;
  if (sc.reactions.enabled) {
    h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
    h += `<div class="input-group" style="margin:0"><div class="input-label">Коэффициент</div><input class="input" id="sc-r-coeff" type="number" value="${sc.reactions.coeff}" min="1"></div>`;
    h += `<div class="input-group" style="margin:0"><div class="input-label">Лимит / день</div><input class="input" id="sc-r-limit" type="number" value="${sc.reactions.daily_limit}" min="1"></div>`;
    h += `</div>`;
  }
  h += `</div>`;

  // Invites
  h += `<div class="card fade-up d4" style="margin-bottom:12px">`;
  h += `<div class="row-between" style="margin-bottom:12px">`;
  h += `<div class="row gap-8"><div class="icon-box">${iconRaw('users')}</div><div><div class="h3" style="font-size:14px">Приглашения</div><div class="sub2">Баллы за приглашённых друзей</div></div></div>`;
  h += `<div class="toggle ${sc.invites.enabled?'on':''}" data-action="toggle-invites" data-id="${c.id}"></div>`;
  h += `</div>`;
  if (sc.invites.enabled) {
    h += `<div class="input-group" style="margin:0"><div class="input-label">Баллы за друга</div><input class="input" id="sc-i-pts" type="number" value="${sc.invites.points}" min="1"></div>`;
  }
  h += `</div>`;

  // Ads
  h += `<div class="card fade-up d5" style="margin-bottom:12px">`;
  h += `<div class="row-between" style="margin-bottom:12px">`;
  h += `<div class="row gap-8"><div class="icon-box">${iconRaw('eye')}</div><div><div class="h3" style="font-size:14px">Реклама</div><div class="sub2">Баллы за просмотр рекламы</div></div></div>`;
  h += `<div class="toggle ${sc.ads.enabled?'on':''}" data-action="toggle-ads" data-id="${c.id}"></div>`;
  h += `</div>`;
  if (sc.ads.enabled) {
    h += `<div class="input-group"><div class="input-label">Баллы за просмотр</div><input class="input" id="sc-a-pts" type="number" value="${sc.ads.points}" min="1"></div>`;
    h += `<div class="input-group" style="margin:0"><div class="input-label">Ссылка на видео</div><input class="input" id="sc-a-url" value="${sc.ads.url}" placeholder="https://..."></div>`;
  }
  h += `</div>`;

  h += `<div class="sp-12"></div>`;
  h += `<button class="btn btn-primary" data-action="save-scoring">СОХРАНИТЬ НАСТРОЙКИ</button>`;

  return h;
}

/* ═══════════════════════════════════════════════
   MANUAL POINTS
   ═══════════════════════════════════════════════ */
function renderManual() {
  if (!isAdmin) return '';
  let h = '';
  h += `<div class="header fade-up"><div class="back-btn" data-action="go-admin">${iconRaw('back')}</div><div class="h2">Ручные баллы</div></div>`;

  h += `<div class="input-group fade-up d1"><div class="input-label">Конкурс</div>`;
  h += `<select class="input" id="mp-contest">`;
  contests.forEach(c => { h += `<option value="${c.id}">${c.name}</option>`; });
  h += `</select></div>`;

  h += `<div class="input-group fade-up d2"><div class="input-label">Участник (Telegram ID)</div><input class="input" id="mp-user" type="number" placeholder="123456789"></div>`;
  h += `<div class="input-group fade-up d3"><div class="input-label">Баллы</div><input class="input" id="mp-points" type="number" value="100"></div>`;
  h += `<div class="input-group fade-up d4"><div class="input-label">Причина</div><input class="input" id="mp-reason" placeholder="Активность в чате"></div>`;
  h += `<div class="sp-12"></div>`;
  h += `<button class="btn btn-primary fade-up d5" data-action="add-points">НАЧИСЛИТЬ БАЛЛЫ</button>`;

  // Participants list
  const cId = state.selectedContest || contests[0]?.id;
  const c = contests.find(x=>x.id===cId);
  if (c) {
    h += `<div class="sp-24"></div>`;
    h += `<div class="section-head"><div class="label">Участники ${c.name}</div></div>`;
    const sorted = [...c.participants].sort((a,b)=>b.points-a.points);
    sorted.forEach((p,i) => {
      h += `<div class="lb-row fade-up d${6+i}">`;
      h += `<div class="lb-rank">${i+1}</div>`;
      h += `<div class="lb-name">${p.name}</div>`;
      h += `<div class="lb-pts">${p.points}</div>`;
      h += `</div>`;
    });
  }

  return h;
}

/* ═══════════════════════════════════════════════
   LOGS
   ═══════════════════════════════════════════════ */
function renderLogs() {
  if (!isAdmin) return '';
  let h = '';
  h += `<div class="header fade-up"><div class="back-btn" data-action="go-admin">${iconRaw('back')}</div><div class="h2">Логи</div></div>`;

  if (logs.length === 0) {
    h += `<div class="card" style="text-align:center;padding:40px"><div class="sub">Логи пусты</div></div>`;
    return h;
  }

  logs.slice().reverse().forEach((l,i) => {
    h += `<div class="card fade-up d${1+i}" style="margin-bottom:8px;padding:14px 16px">`;
    h += `<div class="row-between" style="margin-bottom:6px">`;
    h += `<div class="h3" style="font-size:13px">${l.action}</div>`;
    h += `<div class="mono sub2" style="font-size:10px">${new Date(l.timestamp).toLocaleString('ru-RU')}</div>`;
    h += `</div>`;
    h += `<div class="sub2">${l.contest} &middot; ${l.by}</div>`;
    if (l.details) h += `<div class="sub2" style="margin-top:4px;color:var(--t4)">${l.details}</div>`;
    h += `</div>`;
  });

  return h;
}

/* ═══════════════════════════════════════════════
   TAB BAR
   ═══════════════════════════════════════════════ */
function renderTabBar() {
  const tabs = [
    {id:'home',icon:'home',label:'Главная'},
    {id:'points',icon:'star',label:'Баллы'},
    {id:'create',icon:'plus',label:''},
    ...(isAdmin ? [{id:'admin',icon:'settings',label:'Админ'}] : []),
  ];
  // Add a dummy tab for non-admins to keep symmetry
  if (!isAdmin) tabs.push({id:'_',icon:'user',label:'Профиль'});

  let h = `<div class="tab-bar">`;
  tabs.forEach(t => {
    if (t.id === 'create') {
      h += `<button class="tab-create" data-action="go" data-screen="create">${iconRaw('plus')}</button>`;
    } else {
      h += `<button class="tab ${state.screen===t.id?'active':''}" data-action="go" data-screen="${t.id}">`;
      h += `<span style="width:20px;height:20px;display:flex">${iconRaw(t.icon)}</span>`;
      h += `<span>${t.label}</span></button>`;
    }
  });
  h += `</div>`;
  return h;
}

/* ═══════════════════════════════════════════════
   EVENT BINDINGS
   ═══════════════════════════════════════════════ */
function bindEvents() {
  // Navigation tabs
  document.querySelectorAll('[data-action="go"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); go(el.dataset.screen); });
  });

  // Back
  document.querySelectorAll('[data-action="back"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); go(state.prev || 'home'); });
  });
  document.querySelectorAll('[data-action="go-admin"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); go('admin'); });
  });

  // Contest detail
  document.querySelectorAll('[data-action="detail"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); go('detail', parseInt(el.dataset.id)); });
  });

  // Admin sub-screens
  document.querySelectorAll('[data-action="go-scoring"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); state.selectedContest = contests[0]?.id; go('scoring'); });
  });
  document.querySelectorAll('[data-action="go-manual"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); go('manual'); });
  });
  document.querySelectorAll('[data-action="go-logs"]').forEach(el => {
    el.addEventListener('click', () => { haptic(); go('logs'); });
  });

  // Join contest
  document.querySelectorAll('[data-action="join"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const id = parseInt(el.dataset.id);
      const c = contests.find(x=>x.id===id);
      if (c && !c.participants.find(p=>p.tg_id===userId)) {
        c.participants.push({name:userName.toLowerCase(),points:c.initial_points,tg_id:userId});
        logs.push({timestamp:new Date().toISOString(),action:'Участник вступил',by:userName,contest:c.name,details:`+${c.initial_points} начальных баллов`});
        showToast('Вы участвуете в конкурсе');
        render();
      }
    });
  });

  // Outcome type change
  const outcomeEl = document.getElementById('c-outcome');
  if (outcomeEl) {
    outcomeEl.addEventListener('change', () => {
      const tg = document.getElementById('c-threshold-group');
      if (tg) tg.style.display = outcomeEl.value === '2' ? 'block' : 'none';
    });
  }

  // Submit contest
  document.querySelectorAll('[data-action="submit-contest"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const name = document.getElementById('c-name')?.value?.trim();
      const channel = document.getElementById('c-channel')?.value?.trim();
      const endVal = document.getElementById('c-end')?.value;
      if (!name) { showToast('Введите название'); return; }
      if (!channel) { showToast('Укажите канал'); return; }
      if (!endVal) { showToast('Укажите дату окончания'); return; }
      const newContest = {
        id: Date.now(),
        name: name.toUpperCase(),
        channel,
        description: document.getElementById('c-desc')?.value || '',
        conditions: document.getElementById('c-cond')?.value || '',
        end: endVal,
        winners_count: parseInt(document.getElementById('c-winners')?.value)||1,
        initial_points: parseInt(document.getElementById('c-initpts')?.value)||0,
        outcome_type: parseInt(document.getElementById('c-outcome')?.value)||1,
        threshold: parseInt(document.getElementById('c-threshold')?.value)||0,
        button_text: document.getElementById('c-btn')?.value || 'Участвовать',
        status: 'active',
        scoring_enabled: false,
        prizes: (document.getElementById('c-prizes')?.value||'').split('\n').filter(x=>x.trim()),
        participants: [],
        scoring_config: {reactions:{enabled:false,coeff:1,daily_limit:10},invites:{enabled:false,points:50},ads:{enabled:false,points:10,url:''}}
      };
      contests.unshift(newContest);
      logs.push({timestamp:new Date().toISOString(),action:'Конкурс создан',by:userName,contest:newContest.name,details:'Новый конкурс'});
      showToast('Конкурс создан');
      go('home');
    });
  });

  // Toggles
  document.querySelectorAll('[data-action="toggle-scoring"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const c = contests.find(x=>x.id===parseInt(el.dataset.id));
      if (c) { c.scoring_enabled = !c.scoring_enabled; render(); }
    });
  });
  document.querySelectorAll('[data-action="toggle-reactions"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const c = contests.find(x=>x.id===parseInt(el.dataset.id));
      if (c) { c.scoring_config.reactions.enabled = !c.scoring_config.reactions.enabled; render(); }
    });
  });
  document.querySelectorAll('[data-action="toggle-invites"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const c = contests.find(x=>x.id===parseInt(el.dataset.id));
      if (c) { c.scoring_config.invites.enabled = !c.scoring_config.invites.enabled; render(); }
    });
  });
  document.querySelectorAll('[data-action="toggle-ads"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const c = contests.find(x=>x.id===parseInt(el.dataset.id));
      if (c) { c.scoring_config.ads.enabled = !c.scoring_config.ads.enabled; render(); }
    });
  });

  // Save scoring
  document.querySelectorAll('[data-action="save-scoring"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const cId = parseInt(document.getElementById('sc-contest')?.value);
      const c = contests.find(x=>x.id===cId);
      if (!c) return;
      if (c.scoring_config.reactions.enabled) {
        c.scoring_config.reactions.coeff = parseInt(document.getElementById('sc-r-coeff')?.value)||1;
        c.scoring_config.reactions.daily_limit = parseInt(document.getElementById('sc-r-limit')?.value)||10;
      }
      if (c.scoring_config.invites.enabled) {
        c.scoring_config.invites.points = parseInt(document.getElementById('sc-i-pts')?.value)||50;
      }
      if (c.scoring_config.ads.enabled) {
        c.scoring_config.ads.points = parseInt(document.getElementById('sc-a-pts')?.value)||10;
        c.scoring_config.ads.url = document.getElementById('sc-a-url')?.value||'';
      }
      logs.push({timestamp:new Date().toISOString(),action:'Scoring обновлён',by:'admin',contest:c.name,details:JSON.stringify(c.scoring_config)});
      showToast('Настройки сохранены');
    });
  });

  // Select contest in scoring
  const scSelect = document.getElementById('sc-contest');
  if (scSelect) {
    scSelect.addEventListener('change', () => {
      state.selectedContest = parseInt(scSelect.value);
      render();
    });
  }

  // Add manual points
  document.querySelectorAll('[data-action="add-points"]').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const cId = parseInt(document.getElementById('mp-contest')?.value);
      const uid = parseInt(document.getElementById('mp-user')?.value);
      const pts = parseInt(document.getElementById('mp-points')?.value);
      const reason = document.getElementById('mp-reason')?.value || '';
      if (!uid) { showToast('Введите ID пользователя'); return; }
      if (!pts) { showToast('Введите количество баллов'); return; }
      const c = contests.find(x=>x.id===cId);
      if (!c) return;
      const p = c.participants.find(x=>x.tg_id===uid);
      if (p) {
        p.points += pts;
      } else {
        c.participants.push({name:'user_'+uid,points:pts,tg_id:uid});
      }
      logs.push({timestamp:new Date().toISOString(),action:'Ручное начисление',by:'admin',contest:c.name,details:`+${pts} баллов для ${uid}: ${reason}`});
      showToast(`+${pts} баллов начислено`);
      render();
    });
  });

  // End contest
  document.querySelectorAll('[data-action="end-contest"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      haptic();
      const c = contests.find(x=>x.id===parseInt(el.dataset.id));
      if (c) {
        c.status = 'ended';
        logs.push({timestamp:new Date().toISOString(),action:'Конкурс завершён',by:'admin',contest:c.name,details:'Досрочное завершение'});
        showToast('Конкурс завершён');
        render();
      }
    });
  });
}

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
render();
</script>
</body>
</html>
