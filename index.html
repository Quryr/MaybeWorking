<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ROOT & RESET (BLACK & POISON ORANGE THEME)
   ═══════════════════════════════════════ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #000000;
  --card: #0A0A0A;
  --card-border: #1F1F1F;
  --text: #FFFFFF;
  --text2: #A0A0A0;
  --text3: #666666;
  
  /* POISONOUS ORANGE ACCENTS */
  --accent: #FF5500; 
  --accent-hover: #E64D00;
  --accent-text: #000000;
  --accent-glow: rgba(255, 85, 0, 0.35);
  
  /* NEON STATUS COLORS */
  --danger: #FF0033;
  --danger-bg: #2A0008;
  --success: #39FF14;
  --success-bg: #0A1F05;
  --warn: #FFB300;
  --warn-bg: #261B00;
  
  --section-bg: #121212;
  --hover: #1A1A1A;
  
  --radius: 16px;
  --radius-sm: 12px;
  --radius-xs: 8px;
}

html, body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: geometricPrecision;
  overflow-x: hidden;
  min-height: 100vh;
}

body {
  padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
}

input, textarea, select, button {
  font-family: inherit;
  font-size: inherit;
  -webkit-appearance: none;
  appearance: none;
}

a {
  color: inherit;
  text-decoration: none;
}

::selection {
  background: var(--accent);
  color: var(--accent-text);
}

/* ═══════════════════════════════════════
   APP CONTAINER
   ═══════════════════════════════════════ */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 16px 0;
}

/* ═══════════════════════════════════════
   HEADER
   ═══════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0 24px;
}

.header h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.8px;
  flex: 1;
  line-height: 1.1;
  text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}

.header-sub {
  font-size: 14px;
  font-weight: 500;
  color: var(--accent);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.header-badge {
  font-size: 11px;
  font-weight: 800;
  background: var(--accent);
  color: var(--accent-text);
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: 0 0 10px var(--accent-glow);
}

/* ═══════════════════════════════════════
   BACK BUTTON
   ═══════════════════════════════════════ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px 10px 14px;
  background: var(--section-bg);
  border: 1px solid var(--card-border);
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 20px;
}

.back-btn:active {
  transform: scale(.95);
  background: var(--card-border);
  border-color: var(--accent);
  color: var(--accent);
}

.back-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  stroke: currentColor;
}

/* ═══════════════════════════════════════
   CARDS
   ═══════════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}

.card:active {
  transform: scale(.985);
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}

.card-clickable {
  cursor: pointer;
}

.card-clickable:hover {
  border-color: var(--accent);
}

/* ═══════════════════════════════════════
   CONTEST CARD (on home screen)
   ═══════════════════════════════════════ */
.ccard {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}

.ccard:active {
  transform: scale(.985);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.ccard-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px var(--accent-glow);
}

.ccard-icon::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.2) 0%, transparent 100%);
  border-radius: 14px 14px 0 0;
}

.ccard-icon svg {
  width: 26px;
  height: 26px;
  stroke: var(--accent-text);
  stroke-width: 2;
  fill: none;
  position: relative;
  z-index: 1;
}

.ccard-body {
  flex: 1;
  min-width: 0;
}

.ccard-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.ccard-title {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  line-height: 1.25;
  color: var(--text);
}

.ccard-channel {
  font-size: 13px;
  color: var(--text2);
  font-weight: 600;
  margin-bottom: 8px;
}

.ccard-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.ccard-meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}

.ccard-meta-item svg {
  width: 14px;
  height: 14px;
  stroke: var(--accent);
  stroke-width: 2;
  fill: none;
}

/* ═══════════════════════════════════════
   BADGES
   ═══════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .5px;
  white-space: nowrap;
  flex-shrink: 0;
  text-transform: uppercase;
}

.badge-live {
  background: rgba(57, 255, 20, 0.1);
  color: var(--success);
  border: 1px solid rgba(57, 255, 20, 0.3);
  box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
}

.badge-live::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px var(--success);
}

.badge-ended {
  background: var(--section-bg);
  color: var(--text3);
  border: 1px solid var(--card-border);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(1.2); }
}

/* ═══════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════ */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 15px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 800;
  border: none;
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.btn:active {
  transform: scale(.97);
}

.btn-primary {
  background: var(--accent);
  color: var(--accent-text);
  box-shadow: 0 0 15px var(--accent-glow);
}

.btn-primary:active {
  background: var(--accent-hover);
  box-shadow: 0 0 25px rgba(255, 85, 0, 0.6);
}

.btn-secondary {
  background: var(--section-bg);
  color: var(--accent);
  border: 1px solid var(--card-border);
}

.btn-secondary:active, .btn-secondary:hover {
  border-color: var(--accent);
  background: rgba(255, 85, 0, 0.05);
}

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid rgba(255, 0, 51, 0.3);
}

.btn-success {
  background: var(--success-bg);
  color: var(--success);
  border: 1px solid rgba(57, 255, 20, 0.3);
}

.btn-warn {
  background: var(--warn-bg);
  color: var(--warn);
  border: 1px solid rgba(255, 179, 0, 0.3);
}

.btn-sm {
  padding: 10px 16px;
  font-size: 12px;
  width: auto;
  border-radius: var(--radius-xs);
}

.btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
}

.btn:disabled {
  opacity: .4;
  pointer-events: none;
  box-shadow: none;
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.btn-row .btn {
  flex: 1 1 auto;
  min-width: 0;
  white-space: nowrap;
}

/* ═══════════════════════════════════════
   FORMS
   ═══════════════════════════════════════ */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.form-hint {
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
  line-height: 1.4;
  font-weight: 500;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  background: var(--section-bg);
  color: var(--text);
  transition: all .2s;
  outline: none;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
  background: #000;
}

.form-input::placeholder {
  color: var(--text3);
}

textarea.form-input {
  resize: vertical;
  min-height: 88px;
  line-height: 1.5;
}

select.form-input {
  cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23FF5500' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 16px center;
  padding-right: 40px;
}

/* ═══════════════════════════════════════
   TOGGLE SWITCH
   ═══════════════════════════════════════ */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  background: var(--section-bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--card-border);
  margin-bottom: 8px;
  gap: 12px;
}

.toggle-row-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
}

.toggle-row-title {
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.toggle-row-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.4;
}

.toggle {
  position: relative;
  width: 52px;
  height: 32px;
  flex-shrink: 0;
}

.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--card-border);
  border-radius: 16px;
  cursor: pointer;
  transition: all .3s;
  border: 1px solid #333;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  background: var(--text2);
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform .3s;
  box-shadow: 0 1px 4px rgba(0, 0, 0, .5);
}

.toggle input:checked + .toggle-slider {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

.toggle input:checked + .toggle-slider::before {
  transform: translateX(20px);
  background: #000;
}

.toggle-sub {
  padding: 12px 16px 16px;
  display: none;
  background: var(--card);
  border-left: 2px solid var(--accent);
  margin-top: -8px;
  margin-bottom: 8px;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}

.toggle-sub.show {
  display: block;
}

/* ═══════════════════════════════════════
   SECTION TITLE
   ═══════════════════════════════════════ */
.section-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 32px 0 12px;
  padding: 0 4px;
  text-shadow: 0 0 8px var(--accent-glow);
}

/* ═══════════════════════════════════════
   TAB BAR
   ═══════════════════════════════════════ */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 10, .95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--card-border);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 0 0 env(safe-area-inset-bottom, 0px);
  z-index: 1000;
}

.tab-bar.cols-4 {
  grid-template-columns: repeat(4, 1fr);
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 0 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all .2s;
  position: relative;
  gap: 4px;
}

.tab svg {
  width: 24px;
  height: 24px;
  stroke: var(--text3);
  stroke-width: 2;
  fill: none;
  transition: all .2s;
}

.tab span {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  transition: all .2s;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.tab.active svg {
  stroke: var(--accent);
  filter: drop-shadow(0 0 5px var(--accent-glow));
}

.tab.active span {
  color: var(--accent);
}

.tab.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 3px;
  background: var(--accent);
  border-radius: 0 0 4px 4px;
  box-shadow: 0 2px 10px var(--accent);
}

/* ═══════════════════════════════════════
   LEADERBOARD
   ═══════════════════════════════════════ */
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
  background: var(--card);
  border: 1px solid var(--card-border);
}

.lb-item:hover {
  border-color: #333;
}

.lb-item:active {
  transform: scale(.98);
}

.lb-item.me {
  border-color: var(--accent);
  background: rgba(255, 85, 0, 0.05);
  box-shadow: 0 0 15px rgba(255, 85, 0, 0.1);
}

.lb-rank {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid transparent;
}

.lb-rank.r1 { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent-glow); }
.lb-rank.r2 { background: #E0E0E0; color: #000; }
.lb-rank.r3 { background: #8C3A00; color: #FFF; }
.lb-rank.rn { background: var(--section-bg); color: var(--text2); border-color: var(--card-border); }

.lb-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: #000;
  flex-shrink: 0;
  overflow: hidden;
  border: 2px solid var(--card-border);
}

.lb-item.me .lb-avatar {
  border-color: var(--accent);
}

.lb-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.lb-info {
  flex: 1;
  min-width: 0;
}

.lb-name {
  font-size: 15px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lb-username {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-top: 1px;
}

.lb-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 6px;
}

.lb-stat {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
}

.lb-stat svg {
  width: 14px;
  height: 14px;
  stroke: var(--text3);
  stroke-width: 2;
  fill: none;
}

.lb-points-col {
  text-align: right;
  flex-shrink: 0;
}

.lb-points {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -.5px;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent-glow);
}

.lb-points-label {
  font-size: 10px;
  color: var(--text3);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ═══════════════════════════════════════
   INVITE BOX
   ═══════════════════════════════════════ */
.invite-box {
  background: var(--section-bg);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 16px;
  margin: 16px 0;
  box-shadow: 0 0 15px rgba(255, 85, 0, 0.1);
}

.invite-box-title {
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.invite-box-title svg {
  width: 18px;
  height: 18px;
  stroke: var(--accent);
  stroke-width: 2.5;
  fill: none;
}

.invite-box-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.invite-box-link {
  flex: 1;
  padding: 12px 14px;
  background: #000;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'SF Mono', 'Menlo', monospace;
}

.invite-box-copy {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border-radius: var(--radius-xs);
  cursor: pointer;
  flex-shrink: 0;
  transition: all .2s;
  border: none;
  box-shadow: 0 0 10px var(--accent-glow);
}

.invite-box-copy:active {
  transform: scale(.88);
  background: var(--accent-hover);
}

.invite-box-copy svg {
  width: 20px;
  height: 20px;
  stroke: #000;
  stroke-width: 2.5;
  fill: none;
}

.invite-box-hint {
  font-size: 11px;
  color: var(--text2);
  margin-top: 10px;
  font-weight: 600;
  line-height: 1.4;
}

/* ═══════════════════════════════════════
   MODAL (bottom sheet)
   ═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .8);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  z-index: 2000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn .2s;
}

.modal {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
  animation: slideUp .3s;
  box-shadow: 0 -10px 40px rgba(255, 85, 0, 0.1);
}

.modal-handle {
  width: 48px;
  height: 6px;

// Безопасное подтверждение через Telegram, чтобы не багалась клавиатура
function tgConfirm(msg) {
  return new Promise(resolve => {
    if (window.Telegram?.WebApp?.showConfirm) {
      window.Telegram.WebApp.showConfirm(msg, resolve);
    } else {
      resolve(confirm(msg));
    }
  });
}

function requestRender() {
  if (state.loading) return; 
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    render();
  }, 50); // Группирует 50 обновлений в секунду в одну отрисовку
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escTg(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg, type = 'success') {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function timeLeft(dateStr) {
  if (!dateStr) return '—';
  const diff = new Date(dateStr) - new Date();
  if (diff <= 0) return 'Завершён';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (d > 0) return `${d}д ${h}ч`;
  if (h > 0) return `${h}ч ${m}м`;
  return `${m}м`;
}

function formatDateMSK(dateStr) {
  if (!dateStr) return '—';
  try {
    return new Date(dateStr).toLocaleString('ru-RU', {
      timeZone: 'Europe/Moscow',
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    }) + ' МСК';
  } catch (e) {
    return dateStr;
  }
}

function mskInputToUTC(localStr) {
  const parts = localStr.split(/\D/);
  if (parts.length >= 5) {
    const d = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2], parts[3], parts[4]));
    d.setUTCHours(d.getUTCHours() - 3);
    return d.toISOString();
  }
  return new Date(localStr).toISOString();
}

async function fbAdd(col, data) {
  if (!fbReady) return null;
  try {
    const ref = await addDoc(collection(db, col), data);
    return ref.id;
  } catch (e) {
    console.error('fbAdd error:', e);
    return null;
  }
}

async function fbSet(col, id, data) {
  if (!fbReady) return;
  try {
    await setDoc(doc(db, col, id), data, { merge: true });
  } catch (e) {
    console.error('fbSet error:', e);
  }
}

async function fbGet(col, id) {
  if (!fbReady) return null;
  try {
    const snap = await getDoc(doc(db, col, id));
    return snap.exists() ? { _id: snap.id, ...snap.data() } : null;
  } catch (e) {
    return null;
  }
}

async function fbAll(col) {
  if (!fbReady) return [];
  try {
    const snap = await getDocs(collection(db, col));
    return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  } catch (e) {
    return [];
  }
}

async function fbDel(col, id) {
  if (!fbReady) return;
  try {
    await deleteDoc(doc(db, col, id));
  } catch (e) {
    console.error('fbDel error:', e);
  }
}

async function fbQuery(col, field, op, val) {
  if (!fbReady) return [];
  try {
    const q = query(collection(db, col), where(field, op, val));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  } catch (e) {
    return [];
  }
}

async function loadContests() {
  state.contests = await fbAll('contests');
}

async function loadParticipants(contestId) {
  state.participants[contestId] = await fbQuery('participants', 'contest_id', '==', contestId);
}

async function loadChannels() {
  const all = await fbAll('channels');
  const uniqueChannels = [];
  const seenIds = new Set();
  
  for (const ch of all) {
    if (!ch.chat_id || ch.chat_id === 'undefined') {
        fbDel('channels', ch._id).catch(e => console.log(e));
        continue;
    }

    const chIdStr = String(ch.chat_id);
    if (seenIds.has(chIdStr)) {
        fbDel('channels', ch._id).catch(e => console.log(e));
        continue;
    }
    seenIds.add(chIdStr);
    
    if (ch.title === 'undefined' || !ch.title) {
       ch.title = (ch.username && ch.username !== 'undefined') ? `@${ch.username}` : `Канал ${ch.chat_id}`;
    }
    if (ch.username === 'undefined') {
       ch.username = '';
    }
    
    if (ch.admin_id === currentUser.id || currentUser.is_admin) {
      uniqueChannels.push(ch);
    }
  }
  state.channels = uniqueChannels;
}

let contestsUnsubscribe = null;

function startContestsListener() {
  if (!fbReady) return;

    state.participants[contestId] = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    state.participants[contestId].forEach(p => {

// AUTO END CONTESTS
// ═══════════════════════════════════════
let isAutoEnding = false;
async function autoEndContests() {
  if (!fbReady || isAutoEnding) return;
  isAutoEnding = true;
  try {
    const now = new Date();
    for (const c of state.contests) {
      if (c.status === 'active' && new Date(c.end_date) <= now) {
        if (c.creator_id === currentUser.id || currentUser.is_admin) {
          c.status = 'ended';
          await fbSet('contests', c._id, { status: 'ended', ended_at: new Date().toISOString() });
          await loadParticipants(c._id);
          const { result } = await sendResultsPost(c);
          if (result?.ok) {
             toast(`Конкурс "${c.name}" автоматически завершён! Итоги в канале.`);
          } else {
             toast(`Ошибка публикации итогов: ${result?.description}`, 'error');
          }
          if (!isInitialRender) requestRender();
        }
      }
    }
  } catch(e) {
    console.error('Auto end error:', e);
  } finally {
    isAutoEnding = false;
  }
}

// ═══════════════════════════════════════
// CHANNEL SCANNING
// ═══════════════════════════════════════
async function scanForChannels() {
  try {
    const resp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?limit=100&allowed_updates=["my_chat_member"]`);
    const data = await resp.json();
    if (!data.ok) return;

    for (const upd of (data.result || [])) {
      const mcm = upd.my_chat_member;
      if (!mcm) continue;

      const chat = mcm.chat;
      if (chat.type !== 'channel' && chat.type !== 'supergroup') continue;

      const newStatus = mcm.new_chat_member?.status;
      if (newStatus === 'administrator') {
        const adminId = mcm.from?.id;
        if (!adminId) continue;

        const existing = state.channels.find(ch => String(ch.chat_id) === String(chat.id));
        if (!existing) {
          let safeTitle = chat.title || chat.username || `Канал ${chat.id}`;
          if (safeTitle === 'undefined') safeTitle = `Канал ${chat.id}`;
          let safeUsername = chat.username && chat.username !== 'undefined' ? chat.username : '';
          
          const chData = {
            chat_id: String(chat.id),
            title: safeTitle,
            username: safeUsername,
            type: chat.type,
            admin_id: adminId,
            added_at: new Date().toISOString()
          };
          const id = await fbAdd('channels', chData);
          if (id) {
            state.channels.push({ _id: id, ...chData });
          }
        }
      }
    }
  } catch (e) {
    console.error('Scan error:', e);
  }
}

async function getUserPhoto(userId) {
  if (photoCache[userId]) return photoCache[userId];
  try {
    const resp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUserProfilePhotos?user_id=${userId}&limit=1`);
    const data = await resp.json();
    if (data.ok && data.result.total_count > 0) {
      const fileId = data.result.photos[0][0].file_id;
      const fileResp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
      const fileData = await fileResp.json();
      if (fileData.ok) {
        const url = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
        photoCache[userId] = url;
        if (!isInitialRender) requestRender();
        return url;
      }
    }
  } catch (e) {
  }
  return null;
}

// ═══════════════════════════════════════
// SEND CONTEST POST TO CHANNEL
// ═══════════════════════════════════════
async function sendContestPost(contest, contestId) {
  const channelId = contest.channel_id;
  if (!channelId) return { ok: false, description: 'Канал не выбран' };

  let text = `━━━━━━━━━━━━━━━━━━\n`;
  text += `<b>🏆 ${escTg(contest.name)}</b>\n`;
  text += `━━━━━━━━━━━━━━━━━━\n\n`;

  if (contest.description) {
    text += `${escTg(contest.description)}\n\n`;
  }

  if (contest.conditions) {
    text += `📋 <b>Условия участия:</b>\n${escTg(contest.conditions)}\n\n`;
  }

  const prizes = (contest.prizes || []).filter(p => p);
  if (prizes.length > 0) {
    text += `🎁 <b>Призы:</b>\n`;
    const medals = ['🥇', '🥈', '🥉'];
    prizes.forEach((p, i) => {
      text += `${medals[i] || `${i + 1}.`} ${i + 1}-е место — ${escTg(p)}\n`;
    });
    text += `\n👥 <b>Призовых мест:</b> ${prizes.length}\n\n`;
  }

  const scoring = contest.scoring || {};
  const methods = [];
  if (scoring.invites?.enabled) methods.push(`приглашение друзей (+${scoring.invites.points} за друга)`);
  if (scoring.subscribe?.enabled) methods.push(`подписка на канал (+${scoring.subscribe.points} за подписку)`);
  if (scoring.ads?.enabled) methods.push(`просмотр рекламы (+${scoring.ads.points} за просмотр)`);

  if (methods.length > 0) {
    text += `⚡ <b>Как заработать баллы:</b>\n`;
    methods.forEach(m => { text += `  • ${m}\n`; });
    text += `\n`;
  }

  const types = {
    'leaderboard': 'по лидерборду (больше баллов = выше)',
    'random': 'случайный выбор среди участников с порогом баллов',
    'weighted': 'взвешенный рандом (больше баллов = выше шанс)'
  };
  text += `🎯 <b>Определение победителя:</b> ${types[contest.outcome_type] || 'лидерборд'}\n\n`;

  if (contest.initial_points && parseInt(contest.initial_points) > 0) {
    text += `✨ <b>Стартовые баллы:</b> ${contest.initial_points}\n\n`;
  }

  text += `⏰ <b>До:</b> ${formatDateMSK(contest.end_date)}\n\n`;
  text += `━━━━━━━━━━━━━━━━━━\n`;
  text += `Нажмите кнопку ниже, чтобы участвовать!`;

  const buttonText = contest.button_text || 'Участвовать';
  const appUrl = `https://t.me/${BOT_USERNAME}/${MINI_APP_SHORT_NAME}?startapp=${contestId}`;

  let result = await tgApi('sendMessage', {
    chat_id: channelId,
    text: text,
    parse_mode: 'HTML',
    reply_markup: {
      inline_keyboard: [[{
        text: `🏆 ${buttonText}`,
        url: appUrl
      }]]
    }
  });

  return result;
}

// ═══════════════════════════════════════
// SEND RESULTS POST TO CHANNEL
// ═══════════════════════════════════════
async function sendResultsPost(contest) {
  const parts = state.participants[contest._id] || [];
  const sorted = [...parts].sort((a, b) => (b.points || 0) - (a.points || 0));
  const prizes = (contest.prizes || []).filter(p => p);
  const winnersCount = prizes.length || 1;

  let winners = [];
  if (contest.outcome_type === 'random') {
    const eligible = sorted.filter(p => (p.points || 0) >= (parseInt(contest.threshold) || 0));
    for (let i = 0; i < Math.min(winnersCount, eligible.length); i++) {
      const idx = Math.floor(Math.random() * eligible.length);
      winners.push(eligible.splice(idx, 1)[0]);
    }
  } else if (contest.outcome_type === 'weighted') {
    const eligible = sorted.filter(p => (p.points || 0) > 0);
    for (let i = 0; i < Math.min(winnersCount, eligible.length); i++) {
      const weights = eligible.map(p => p.points || 1);
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      let idx = 0;
      for (let j = 0; j < weights.length; j++) {
        r -= weights[j];
        if (r <= 0) { idx = j; break; }
      }
      winners.push(eligible.splice(idx, 1)[0]);
    }
  } else {
    winners = sorted.slice(0, winnersCount);
  }

  let text = `━━━━━━━━━━━━━━━━━━\n`;
  text += `<b>🏆 Итоги: ${escTg(contest.name)}</b>\n`;
  text += `━━━━━━━━━━━━━━━━━━\n\n`;
  text += `👥 Участников: ${parts.length}\n\n`;
  text += `<b>Победители:</b>\n\n`;

  const medals = ['🥇', '🥈', '🥉'];
  winners.forEach((w, i) => {
    const name = w.username ? `@${w.username}` : (w.first_name || 'User');
    const prize = prizes[i] ? ` — ${escTg(prizes[i])}` : '';
    text += `${medals[i] || `${i + 1}.`} <b>${escTg(name)}</b> (${w.points || 0} баллов)${prize}\n`;
  });

  text += `\n━━━━━━━━━━━━━━━━━━\nПоздравляем!`;

  const appUrl = `https://t.me/${BOT_USERNAME}/${MINI_APP_SHORT_NAME}?startapp=${contest._id}`;

  let result = await tgApi('sendMessage', {
    chat_id: contest.channel_id,
    text: text,
    parse_mode: 'HTML',
    reply_markup: {
      inline_keyboard: [[{
        text: '📊 Посмотреть итоги',
        url: appUrl
      }]]
    }
  });

  return { winners, result };
}

// ═══════════════════════════════════════
// CREATE CONTEST
// ═══════════════════════════════════════
async function createContest(formData) {
  if (!formData.name?.trim()) {
    toast('Введите название конкурса', 'error');
    return false;
  }
  if (!formData.channel_id) {
    toast('Выберите канал', 'error');
    return false;
  }
  if (!formData.end_date) {
    toast('Укажите дату окончания', 'error');
    return false;
  }

  const prizes = (formData.prizes || []).filter(p => p?.trim());

  const contestData = {
    name: formData.name.trim(),
    description: formData.description?.trim() || '',
    conditions: formData.conditions?.trim() || '',
    channel_id: formData.channel_id,
    channel_title: formData.channel_title || '',
    channel_username: formData.channel_username || '',
    end_date: mskInputToUTC(formData.end_date),
    button_text: formData.button_text?.trim() || 'Участвовать',
    initial_points: parseInt(formData.initial_points) || 0,
    outcome_type: formData.outcome_type || 'leaderboard',
    threshold: parseInt(formData.threshold) || 0,
    prizes: prizes,
    status: 'active',
    creator_id: currentUser.id,
    creator_name: currentUser.first_name,
    created_at: new Date().toISOString(),
    scoring: {
      invites: {
        enabled: !!formData.invites_enabled,
        points: parseInt(formData.invites_points) || 5
      },
      subscribe: {
        enabled: !!formData.subscribe_enabled,
        points: parseInt(formData.subscribe_points) || 10
      },
      ads: {
        enabled: !!formData.ads_enabled,
        points: parseInt(formData.ads_points) || 3
      }
    }
  };

  toast('Создаём конкурс...');
  const contestId = await fbAdd('contests', contestData);
  if (!contestId) {
    toast('Ошибка создания конкурса', 'error');
    return false;
  }

  const postResult = await sendContestPost(contestData, contestId);
  if (!postResult.ok) {
    toast(`Конкурс создан, но пост не отправлен: ${postResult.description || 'Неизвестная ошибка'}`, 'error');
  } else {
    toast('Конкурс создан и опубликован!');
  }

  if (postResult.ok && postResult.result?.message_id) {
    await fbSet('contests', contestId, { message_id: postResult.result.message_id });
  }

  return true;
}

// ═══════════════════════════════════════
// JOIN CONTEST
// ═══════════════════════════════════════
async function joinContest(contestId) {
  if (isJoining) return;
  isJoining = true;

  try {
    const contest = state.contests.find(c => c._id === contestId);
    if (!contest) return;

    const existing = (state.participants[contestId] || []).find(p => p.user_id === currentUser.id);
    if (existing) {
      toast('Вы уже участвуете!', 'error');
      return;
    }

    const res = await tgApi('getChatMember', { chat_id: contest.channel_id, user_id: currentUser.id });
    let isSubscribed = false;
    if (res.ok && ['member', 'administrator', 'creator'].includes(res.result.status)) {
      isSubscribed = true;
    }

    if (!isSubscribed) {
      toast('Для участия нужно подписаться на канал!', 'error');
      
      let channelUrl = contest.channel_username ? `https://t.me/${contest.channel_username.replace('@', '')}` : contest.invite_link;
      if (!channelUrl) {
        const linkRes = await tgApi('createChatInviteLink', { chat_id: contest.channel_id });
        if (linkRes.ok) {
          channelUrl = linkRes.result.invite_link;
          await fbSet('contests', contestId, { invite_link: channelUrl });
          contest.invite_link = channelUrl;
        }
      }

      if (channelUrl) {
        const tg = window.Telegram?.WebApp;
        if (tg && tg.openTelegramLink) {
          tg.openTelegramLink(channelUrl);
        } else {
          window.open(channelUrl, '_blank');
        }
      }
      return;
    }

    // Ищем сохраненный реферал в базе, если юзер перешел по ссылке в посте
    let actualReferrerId = state.referrerId;
    if (!actualReferrerId && contest.scoring?.invites?.enabled) {
      const pendingRef = await fbGet('pending_referrals', `${currentUser.id}_${contestId}`);
      if (pendingRef && pendingRef.referrerId) {
        actualReferrerId = pendingRef.referrerId;
      }
    }

    let initialPts = contest.initial_points || 0;
    let subCount = 0;
    if (contest.scoring?.subscribe?.enabled) {
       initialPts += (contest.scoring.subscribe.points || 0);
       subCount = 1;
    }

    const myInviteUrl = `https://t.me/${BOT_USERNAME}/${MINI_APP_SHORT_NAME}?startapp=${contestId}_${currentUser.id}`;

    const partData = {
      contest_id: contestId,
      user_id: currentUser.id,
      first_name: currentUser.first_name,
      username: currentUser.username,
      points: initialPts,
      invites_count: 0,
      subscribe_count: subCount,
      ads_count: 0,
      invite_link: myInviteUrl,
      joined_at: new Date().toISOString()
    };

    const partId = await fbAdd('participants', partData);
    if (!partId) {
      toast('Ошибка при присоединении', 'error');
      return;
    }

    // Начисление баллов рефоводу
    if (actualReferrerId && String(actualReferrerId) !== String(currentUser.id) && contest.scoring?.invites?.enabled) {
      const parts = state.participants[contestId] || [];
      const referrer = parts.find(p => String(p.user_id) === String(actualReferrerId));
      if (referrer) {
        const invitePts = contest.scoring.invites.points || 5;
        await fbSet('participants', referrer._id, {
          points: (referrer.points || 0) + invitePts,
          invites_count: (referrer.invites_count || 0) + 1
        });
        toast('Вы успешно присоединились по приглашению!');
      } else {
        toast('Вы участвуете!');
      }
      state.referrerId = null;
      fbDel('pending_referrals', `${currentUser.id}_${contestId}`).catch(e => console.error(e));
    } else {
      toast('Вы участвуете!');
    }

    await loadParticipants(contestId);
    render();

  } catch (e) {
    console.error('Join error:', e);
    toast('Произошла ошибка', 'error');
  } finally {
    isJoining = false;
  }
}

// ═══════════════════════════════════════
// END CONTEST
// ═══════════════════════════════════════
async function endContest(contestId) {
  const contest = state.contests.find(c => c._id === contestId);
  if (!contest) return;

  if (contest.creator_id !== currentUser.id && !currentUser.is_admin) {
    toast('Нет прав', 'error');
    return;
  }

  const isConfirmed = await tgConfirm('Завершить конкурс? Это действие нельзя отменить.');
  if (!isConfirmed) return;

  await fbSet('contests', contestId, { status: 'ended', ended_at: new Date().toISOString() });

  await loadParticipants(contestId);
  const { winners, result } = await sendResultsPost(contest);

  if (result?.ok) {
    toast('Конкурс завершён, итоги опубликованы!');
  } else {
    toast('Конкурс завершён, но итоги не отправлены в канал', 'error');
  }

  render();
}

// ═══════════════════════════════════════
// DELETE CONTEST
// ═══════════════════════════════════════
async function deleteContest(contestId) {
  const contest = state.contests.find(c => c._id === contestId);
  if (!contest) return;

  if (contest.creator_id !== currentUser.id && !currentUser.is_admin) {
    toast('Нет прав', 'error');
    return;
  }

  const isConfirmed = await tgConfirm('Удалить конкурс навсегда? Это нельзя отменить.');
  if (!isConfirmed) return;

  state.loading = true;
  render();

  try {
    if (participantUnsubs[contestId]) {
      participantUnsubs[contestId]();
      delete participantUnsubs[contestId];
    }

    const parts = state.participants[contestId] || [];
    
    const batchPromises = parts.map(p => fbDel('participants', p._id));
    await Promise.all(batchPromises);

    await fbDel('contests', contestId);
    delete state.participants[contestId];

    toast('Конкурс удалён');
    state.screen = 'home';
    state.selectedContest = null;
    state.formData = { prizes: [''], outcome_type: 'leaderboard' };

  } catch (e) {
    console.error(e);
    toast('Ошибка при удалении', 'error');
  } finally {
    state.loading = false;
    render();
  }
}

// ═══════════════════════════════════════
// ADD POINTS TO PARTICIPANT
// ═══════════════════════════════════════
async function addPointsToParticipant(partId, type, count, contest) {
  const parts = Object.values(state.participants).flat();
  const part = parts.find(p => p._id === partId);
  if (!part || !contest) return;

  const scoring = contest.scoring || {};
  let pointsPerUnit = 0;
  let countField = '';

  if (type === 'invites') {
    pointsPerUnit = scoring.invites?.points || 5;
    countField = 'invites_count';
  } else if (type === 'subscribe') {
    pointsPerUnit = scoring.subscribe?.points || 10;
    countField = 'subscribe_count';
  } else if (type === 'ads') {
    pointsPerUnit = scoring.ads?.points || 3;
    countField = 'ads_count';
  }

  const totalPoints = count * pointsPerUnit;
  const newCount = (part[countField] || 0) + count;
  const newPoints = (part.points || 0) + totalPoints;

  const updateData = { points: newPoints };
  updateData[countField] = newCount;

  await fbSet('participants', partId, updateData);

  part.points = newPoints;
  part[countField] = newCount;

  const typeNames = { invites: 'приглашений', subscribe: 'подписок', ads: 'просмотров' };
  toast(`+${count} ${typeNames[type]} (+${totalPoints} баллов)`);

  state.modal = { type: 'participant', participant: part, contest };
  render();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  if (!root) return;

  if (state.loading) {
    root.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div style="font-size:14px;color:var(--accent);font-weight:800;letter-spacing:1px;text-transform:uppercase;">Загрузка...</div></div>';
    return;
  }

  let html = '';

  switch (state.screen) {
    case 'home': html = renderHome(); break;
    case 'points': html = renderPoints(); break;
    case 'create': html = renderCreate(); break;
    case 'detail': html = renderDetail(); break;
    case 'manage': html = renderManage(); break;
    case 'profile': html = renderProfile(); break;
    default: html = renderHome();
  }

  html += renderTabBar();
  html += renderModal();

  root.innerHTML = html;
  bindEvents();
}

// RENDER: CONTEST DETAIL
// ═══════════════════════════════════════
function renderDetail() {
  const c = state.contests.find(x => x._id === state.selectedContest);
  if (!c) {
    return '<div class="app fade-up"><div class="empty"><div class="empty-title">Конкурс не найден</div></div></div>';
  }

  const parts = (state.participants[c._id] || []);
  const sorted = [...parts].sort((a, b) => (b.points || 0) - (a.points || 0));
  const me = parts.find(p => p.user_id === currentUser.id);
  const isCreator = c.creator_id === currentUser.id;
  const isAdmin = currentUser.is_admin;
  const canManage = isCreator || isAdmin;
  const prizes = (c.prizes || []).filter(p => p);

  let h = '<div class="app fade-up">';

  h += `<button class="back-btn" data-action="goHome">${IC.chevL} Назад</button>`;

  h += '<div class="detail-hero">';
  h += `<div class="detail-hero-icon">${IC.award}</div>`;
  h += `<div class="detail-hero-title">${esc(c.name)}</div>`;
  if (c.channel_title) {
    h += `<div class="detail-hero-channel">${esc(c.channel_title)}</div>`;
  }
  h += `<span class="badge ${c.status === 'active' ? 'badge-live' : 'badge-ended'}" style="margin-top:16px">${c.status === 'active' ? 'Активный' : 'Завершён'}</span>`;
  h += '</div>';

  if (c.status === 'active' && !me) {
    h += `<button class="btn btn-primary" data-action="joinContest" data-id="${c._id}" style="margin-bottom:20px">${IC.zap} ${esc(c.button_text || 'Участвовать')}</button>`;
  }

  if (me && c.status === 'active' && c.scoring?.subscribe?.enabled && (!me.subscribe_count || me.subscribe_count === 0)) {
    h += `<button class="btn btn-secondary" style="margin-bottom:20px;" data-action="checkSub" data-id="${c._id}">${IC.check} Проверить подписку</button>`;
  }

  if (canManage && c.status === 'active') {
    h += '<div class="btn-row" style="margin-bottom:20px">';
    h += `<button class="btn btn-sm btn-danger" data-action="endContest" data-id="${c._id}">${IC.stop} Завершить</button>`;
    h += `<button class="btn btn-sm btn-secondary" style="color:var(--danger); border-color:var(--danger-bg)" data-action="deleteContest" data-id="${c._id}">${IC.trash} Удалить</button>`;
    h += '</div>';
  }

  if (me && me.invite_link && c.scoring?.invites?.enabled) {
    h += '<div class="invite-box">';
    h += `<div class="invite-box-title">${IC.link} Ваша ссылка для приглашений</div>`;
    h += '<div class="invite-box-row">';
    h += `<div class="invite-box-link">${me.invite_link}</div>`;
    h += `<button class="invite-box-copy" data-action="copyInvite" data-link="${me.invite_link}">${IC.copy}</button>`;
    h += '</div>';
    h += `<div class="invite-box-hint">+${c.scoring.invites.points} баллов за каждого друга, присоединившегося по вашей ссылке</div>`;
    h += '</div>';
  }

  h += '<div class="section-title">Информация</div>';
  h += '<div class="card">';
  if (c.description) {
    h += `<div class="info-row"><span class="info-label">Описание</span><span class="info-value">${esc(c.description)}</span></div>`;
  }
  if (c.conditions) {
    h += `<div class="info-row"><span class="info-label">Условия</span><span class="info-value">${esc(c.conditions)}</span></div>`;
  }
  h += `<div class="info-row"><span class="info-label">До</span><span class="info-value">${formatDateMSK(c.end_date)}</span></div>`;
  h += `<div class="info-row"><span class="info-label">Участников</span><span class="info-value">${parts.length}</span></div>`;

  const typeNames = { 'leaderboard': 'Лидерборд', 'random': 'Случайный', 'weighted': 'Взвешенный' };
  h += `<div class="info-row"><span class="info-label">Тип</span><span class="info-value">${typeNames[c.outcome_type] || 'Лидерборд'}</span></div>`;

  if (c.initial_points) {
    h += `<div class="info-row"><span class="info-label">Старт. баллы</span><span class="info-value">${c.initial_points}</span></div>`;
  }
  h += '</div>';

  if (prizes.length > 0) {
    h += '<div class="section-title">Призы</div>';
    h += '<div class="card">';
    const medals = ['m1', 'm2', 'm3'];
    prizes.forEach((p, i) => {
      h += `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i < prizes.length - 1 ? 'border-bottom:1px solid var(--card-border)' : ''}">`;
      h += `<div class="prize-medal ${medals[i] || 'mn'}">${i + 1}</div>`;
      h += `<div style="font-size:15px;font-weight:800">${esc(p)}</div>`;
      h += '</div>';
    });
    h += '</div>';
  }

  const scoring = c.scoring || {};
  const methods = [];
  if (scoring.invites?.enabled) methods.push({ icon: IC.users, text: `Приглашения +${scoring.invites.points}` });
  if (scoring.subscribe?.enabled) methods.push({ icon: IC.bell, text: `Подписка +${scoring.subscribe.points}` });
  if (scoring.ads?.enabled) methods.push({ icon: IC.play, text: `Реклама +${scoring.ads.points}` });

  if (methods.length > 0) {
    h += '<div class="section-title">Способы заработка</div>';
    h += '<div class="scoring-pills">';
    methods.forEach(m => {
      h += `<div class="scoring-pill">${m.icon} ${m.text}</div>`;
    });
    h += '</div>';
  }

  if (me) {
    h += '<div class="section-title">Ваша статистика</div>';
    h += '<div class="stat-row">';
    h += `<div class="stat-box"><div class="stat-box-val">${me.points || 0}</div><div class="stat-box-label">Баллов</div></div>`;
    h += `<div class="stat-box"><div class="stat-box-val">${me.invites_count || 0}</div><div class="stat-box-label">Приглашений</div></div>`;
    h += `<div class="stat-box"><div class="stat-box-val">${me.subscribe_count || 0}</div><div class="stat-box-label">Подписок</div></div>`;
    h += '</div>';
  }

  h += '<div class="section-title">Таблица лидеров</div>';

  if (sorted.length === 0) {
    h += '<div class="card" style="text-align:center;padding:32px;color:var(--text2);font-size:14px;font-weight:600">Пока нет участников</div>';
  } else {
    sorted.forEach((p, i) => {
      const rank = i + 1;
      const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
      const isMe = p.user_id === currentUser.id;

      if (canManage) {
        h += `<div class="lb-item${isMe ? ' me' : ''}" data-action="openParticipant" data-pid="${p._id}" data-cid="${c._id}">`;
      } else {
        h += `<div class="lb-item${isMe ? ' me' : ''}">`;
      }

      h += `<div class="lb-rank ${rankClass}">${rank}</div>`;
      h += avatarHTML(p, 42);
      h += '<div class="lb-info">';
      h += `<div class="lb-name">${esc(p.first_name || 'User')}</div>`;
      if (p.username) {
        h += `<div class="lb-username">@${p.username}</div>`;
      }

      const stats = [];
      if (p.invites_count) stats.push(`<div class="lb-stat">${IC.users} ${p.invites_count}</div>`);
      if (p.subscribe_count) stats.push(`<div class="lb-stat">${IC.bell} ${p.subscribe_count}</div>`);
      if (p.ads_count) stats.push(`<div class="lb-stat">${IC.play} ${p.ads_count}</div>`);
      if (stats.length > 0) {
        h += `<div class="lb-stats">${stats.join('')}</div>`;
      }

      h += '</div>';
      h += `<div class="lb-points-col"><div class="lb-points">${p.points || 0}</div><div class="lb-points-label">баллов</div></div>`;
      h += '</div>';
    });
  }

  h += '</div>';
  return h;
}

// ═══════════════════════════════════════
// RENDER: MANAGE (admin/creator panel)
// ═══════════════════════════════════════
function renderManage() {
  let h = '<div class="app fade-up">';
  h += '<div class="header"><h1>Управление<div class="header-sub">Ваши конкурсы</div></h1></div>';

  h += '<div class="admin-tabs">';
  h += `<div class="admin-tab${state.adminTab === 'all' ? ' active' : ''}" data-action="setAdminTab" data-tab="all">Все</div>`;
  h += `<div class="admin-tab${state.adminTab === 'active' ? ' active' : ''}" data-action="setAdminTab" data-tab="active">Активные</div>`;
  h += `<div class="admin-tab${state.adminTab === 'ended' ? ' active' : ''}" data-action="setAdminTab" data-tab="ended">Завершённые</div>`;
  h += '</div>';

  const tab = state.adminTab || 'all';
  let myContests = state.contests.filter(c => c.creator_id === currentUser.id || currentUser.is_admin);
  if (tab === 'active') myContests = myContests.filter(c => c.status === 'active');
  if (tab === 'ended') myContests = myContests.filter(c => c.status === 'ended');

  if (myContests.length === 0) {
    h += '<div class="empty">';
    h += `<div class="empty-icon">${IC.list}</div>`;
    h += `<div class="empty-title">Нет конкурсов</div>`;
    h += `<div class="empty-desc">${tab === 'ended' ? 'Нет завершённых конкурсов' : 'Создайте конкурс, чтобы управлять им'}</div>`;
    h += '</div>';
  } else {
    myContests.forEach(c => {
      const parts = (state.participants[c._id] || []).length;

      h += '<div class="card">';
      h += `<div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;cursor:pointer" data-action="openContest" data-id="${c._id}">`;
      h += `<div class="ccard-icon" style="width:48px;height:48px;border-radius:12px">${IC.award}</div>`;
      h += '<div style="flex:1;min-width:0">';
      h += `<div style="font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.name)}</div>`;
      h += `<div style="font-size:12px;color:var(--text2);margin-top:4px;font-weight:600">${parts} участн. · ${c.status === 'active' ? timeLeft(c.end_date) : 'Завершён'}</div>`;
      h += '</div>';
      h += `<span class="badge ${c.status === 'active' ? 'badge-live' : 'badge-ended'}">${c.status === 'active' ? 'Live' : 'Завершён'}</span>`;
      h += '</div>';

      h += '<div class="btn-row">';
      h += `<button class="btn btn-sm btn-secondary" data-action="openContest" data-id="${c._id}">${IC.ext} Открыть</button>`;
      if (c.status === 'active') {
        h += `<button class="btn btn-sm btn-danger" data-action="endContest" data-id="${c._id}">${IC.stop} Завершить</button>`;
      }
      h += `<button class="btn btn-sm btn-secondary" style="color:var(--danger); border-color:var(--danger-bg)" data-action="deleteContest" data-id="${c._id}">${IC.trash} Удалить</button>`;
      h += '</div>';
      h += '</div>';
    });
  }

  h += '</div>';
  return h;
}

// ═══════════════════════════════════════
// RENDER: PROFILE
// ═══════════════════════════════════════
function renderProfile() {
  let h = '<div class="app fade-up">';
  h += '<div class="header"><h1>Профиль</h1></div>';

  h += '<div class="card" style="text-align:center;padding:32px 20px; position:relative; overflow:hidden;">';
  h += `<div style="position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:150px;height:150px;background:var(--accent);filter:blur(80px);opacity:0.2;border-radius:50%;pointer-events:none;"></div>`;
  h += `<div style="display:inline-block">${avatarHTML(currentUser, 80)}</div>`;
  h += `<div style="font-size:24px;font-weight:900;letter-spacing:-0.3px;margin-top:16px;text-shadow:0 0 10px rgba(255,255,255,0.1)">${esc(currentUser.first_name)}</div>`;
  if (currentUser.username) {
    h += `<div style="font-size:14px;color:var(--accent);margin-top:6px;font-weight:700">@${currentUser.username}</div>`;
  }
  if (currentUser.is_admin) {
    h += '<span class="header-badge" style="margin-top:14px;display:inline-block">Администратор</span>';
  }
  h += '</div>';

  const myParts = [];
  for (const c of state.contests) {
    const parts = state.participants[c._id] || [];
    const me = parts.find(p => p.user_id === currentUser.id);
    if (me) myParts.push({ contest: c, me });
  }
  const total = myParts.reduce((s, x) => s + (x.me.points || 0), 0);
  const totalInvites = myParts.reduce((s, x) => s + (x.me.invites_count || 0), 0);
  const totalSubscribes = myParts.reduce((s, x) => s + (x.me.subscribe_count || 0), 0);

  h += '<div class="stat-row">';
  h += `<div class="stat-box"><div class="stat-box-val">${myParts.length}</div><div class="stat-box-label">Конкурсов</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${total}</div><div class="stat-box-label">Баллов</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${totalInvites}</div><div class="stat-box-label">Приглашений</div></div>`;
  h += '</div>';

  h += '<div class="section-title">Статистика</div>';
  h += '<div class="card">';
  h += `<div class="info-row"><span class="info-label">Telegram ID</span><span class="info-value" style="color:var(--accent)">${currentUser.id}</span></div>`;
  h += `<div class="info-row"><span class="info-label">Подписок всего</span><span class="info-value">${totalSubscribes}</span></div>`;
  h += `<div class="info-row"><span class="info-label">Приглашений всего</span><span class="info-value">${totalInvites}</span></div>`;
  h += '</div>';

  if (myParts.length > 0) {
    h += '<div class="section-title">Мои конкурсы</div>';
    myParts.forEach(({ contest: c, me }) => {
      h += `<div class="card card-clickable" data-action="openContest" data-id="${c._id}">`;
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += `<div style="font-size:15px;font-weight:800">${esc(c.name)}</div>`;
      h += `<div style="font-size:18px;font-weight:900;color:var(--accent)">${me.points || 0} б.</div>`;
      h += '</div></div>';
    });
  }

  h += '</div>';
  return h;
}

// ═══════════════════════════════════════
// RENDER: MODAL (participant management)
// ═══════════════════════════════════════
function renderModal() {
  if (state.modal?.type !== 'participant') return '';

  const p = state.modal.participant;
  const c = state.modal.contest;
  if (!p || !c) return '';

  let h = `<div class="modal-overlay" data-action="closeModal">`;
  h += `<div class="modal" onclick="event.stopPropagation()">`;
  h += '<div class="modal-handle"></div>';

  h += '<div style="text-align:center;margin-bottom:24px">';
  h += `<div style="display:inline-block">${avatarHTML(p, 64)}</div>`;
  h += `<div class="modal-title" style="margin-top:12px">${esc(p.first_name || 'User')}</div>`;
  if (p.username) h += `<div class="modal-subtitle">@${p.username}</div>`;
  h += '</div>';

  h += '<div class="stat-row">';
  h += `<div class="stat-box"><div class="stat-box-val">${p.points || 0}</div><div class="stat-box-label">Баллов</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${p.invites_count || 0}</div><div class="stat-box-label">Приглаш.</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${p.subscribe_count || 0}</div><div class="stat-box-label">Подписок</div></div>`;
  h += '</div>';

  h += '<div class="section-title" style="margin-top:16px">Начислить</div>';

  if (c.scoring?.invites?.enabled) {
    h += `<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;padding:14px;background:var(--section-bg);border-radius:var(--radius-xs); border:1px solid var(--card-border)">`;
    h += `<div style="flex:1"><div style="font-size:14px;font-weight:800">Приглашения</div>`;
    h += `<div style="font-size:12px;color:var(--accent)">+${c.scoring.invites.points} баллов × кол-во</div></div>`;
    h += `<input class="form-input" id="modal-inv" type="number" min="1" value="1" style="width:70px;text-align:center;padding:12px">`;
    h += `<button class="btn btn-sm btn-primary" data-action="addPoints" data-type="invites" data-pid="${p._id}" data-cid="${c._id}">${IC.plus}</button>`;
    h += '</div>';
  }

  if (c.scoring?.subscribe?.enabled) {
    h += `<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;padding:14px;background:var(--section-bg);border-radius:var(--radius-xs); border:1px solid var(--card-border)">`;
    h += `<div style="flex:1"><div style="font-size:14px;font-weight:800">Подписка</div>`;
    h += `<div style="font-size:12px;color:var(--accent)">+${c.scoring.subscribe.points} баллов × кол-во</div></div>`;
    h += `<input class="form-input" id="modal-sub" type="number" min="1" value="1" style="width:70px;text-align:center;padding:12px">`;
    h += `<button class="btn btn-sm btn-primary" data-action="addPoints" data-type="subscribe" data-pid="${p._id}" data-cid="${c._id}">${IC.plus}</button>`;
    h += '</div>';
  }

  if (c.scoring?.ads?.enabled) {
    h += `<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;padding:14px;background:var(--section-bg);border-radius:var(--radius-xs); border:1px solid var(--card-border)">`;
    h += `<div style="flex:1"><div style="font-size:14px;font-weight:800">Просмотры</div>`;
    h += `<div style="font-size:12px;color:var(--accent)">+${c.scoring.ads.points} баллов × кол-во</div></div>`;
    h += `<input class="form-input" id="modal-ads" type="number" min="1" value="1" style="width:70px;text-align:center;padding:12px">`;
    h += `<button class="btn btn-sm btn-primary" data-action="addPoints" data-type="ads" data-pid="${p._id}" data-cid="${c._id}">${IC.plus}</button>`;
    h += '</div>';
  }

  h += '<div class="divider"></div>';
  h += `<div style="display:flex;gap:8px;align-items:center;padding:14px;background:var(--section-bg);border-radius:var(--radius-xs); border:1px solid var(--card-border)">`;
  h += `<div style="flex:1"><div style="font-size:14px;font-weight:800">Вручную</div>`;
  h += `<div style="font-size:12px;color:var(--text2)">Изменение баллов</div></div>`;
  h += `<input class="form-input" id="modal-manual" type="number" min="1" value="1" style="width:70px;text-align:center;padding:12px; flex-shrink:0;">`;
  h += `<button class="btn btn-sm btn-danger" data-action="removeManualPoints" data-pid="${p._id}" data-cid="${c._id}" style="padding:12px; flex-shrink:0;">${IC.minus}</button>`;
  h += `<button class="btn btn-sm btn-success" data-action="addManualPoints" data-pid="${p._id}" data-cid="${c._id}" style="padding:12px; flex-shrink:0;">${IC.plus}</button>`;
  h += '</div>';

  h += '<div class="modal-actions">';
  if (p.username) {
    h += `<a href="https://t.me/${p.username}" target="_blank" class="btn btn-secondary" style="text-decoration:none">${IC.ext} Профиль</a>`;
  }
  h += `<button class="btn btn-secondary" data-action="closeModal">Закрыть</button>`;
  h += '</div></div></div>';
  return h;
}

// RENDER: TAB BAR
// ═══════════════════════════════════════
function renderTabBar() {
  const isCreatorOrAdmin = currentUser.is_admin || state.contests.some(c => c.creator_id === currentUser.id);
  const cols = isCreatorOrAdmin ? 5 : 4;

  let h = `<nav class="tab-bar${cols === 4 ? ' cols-4' : ''}">`;

  h += `<div class="tab${state.screen === 'home' ? ' active' : ''}" data-action="nav" data-screen="home">`;
  h += `${IC.home}<span>Главная</span></div>`;

  h += `<div class="tab${state.screen === 'points' ? ' active' : ''}" data-action="nav" data-screen="points">`;
  h += `${IC.star}<span>Баллы</span></div>`;

  h += `<div class="tab${state.screen === 'create' ? ' active' : ''}" data-action="nav" data-screen="create">`;
  h += `${IC.plus}<span>Создать</span></div>`;

  if (isCreatorOrAdmin) {
    h += `<div class="tab${state.screen === 'manage' ? ' active' : ''}" data-action="nav" data-screen="manage">`;
    h += `${IC.settings}<span>Управление</span></div>`;
  }

  h += `<div class="tab${state.screen === 'profile' ? ' active' : ''}" data-action="nav" data-screen="profile">`;
  h += `${IC.user}<span>Профиль</span></div>`;

  h += '</nav>';
  return h;
}

// ═══════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = el.dataset.action; 

      if (action === 'nav') {
        const screen = el.dataset.screen;
        if (screen === 'create') {
          state.formData = { prizes: [''], outcome_type: 'leaderboard' };
        }
        state.screen = screen;
        state.selectedContest = null;
        render();
        window.scrollTo(0, 0);
        return;
      }

      if (action === 'goHome') {
        state.screen = 'home';
        state.selectedContest = null;
        render();
        window.scrollTo(0, 0);
        return;
      }

      if (action === 'openContest') {
        state.selectedContest = el.dataset.id;
        state.screen = 'detail';
        render();
        window.scrollTo(0, 0);
        return;
      }

      if (action === 'checkSub') {
        const contest = state.contests.find(c => c._id === el.dataset.id);
        const parts = state.participants[contest._id] || [];
        const me = parts.find(p => p.user_id === currentUser.id);

        if (contest && me) {
           const res = await tgApi('getChatMember', { chat_id: contest.channel_id, user_id: currentUser.id });
           if (res.ok && ['member', 'administrator', 'creator'].includes(res.result.status)) {
              const extra = contest.scoring.subscribe.points || 0;
              await fbSet('participants', me._id, {
                  points: (me.points || 0) + extra,
                  subscribe_count: 1
              });
              toast('Баллы за подписку успешно начислены!', 'success');
           } else {
              toast('Вы всё ещё не подписаны на канал.', 'error');
           }
        }
        return;
      }

      if (action === 'addBotToChannel') {
        const url = `https://t.me/${BOT_USERNAME}?startchannel&admin=post_messages+edit_messages+delete_messages+invite_users`;
        if (window.Telegram?.WebApp?.openTelegramLink) {
           window.Telegram.WebApp.openTelegramLink(url);
        } else {
           window.open(url, '_blank');
        }
        return;
      }

      if (action === 'scanChannels') {
        toast('Ищем каналы...');
        await scanForChannels();
        await loadChannels();
        if (state.channels.length > 0) {
          toast(`Найдено каналов: ${state.channels.length}`);
        } else {
          toast('Каналы не найдены. Добавьте бота в канал и нажмите ещё раз', 'error');
        }
        render();
        return;
      }

      if (action === 'selectChannel') {
        collectFormData();
        state.formData.channel_id = String(el.dataset.chatid);
        state.formData.channel_title = el.dataset.title;
        state.formData.channel_username = el.dataset.username;
        render();
        return;
      }

      if (action === 'addPrize') {
        collectFormData();
        state.formData.prizes = (state.formData.prizes || ['']).concat(['']);
        render();
        return;
      }

      if (action === 'removePrize') {
        collectFormData();
        state.formData.prizes.splice(parseInt(el.dataset.idx), 1);
        render();
        return;
      }

      if (action === 'submitContest') {
        collectFormData();
        const ok = await createContest(state.formData);
        if (ok) {
          state.screen = 'home';
          state.formData = { prizes: [''], outcome_type: 'leaderboard' };
          render();
        }
        return;
      }

      if (action === 'joinContest') {
        await joinContest(el.dataset.id);
        return;
      }

      if (action === 'endContest') {
        await endContest(el.dataset.id);
        return;
      }

      if (action === 'deleteContest') {
        await deleteContest(el.dataset.id);
        return;
      }

      if (action === 'copyInvite') {
        try {
          await navigator.clipboard.writeText(el.dataset.link);
          toast('Ссылка скопирована!');
        } catch (err) {
          const ta = document.createElement('textarea');
          ta.value = el.dataset.link;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          toast('Ссылка скопирована!');
        }
        return;
      }

      if (action === 'openParticipant') {
        const parts = state.participants[el.dataset.cid] || [];
        const part = parts.find(p => p._id === el.dataset.pid);
        const contest = state.contests.find(c => c._id === el.dataset.cid);
        state.modal = { type: 'participant', participant: part, contest };
        render();
        return;
      }

      if (action === 'closeModal') {
        state.modal = null;
        render();
        return;
      }

      if (action === 'addPoints') {
        const type = el.dataset.type;
        const inputId = type === 'invites' ? 'modal-inv' : type === 'subscribe' ? 'modal-sub' : 'modal-ads';
        const count = parseInt(document.getElementById(inputId)?.value) || 1;
        const contest = state.contests.find(c => c._id === el.dataset.cid);
        await addPointsToParticipant(el.dataset.pid, type, count, contest);
        return;
      }

      if (action === 'removeManualPoints') {
        const count = parseInt(document.getElementById('modal-manual')?.value) || 1;
        const cid = el.dataset.cid;
        const parts = state.participants[cid] || [];
        const part = parts.find(p => p._id === el.dataset.pid);
        if (part) {
          const newPoints = Math.max(0, (part.points || 0) - count);
          await fbSet('participants', el.dataset.pid, { points: newPoints });
          part.points = newPoints;
          toast(`-${count} баллов вручную`, 'success');
          const contest = state.contests.find(c => c._id === cid);
          state.modal = { type: 'participant', participant: part, contest };
          render();
        }
        return;
      }

      if (action === 'addManualPoints') {
        const count = parseInt(document.getElementById('modal-manual')?.value) || 1;
        const cid = el.dataset.cid;
        const parts = state.participants[cid] || [];
        const part = parts.find(p => p._id === el.dataset.pid);
        if (part) {
          await fbSet('participants', el.dataset.pid, { points: (part.points || 0) + count });
          part.points = (part.points || 0) + count;
          toast(`+${count} баллов вручную`);
          const contest = state.contests.find(c => c._id === cid);
          state.modal = { type: 'participant', participant: part, contest };
          render();
        }
        return;
      }

      if (action === 'setAdminTab') {
        state.adminTab = el.dataset.tab;
        render();
        return;
      }
    });
  });

  [
    { id: 'f-inv-on', sub: 'inv-sub' },
    { id: 'f-sub-on', sub: 'sub-sub' },
    { id: 'f-ads-on', sub: 'ads-sub' }
  ].forEach(t => {
    const el = document.getElementById(t.id);
    if (el) {
      el.addEventListener('change', () => {
        const sub = document.getElementById(t.sub);
        if (sub) sub.classList.toggle('show', el.checked);
      });
    }
  });

  const outcomeEl = document.getElementById('f-outcome');
  if (outcomeEl) {
    outcomeEl.addEventListener('change', () => {
      collectFormData();
      render();
    });
  }
}

// ═══════════════════════════════════════
// COLLECT FORM DATA (before re-render)
// ═══════════════════════════════════════
function collectFormData() {
  const fd = state.formData;
  const g = id => document.getElementById(id);

  if (g('f-name')) fd.name = g('f-name').value;
  if (g('f-desc')) fd.description = g('f-desc').value;
  if (g('f-cond')) fd.conditions = g('f-cond').value;
  if (g('f-date')) fd.end_date = g('f-date').value;
  if (g('f-btn')) fd.button_text = g('f-btn').value;
  if (g('f-init')) fd.initial_points = g('f-init').value;
  if (g('f-outcome')) fd.outcome_type = g('f-outcome').value;
  if (g('f-thresh')) fd.threshold = g('f-thresh').value;
  if (g('f-inv-on')) fd.invites_enabled = g('f-inv-on').checked;
  if (g('f-inv-pts')) fd.invites_points = g('f-inv-pts').value;
  if (g('f-sub-on')) fd.subscribe_enabled = g('f-sub-on').checked;
  if (g('f-sub-pts')) fd.subscribe_points = g('f-sub-pts').value;
  if (g('f-ads-on')) fd.ads_enabled = g('f-ads-on').checked;
  if (g('f-ads-pts')) fd.ads_points = g('f-ads-pts').value;

  const prizeInputs = document.querySelectorAll('.prize-input');
  if (prizeInputs.length > 0) {
    fd.prizes = Array.from(prizeInputs).map(el => el.value);
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  // 1. Показываем экран загрузки
  render(); 
  
  try {
    initTg();
    await initFirebase();

    if (fbReady) {
      // Блокируем множественные рендеры
      isInitialRender = true;
      
      // Ждем первичные данные
      await Promise.all([
        loadChannels(),
        loadContests()
      ]);
      
      const params = new URLSearchParams(window.location.search);
      const startappData = tgStartParam || params.get('startapp') || params.get('contest');
      
      if (startappData) {
        if (startappData.includes('_')) {
          const parts = startappData.split('_');
          state.selectedContest = parts[0];
          state.referrerId = parts[1];
          // Сразу фиксируем реферала в базе, на случай если он сейчас закроет апп и уйдет в канал подписываться
          if (currentUser.id && state.selectedContest && state.referrerId) {
             fbSet('pending_referrals', `${currentUser.id}_${state.selectedContest}`, {
               referrerId: state.referrerId,
               timestamp: new Date().toISOString()
             }).catch(e => console.error(e));
          }
        } else {
          state.selectedContest = startappData;
        }
        state.screen = 'detail';
        await loadParticipants(state.selectedContest);
      }

      const pPromises = state.contests.map(c => loadParticipants(c._id));
      await Promise.all(pPromises);

      startContestsListener();
      state.contests.forEach(c => startParticipantsListener(c._id));
      
      scanForChannels().then(() => {
          loadChannels();
      });

      getUserPhoto(currentUser.id);
      setInterval(autoEndContests, 30000);
      
      setTimeout(() => {
         isInitialRender = false;
      }, 500);
    }

    // 2. Снимаем загрузку и рисуем всё один раз
    state.loading = false;
    render(); 

  } catch (e) {
    console.error('Init error:', e);
    state.loading = false;
    render();
    toast('Произошла ошибка при загрузке', 'error');
  }
}

init();
</script>
