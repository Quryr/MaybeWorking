<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FFFFFF;--bg2:#F6F6F8;--bg3:#EDEDF0;
--border:#E2E2E6;--border2:#CCCCD0;
--text:#111111;--text2:#5A5A65;--text3:#9A9AA5;
--black:#111111;--white:#FFFFFF;
--green:#22C55E;--red:#EF4444;--orange:#F59E0B;
--gold:#C5970A;--silver:#8E8E93;--bronze:#B5651D;
--r:16px;--r-sm:12px;--r-xs:8px;
--sh:0 1px 3px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.03);
--sh-md:0 2px 8px rgba(0,0,0,0.05),0 8px 24px rgba(0,0,0,0.06);
}
html,body{
font-family:'Inter',system-ui,-apple-system,sans-serif;
background:var(--bg);color:var(--text);
-webkit-font-smoothing:antialiased;
overflow-x:hidden;min-height:100vh;
}
body{padding-bottom:calc(90px + env(safe-area-inset-bottom,0px))}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.an-fu{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
.an-si{animation:scaleIn .4s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}
.d7{animation-delay:.28s}.d8{animation-delay:.32s}

/* === BACK BUTTON === */
.back-btn{
display:inline-flex;align-items:center;gap:6px;
padding:8px 16px 8px 10px;margin-bottom:16px;
background:var(--bg2);border:1px solid var(--border);
border-radius:24px;font-size:13px;font-weight:600;
color:var(--text2);cursor:pointer;
transition:all .15s ease;
-webkit-tap-highlight-color:transparent;
}
.back-btn:active{transform:scale(0.96);background:var(--bg3)}
.back-btn svg{width:16px;height:16px}

.page{min-height:100vh;padding:20px 18px 28px}
.page-head{margin-bottom:22px}
.page-title{font-size:28px;font-weight:900;letter-spacing:-.6px;line-height:1.1}
.page-sub{font-size:14px;color:var(--text3);margin-top:5px;line-height:1.4}

/* === CONTEST CARD — premium redesign === */
.ccard{
background:var(--white);
border:1px solid var(--border);
border-radius:var(--r);
padding:0;overflow:hidden;
box-shadow:var(--sh);
transition:all .2s ease;
cursor:pointer;
-webkit-tap-highlight-color:transparent;
}
.ccard:active{transform:scale(0.985);box-shadow:var(--sh-md)}
.ccard+.ccard{margin-top:12px}
.ccard-top{
display:flex;align-items:stretch;
}
.ccard-icon{
width:80px;min-height:80px;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;position:relative;overflow:hidden;
border-right:1px solid var(--border);
}
.ccard-content{
flex:1;padding:16px 16px 14px;min-width:0;
display:flex;flex-direction:column;justify-content:center;
}
.ccard-name{
font-size:16px;font-weight:800;letter-spacing:-.3px;
line-height:1.25;margin-bottom:4px;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ccard-channel{
font-size:13px;color:var(--text3);font-weight:500;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ccard-bottom{
display:flex;align-items:center;justify-content:space-between;
padding:10px 16px;border-top:1px solid var(--border);
background:var(--bg2);
}
.ccard-meta{
display:flex;align-items:center;gap:12px;
font-size:12px;color:var(--text3);font-weight:500;
}
.ccard-meta-item{display:flex;align-items:center;gap:4px}
.ccard-meta-item svg{width:13px;height:13px;opacity:.6}

/* === GENERATIVE CONTEST ICON === */
.gen-icon{width:100%;height:100%;position:relative}
.gen-icon svg{width:100%;height:100%}

.card{
background:var(--white);border:1px solid var(--border);
border-radius:var(--r);padding:16px;
box-shadow:var(--sh);transition:all .2s ease;
}
.card:active{transform:scale(0.985)}
.card+.card{margin-top:10px}
.card-row{display:flex;align-items:center;gap:12px}
.card-body{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:2px}
.card-desc{font-size:13px;color:var(--text3);line-height:1.3}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

.ib{
width:40px;height:40px;border-radius:12px;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;
}
.ib svg{width:18px;height:18px}
.ib-black{background:var(--black);color:var(--white)}
.ib-soft{background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
.ib-sm{width:34px;height:34px;border-radius:10px}
.ib-sm svg{width:15px;height:15px}

.bdg{
display:inline-flex;align-items:center;gap:4px;
padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
letter-spacing:.3px;text-transform:uppercase;
}
.bdg-live{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.bdg-ended{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.bdg-pts{background:var(--black);color:var(--white);font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:5px 12px;text-transform:none;letter-spacing:0}
.bdg-g{background:#FEF9C3;color:var(--gold);border:1px solid #FDE68A}
.bdg-s{background:#F4F4F5;color:var(--silver);border:1px solid #D4D4D8}
.bdg-b{background:#FFF7ED;color:var(--bronze);border:1px solid #FDBA74}
.bdg-dot{width:6px;height:6px;border-radius:3px;background:currentColor;animation:dotPulse 2s infinite}

.btn{
display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;padding:14px 22px;border:none;border-radius:var(--r-sm);
font-family:inherit;font-size:15px;font-weight:700;
cursor:pointer;transition:all .15s ease;
-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.975)}
.btn svg{width:18px;height:18px;flex-shrink:0}
.btn-black{background:var(--black);color:var(--white)}
.btn-black:hover{background:#333}
.btn-soft{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:var(--white)}
.btn-sm{padding:10px 14px;font-size:13px;border-radius:var(--r-xs)}

.field{margin-bottom:16px}
.field-label{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.2px}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px}
.inp{
width:100%;padding:12px 16px;border:1.5px solid var(--border);
border-radius:var(--r-sm);font-family:inherit;font-size:15px;
background:var(--white);color:var(--text);transition:border-color .2s;
-webkit-appearance:none;
}
.inp:focus{outline:none;border-color:var(--black)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer}

.tgl-row{
display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;background:var(--bg2);border-radius:var(--r-sm);
margin-bottom:8px;border:1px solid var(--border);
}
.tgl-label{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.tgl-label svg{width:18px;height:18px;color:var(--text3)}
.tgl{
position:relative;width:48px;height:28px;
background:var(--border2);border-radius:14px;
cursor:pointer;transition:background .25s;
flex-shrink:0;border:none;
}
.tgl.on{background:var(--black)}
.tgl::after{
content:'';position:absolute;top:2px;left:2px;
width:24px;height:24px;border-radius:12px;
background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,0.15);
transition:transform .25s cubic-bezier(.22,1,.36,1);
}
.tgl.on::after{transform:translateX(20px)}
.tgl-sub{
padding:14px 16px;background:var(--white);
border:1px solid var(--border);border-radius:var(--r-sm);
margin-bottom:8px;margin-top:-4px;
}
.tgl-sub .field{margin-bottom:0}

.ava{
width:42px;height:42px;border-radius:21px;
display:flex;align-items:center;justify-content:center;
font-size:15px;font-weight:700;color:var(--white);
flex-shrink:0;letter-spacing:-.3px;
}
.ava-sm{width:34px;height:34px;border-radius:17px;font-size:12px}
.ava-lg{width:56px;height:56px;border-radius:28px;font-size:20px}
.ava-xl{width:80px;height:80px;border-radius:24px;font-size:28px}

.lb{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.lb-item{
display:flex;align-items:center;gap:12px;
padding:14px 16px;cursor:pointer;
transition:background .15s;border-bottom:1px solid var(--border);
}
.lb-item:last-child{border-bottom:none}
.lb-item:active{background:var(--bg2)}
.lb-rank{
width:30px;text-align:center;font-size:14px;font-weight:800;
color:var(--text3);flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-user{font-size:12px;color:var(--text3);margin-top:1px}
.lb-pts{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.lb-1{background:#FFFDE7}.lb-1 .lb-rank{color:var(--gold)}
.lb-2{background:#FAFAFA}.lb-2 .lb-rank{color:var(--silver)}
.lb-3{background:#FFF8F0}.lb-3 .lb-rank{color:var(--bronze)}
.lb-me{background:#F0F4FF}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat{
text-align:center;padding:18px 10px;
background:var(--bg2);border-radius:var(--r-sm);
border:1px solid var(--border);
}
.stat-val{font-size:24px;font-weight:900;letter-spacing:-.5px;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

.sec{margin-bottom:22px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:18px;font-weight:800;letter-spacing:-.3px}

/* Hero */
.hero{
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:32px 24px;margin-bottom:22px;
text-align:center;
}
.hero-icon{
width:60px;height:60px;border-radius:18px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
margin:0 auto 16px;
box-shadow:0 4px 20px rgba(0,0,0,0.12);
}
.hero-icon svg{width:26px;height:26px}
.hero-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--text3);line-height:1.5}
.hero-chip{
display:inline-flex;align-items:center;gap:6px;
padding:6px 14px;background:var(--white);border:1px solid var(--border);
border-radius:20px;font-size:12px;font-weight:600;color:var(--text2);margin-top:14px;
}

.ref-block{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
padding:18px;margin-top:14px;
}
.ref-link{
display:flex;align-items:center;gap:8px;
padding:12px 14px;background:var(--white);border:1.5px dashed var(--border2);
border-radius:var(--r-sm);margin:10px 0 0;
font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);
word-break:break-all;line-height:1.4;
}
.ref-link-text{flex:1}
.ref-copy{
width:38px;height:38px;border-radius:12px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
border:none;cursor:pointer;flex-shrink:0;
transition:transform .15s;
}
.ref-copy:active{transform:scale(.9)}
.ref-copy svg{width:16px;height:16px}

.prize-item{
display:flex;align-items:center;gap:10px;
padding:12px 14px;background:var(--bg2);
border-radius:var(--r-xs);margin-bottom:6px;
border:1px solid var(--border);
}
.prize-num{
width:28px;height:28px;border-radius:14px;
display:flex;align-items:center;justify-content:center;
font-size:12px;font-weight:800;flex-shrink:0;
background:var(--bg3);color:var(--text2);
}
.prize-text{flex:1;font-size:14px;font-weight:600}
.prize-del{
width:28px;height:28px;border-radius:14px;
display:flex;align-items:center;justify-content:center;
background:var(--bg3);border:none;cursor:pointer;
color:var(--text3);transition:all .15s;
}
.prize-del:hover{background:var(--red);color:var(--white)}
.prize-del svg{width:14px;height:14px}

/* Detail header */
.dh{
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:22px;margin-bottom:18px;
}
.dh-channel{
display:inline-flex;align-items:center;gap:5px;
padding:5px 12px;background:var(--white);border:1px solid var(--border);
border-radius:18px;font-size:12px;font-weight:600;color:var(--text2);
margin-bottom:12px;
}
.dh-channel svg{width:14px;height:14px}
.dh-name{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:8px}
.dh-desc{font-size:14px;color:var(--text2);line-height:1.55;margin-bottom:14px}
.dh-meta{display:flex;flex-wrap:wrap;gap:6px}
.dh-actions{display:flex;gap:8px;margin-top:16px}

/* Admin contest card */
.ac{
border:1px solid var(--border);border-radius:var(--r);
padding:18px;margin-bottom:12px;background:var(--white);
box-shadow:var(--sh);
}
.ac-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.ac-title{font-size:16px;font-weight:800;line-height:1.25}
.ac-sub{font-size:12px;color:var(--text3);margin-top:3px}
.ac-btns{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.ac-btn{
padding:8px 14px;border-radius:var(--r-xs);
font-size:12px;font-weight:700;border:1px solid var(--border);
background:var(--white);cursor:pointer;transition:all .15s;
display:flex;align-items:center;gap:5px;font-family:inherit;
}
.ac-btn:active{transform:scale(.96)}
.ac-btn svg{width:14px;height:14px}
.ac-btn-red{border-color:#FCA5A5;color:var(--red);background:#FEF2F2}
.ac-btn-del{border-color:#FCA5A5;color:var(--red);background:#FEF2F2}

.sc-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sc{
display:inline-flex;align-items:center;gap:4px;
padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;
}
.sc svg{width:12px;height:12px}
.sc-on{background:#ECFDF5;border:1px solid #A7F3D0;color:#166534}
.sc-off{background:var(--bg2);border:1px solid var(--border);color:var(--text3);text-decoration:line-through}

.toast{
position:fixed;top:16px;left:16px;right:16px;z-index:9999;
padding:15px 20px;border-radius:var(--r-sm);
font-size:14px;font-weight:700;
animation:fadeUp .3s ease;
box-shadow:var(--sh-md);
}
.toast-ok{background:var(--black);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{
padding:8px 16px;border-radius:22px;font-size:13px;font-weight:700;
white-space:nowrap;border:1.5px solid var(--border);
background:var(--white);color:var(--text2);cursor:pointer;
transition:all .15s;flex-shrink:0;
}
.tab.on{background:var(--black);color:var(--white);border-color:var(--black)}

.divider{height:1px;background:var(--border);margin:18px 0}

.notice{
padding:14px 16px;border-radius:var(--r-xs);
font-size:12px;line-height:1.5;display:flex;gap:8px;align-items:flex-start;
}
.notice svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.notice-warn{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.notice-info{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}

/* === TABBAR — 5 equal, pixel-perfect === */
.tabbar{
position:fixed;bottom:0;left:0;right:0;
background:rgba(255,255,255,0.97);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-top:1px solid var(--border);
display:grid;grid-template-columns:repeat(5,1fr);
padding:0 0 env(safe-area-inset-bottom,0px);
z-index:100;
}
.tb{
display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:4px;padding:10px 0 8px;
cursor:pointer;border:none;background:none;
-webkit-tap-highlight-color:transparent;
position:relative;
}
.tb svg{width:22px;height:22px;color:var(--text3);transition:color .15s}
.tb-label{font-size:10px;font-weight:500;color:var(--text3);transition:color .15s;line-height:1}
.tb.on svg{color:var(--black)}
.tb.on .tb-label{color:var(--black);font-weight:800}
.tb.on::before{
content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
width:32px;height:3px;background:var(--black);border-radius:0 0 3px 3px;
}
/* Center create button */
.tb-center{padding-top:0}
.tb-center-circle{
width:50px;height:50px;border-radius:50%;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
border:3px solid var(--white);
box-shadow:0 2px 16px rgba(0,0,0,0.18);
margin-top:-18px;transition:transform .15s;
}
.tb-center-circle:active{transform:scale(0.92)}
.tb-center-circle svg{width:26px;height:26px;color:var(--white)!important}
.tb-center .tb-label{margin-top:3px}

.flex{display:flex}.items-c{align-items:center}.justify-b{justify-content:space-between}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}
.mt-6{margin-top:6px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.tc{text-align:center}.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w-full{width:100%}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.click{cursor:pointer;-webkit-tap-highlight-color:transparent}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:0;height:0}

.pm{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.pm-item{
display:flex;align-items:center;gap:12px;padding:16px 18px;
cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);
}
.pm-item:last-child{border-bottom:none}
.pm-item:active{background:var(--bg2)}
.pm-body{flex:1;min-width:0}
.pm-title{font-size:14px;font-weight:700}
.pm-desc{font-size:12px;color:var(--text3);margin-top:2px}
.pm-arrow{color:var(--text3)}
.pm-arrow svg{width:16px;height:16px}

.empty{text-align:center;padding:56px 24px}
.empty-icon{width:60px;height:60px;border-radius:18px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.empty-icon svg{width:26px;height:26px;color:var(--text3)}
.empty-title{font-size:17px;font-weight:800;margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.5}
</style>

// ╔══════════════════════════════════════════════════════════════╗

const BOT_TOKEN='8031008647:AAFWbpZ-OQeIUwPbWOmBxCzeYVA_yh_AjC8';

async function loadContests(){
  if(!useFirebase){contests=JSON.parse(JSON.stringify(DEMO_CONTESTS));return}
  try{
    const snap=await db.collection('contests').get();
    contests=[];
    snap.forEach(doc=>{const d=doc.data();d.id=doc.id;if(!d.participants)d.participants=[];contests.push(d)});
  }catch(e){console.error(e);contests=JSON.parse(JSON.stringify(DEMO_CONTESTS))}
}

async function saveContest(data){
  data.participants=data.participants||[];
  if(!useFirebase){data.id='c'+Date.now();contests.push(data);return data}
  try{
    const ref=await db.collection('contests').add(data);
    data.id=ref.id;contests.push(data);return data;
  }catch(e){console.error(e);toast('Ошибка сохранения','err');return null}
}

async function updateContest(id,updates){
  const c=contests.find(x=>x.id===id);if(!c)return;
  Object.assign(c,updates);
  if(!useFirebase)return;
  try{await db.collection('contests').doc(id).update(updates)}catch(e){console.error(e)}
}

async function deleteContest(id){
  contests=contests.filter(x=>x.id!==id);
  if(!useFirebase)return;
  try{await db.collection('contests').doc(id).delete()}catch(e){console.error(e)}
}

async function joinContest(contestId,user){
  const c=contests.find(x=>x.id===contestId);if(!c)return;
  if(c.participants.find(p=>p.tgId===user.id))return;
  const p={tgId:user.id,name:user.first_name||'User',username:user.username||'',points:c.initialPoints||0};
  c.participants.push(p);
  if(!useFirebase)return;
  try{await db.collection('contests').doc(contestId).update({participants:c.participants})}catch(e){console.error(e)}
}

async function sendPost(channel,name,desc,conditions,prizes,endDate){
  const ch=channel.startsWith('@')?channel:'@'+channel;
  let text=`<b>🎉 Новый конкурс!</b>\n\n<b>${name}</b>`;
  if(desc)text+=`\n${desc}`;
  if(conditions)text+=`\n\n<b>Условия:</b> ${conditions}`;
  if(prizes&&prizes.length){text+='\n\n<b>Призы:</b>';prizes.forEach((p,i)=>text+=`\n${i+1}. ${p}`)}
  if(endDate){const d=new Date(endDate);text+=`\n\n<b>До:</b> ${d.toLocaleString('ru-RU',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})} МСК`}
  try{
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:ch,text,parse_mode:'HTML',
        reply_markup:{inline_keyboard:[[{text:'Участвовать',web_app:{url:MINI_APP_URL}}]]}
      })
    });
  }catch(e){console.error('Ошибка отправки поста:',e)}
}

// Отправка итогов в канал с кнопкой "Посмотреть итоги"
async function sendResultsPost(contest){
  const ch=contest.channel.startsWith('@')?contest.channel:'@'+contest.channel;
  const sorted=[...contest.participants].sort((a,b)=>b.points-a.points);
  
  let text=`<b>Конкурс завершён!</b>\n\n<b>${contest.name}</b>\n`;
  
  if(sorted.length>0){
    text+='\n<b>Победители:</b>';
    const medals=['🥇','🥈','🥉'];
    const topN=Math.min(contest.winnersCount||1,sorted.length);
    for(let i=0;i<topN;i++){
      const p=sorted[i];
      const medal=medals[i]||`${i+1}.`;
      const mention=p.username?`@${p.username}`:p.name;
      text+=`\n${medal} ${mention} — ${p.points} баллов`;
    }
    text+=`\n\n<b>Всего участников:</b> ${sorted.length}`;
  }else{
    text+='\nУчастников не было.';
  }

  try{
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:ch,text,parse_mode:'HTML',
        reply_markup:{inline_keyboard:[[{text:'Посмотреть итоги',web_app:{url:MINI_APP_URL+'?contest='+contest.id}}]]}
      })
    });
  }catch(e){console.error('Ошибка отправки итогов:',e)}
}

function timeLeft(date){
  const diff=new Date(date)-new Date();if(diff<=0)return'Завершён';
  const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000);
  if(d>0)return`${d}д ${h}ч`;if(h>0)return`${h}ч ${m}м`;return`${m}м`;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return Math.abs(h)}

function generateContestIcon(name){
  const h=hashStr(name);
  const hue1=(h%360);
  const hue2=((h*7)%360);
  const c1=`hsl(${hue1},15%,88%)`;
  const c2=`hsl(${hue2},15%,82%)`;
  const c3=`hsl(${hue1},8%,92%)`;
  
  // Generate unique geometric pattern
  const shapes=[];
  const numShapes=3+h%3;
  
  for(let i=0;i<numShapes;i++){
    const seed=(h*(i+1)*17)%1000;
    const x=10+(seed%60);
    const y=10+((seed*3)%60);
    const size=12+(seed%20);
    const type=seed%4;
    const opacity=0.25+((seed%40)/100);
    const strokeW=1.5+((seed%3)*0.5);
    const color=`hsl(${(hue1+i*40)%360},20%,55%)`;
    
    if(type===0){
      // Circle
      shapes.push(`<circle cx="${x}" cy="${y}" r="${size/2}" fill="none" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}"/>`);
    }else if(type===1){
      // Diamond
      const s=size/2;
      shapes.push(`<polygon points="${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}" fill="none" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}"/>`);
    }else if(type===2){
      // Line cross
      shapes.push(`<line x1="${x-size/2}" y1="${y}" x2="${x+size/2}" y2="${y}" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}"/>`);
      shapes.push(`<line x1="${x}" y1="${y-size/2}" x2="${x}" y2="${y+size/2}" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}"/>`);
    }else{
      // Rounded rect
      shapes.push(`<rect x="${x-size/3}" y="${y-size/3}" width="${size*0.66}" height="${size*0.66}" rx="4" fill="none" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}"/>`);
    }
  }
  
  // Add a main central shape
  const mainHue=(h*13)%360;
  const mainColor=`hsl(${mainHue},25%,45%)`;
  shapes.push(`<circle cx="40" cy="40" r="14" fill="none" stroke="${mainColor}" stroke-width="2" opacity="0.4"/>`);
  shapes.push(`<circle cx="40" cy="40" r="6" fill="${mainColor}" opacity="0.2"/>`);
  
  return `<div class="gen-icon"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="gi${h%999}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${c1}"/><stop offset="50%" stop-color="${c3}"/><stop offset="100%" stop-color="${c2}"/>
    </linearGradient></defs>
    <rect width="80" height="80" fill="url(#gi${h%999})"/>
    ${shapes.join('')}
  </svg></div>`;
}

// === МОИ БАЛЛЫ ===
function rPoints(){
  const myId=tgUser?.id;
  let total=0,items=[];
  contests.forEach(c=>{
    const me=c.participants.find(p=>p.tgId===myId);
    if(me){total+=me.points;
      const rank=[...c.participants].sort((a,b)=>b.points-a.points).findIndex(p=>p.tgId===myId)+1;
      items.push({contest:c,pts:me.points,rank});

  });

  let h='<div class="page">';
  h+=`<div class="page-head an-fu"><div class="page-title">Мои баллы</div>

    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Баллов</div></div>
    <div class="stat"><div class="stat-val">${items.length?Math.min(...items.map(x=>x.rank)):'-'}</div><div class="stat-label">Лучшее место</div></div>
  </div>`;

  if(items.length===0){
    h+=`<div class="empty an-fu d2">
      <div class="empty-icon">${ic('star')}</div>

      <div class="empty-sub">Присоединитесь к конкурсу на главной</div>
    </div>`;
  }

  items.forEach((it,i)=>{
    h+=`<div class="card click an-fu d${(i%6)+2}" data-go="detail" data-id="${it.contest.id}">
      <div class="card-row">
        <div class="ib ib-soft">${ic('award')}</div>

function rDetail(){
  const c=contests.find(x=>x.id===screenParams.id);

  const myId=tgUser?.id;
  const isParticipant=c.participants.find(p=>p.tgId===myId);
  const sorted=[...c.participants].sort((a,b)=>b.points-a.points);
  const isCreator=tgUser&&c.creatorId===tgUser.id;
  const canManage=isCreator||isAdmin();

  let h='<div class="page">';

    ${c.desc?`<div class="dh-desc">${c.desc}</div>`:''}

    </div>`:''}
  </div>`;

  // Conditions
  if(c.conditions){
    h+=`<div class="card an-fu d2 mb-12"><div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Условия</div>
      <div style="font-size:14px;line-height:1.5">${c.conditions}</div></div>`;

      h+=`<div class="card an-fu d3 mb-12">

        </div><div style="text-align:right">
          <div style="font-size:13px;font-weight:700;color:var(--text3)">Место</div>
          <div style="font-size:32px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;margin-top:4px">#${myRank}</div>
        </div></div></div>`;

      // Referral link (inside contest detail)
      if(c.scoring?.invites?.on){
        const refLink=`https://t.me/${BOT_USERNAME}?start=c${c.id}_ref_${myId}`;
        h+=`<div class="ref-block an-fu d4">
          <div style="font-size:14px;font-weight:700;margin-bottom:4px">Пригласить друзей</div>
          <div style="font-size:13px;color:var(--text3)">+${c.scoring.invites.pts} баллов за каждого</div>
          <div class="ref-link">
            <div class="ref-link-text">${refLink}</div>
            <button class="ref-copy click" data-act="copyRef" data-ref="${refLink}">${ic('copy')}</button>
          </div>
        </div>`;
      }
    }else{
      h+=`<button class="btn btn-black an-fu d3 mb-12 click" data-act="join" data-id="${c.id}">${ic('zap')} ${c.buttonText||'Участвовать'}</button>`;
    }
  }

  // Prizes
  if(c.prizes&&c.prizes.length){
    h+=`<div class="sec an-fu d4"><div class="sec-head"><div class="sec-title">Призы</div></div>`;
    c.prizes.forEach((p,i)=>{
      const colors=['var(--gold)','var(--silver)','var(--bronze)'];
      const bg=['#FEF9C3','#F4F4F5','#FFF7ED'];
      h+=`<div class="prize-item"><div class="prize-num" style="${i<3?`background:${bg[i]};color:${colors[i]}`:''}">${i+1}</div>
        <div class="prize-text">${p}</div></div>`;
    });
    h+='</div>';
  }

  // Scoring config
  if(c.scoring){
    h+=`<div class="sec an-fu d5"><div class="sec-head"><div class="sec-title">Начисление баллов</div></div>
    <div class="sc-row" style="margin-top:0">
      ${c.scoring.invites?.on?`<span class="sc sc-on">${ic('users')} Друзья +${c.scoring.invites.pts}</span>`:`<span class="sc sc-off">${ic('users')} Друзья</span>`}
      ${c.scoring.reactions?.on?`<span class="sc sc-on">${ic('heart')} Реакции +${c.scoring.reactions.pts}</span>`:`<span class="sc sc-off">${ic('heart')} Реакции</span>`}
      ${c.scoring.ads?.on?`<span class="sc sc-on">${ic('play')} Реклама +${c.scoring.ads.pts}</span>`:`<span class="sc sc-off">${ic('play')} Реклама</span>`}
    </div></div>`;
  }

  // Leaderboard
  if(sorted.length){
    h+=`<div class="sec an-fu d6"><div class="sec-head"><div class="sec-title">Участники</div>
      <span style="font-size:14px;color:var(--text3);font-weight:600">${sorted.length}</span></div>`;
    h+='<div class="lb">';
    sorted.forEach((p,i)=>{
      const rank=i+1;
      let cls='lb-item';
      if(rank===1)cls+=' lb-1';else if(rank===2)cls+=' lb-2';else if(rank===3)cls+=' lb-3';
      if(p.tgId===myId)cls+=' lb-me';
      const ac=avaColor(p.name||'?');
      const profileLink=p.username?`https://t.me/${p.username}`:`tg://user?id=${p.tgId}`;
      h+=`<div class="${cls} click" data-act="openUser" data-link="${profileLink}">
        <div class="lb-rank">${rank}</div>
        <div class="ava ava-sm" style="background:${ac}">${initials(p.name||'?')}</div>
        <div class="lb-info">
          <div class="lb-name">${p.name||'Участник'}</div>
          ${p.username?`<div class="lb-user">@${p.username}</div>`:''}
        </div>
        <div class="lb-pts">${p.points}</div>
      </div>`;
    });
    h+='</div></div>';
  }

  h+='</div>';
  return h;
}

}

// === РЕДАКТИРОВАНИЕ ===
function rEdit(){
  const c=contests.find(x=>x.id===screenParams.id);
  if(!c)return'<div class="page"><div class="empty"><div class="empty-title">Конкурс не найден</div></div></div>';

  let h='<div class="page">';
  h+=`<button class="back-btn an-fu click" data-go="detail" data-id="${c.id}">${ic('chevL')} Назад к конкурсу</button>`;
  h+=`<div class="page-head an-fu d1"><div class="page-title">Редактировать</div>
    <div class="page-sub">${c.name}</div></div>`;

  h+=`<form id="eForm" class="an-fu d2">
  <div class="field"><label class="field-label">Название</label>
    <input class="inp" id="ef_name" value="${c.name}"></div>
  <div class="field"><label class="field-label">Описание</label>
    <textarea class="inp" id="ef_desc">${c.desc||''}</textarea></div>
  <div class="field"><label class="field-label">Условия</label>
    <textarea class="inp" id="ef_cond" style="min-height:64px">${c.conditions||''}</textarea></div>

  <div class="divider"></div>
  <div style="font-size:18px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px">Начисление баллов</div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Измените настройки</div>

  <div class="tgl-row"><div class="tgl-label">${ic('users')} Приглашения</div>
    <button type="button" class="tgl${c.scoring?.invites?.on?' on':''}" id="et_inv"></button></div>
  <div class="tgl-sub" id="es_inv" style="display:${c.scoring?.invites?.on?'block':'none'}">
    <div class="field"><label class="field-label">Баллов за друга</label>
      <input class="inp" id="ef_inv" type="number" min="1" value="${c.scoring?.invites?.pts||5}"></div></div>

  <div class="tgl-row"><div class="tgl-label">${ic('heart')} Реакции</div>
    <button type="button" class="tgl${c.scoring?.reactions?.on?' on':''}" id="et_react"></button></div>
  <div class="tgl-sub" id="es_react" style="display:${c.scoring?.reactions?.on?'block':'none'}">
    <div class="field"><label class="field-label">Баллов за реакцию</label>
      <input class="inp" id="ef_react" type="number" min="1" value="${c.scoring?.reactions?.pts||1}"></div></div>

  <div class="tgl-row"><div class="tgl-label">${ic('play')} Реклама</div>
    <button type="button" class="tgl${c.scoring?.ads?.on?' on':''}" id="et_ads"></button></div>
  <div class="tgl-sub" id="es_ads" style="display:${c.scoring?.ads?.on?'block':'none'}">
    <div class="field"><label class="field-label">Баллов за просмотр</label>
      <input class="inp" id="ef_ads" type="number" min="1" value="${c.scoring?.ads?.pts||3}"></div>
    <div class="notice notice-warn">${ic('info')} Модуль рекламы в разработке</div></div>

  <div class="divider"></div>
  <button type="submit" class="btn btn-black">${ic('check')} Сохранить изменения</button>
  </form></div>`;
  return h;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  СОБЫТИЯ                                                     ║
// ╚══════════════════════════════════════════════════════════════╝
function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>go(el.dataset.nav));
  });
  document.querySelectorAll('[data-go]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      go(el.dataset.go,{id:el.dataset.id});
    });
  });
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      const act=el.dataset.act;
      switch(act){
        case'join':
          await joinContest(el.dataset.id,tgUser);
          toast('Вы участвуете в конкурсе!');
          try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success')}catch(err){}
          render();break;
        case'end':
          if(confirm('Завершить конкурс досрочно?')){
            const contest=contests.find(x=>x.id===el.dataset.id);
            await updateContest(el.dataset.id,{status:'ended'});
            if(contest) await sendResultsPost(contest);
            toast('Конкурс завершён. Итоги опубликованы.');
            render();
          }break;
        case'delete':
          if(confirm('Удалить конкурс навсегда? Это нельзя отменить!')){
            await deleteContest(el.dataset.id);
            toast('Конкурс удалён');
            go('admin');
          }break;
        case'copyRef':
          try{await navigator.clipboard.writeText(el.dataset.ref);toast('Ссылка скопирована!')}
          catch(err){const ta=document.createElement('textarea');ta.value=el.dataset.ref;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Ссылка скопирована!')}
          try{window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light')}catch(err){}
          break;
        case'openUser':
          if(el.dataset.link)window.open(el.dataset.link,'_blank');break;
      }
    });
  });

  // Admin tabs
  document.querySelectorAll('[data-atab]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('[data-atab]').forEach(t=>t.classList.remove('on'));
      el.classList.add('on');
      const f=el.dataset.atab;
      document.querySelectorAll('[data-filter]').forEach(card=>{
        card.style.display=(f==='all'||card.dataset.filter===f)?'':'none';
      });
    });
  });

  // Outcome type → threshold
  const oc=document.getElementById('cf_outcome');
  if(oc)oc.addEventListener('change',()=>{
    const w=document.getElementById('cf_thr_wrap');
    if(w)w.style.display=oc.value==='2'?'block':'none';
  });

  // Toggles
  [['t_inv','s_inv'],['t_react','s_react'],['t_ads','s_ads']].forEach(([tid,sid])=>{
    const t=document.getElementById(tid),s=document.getElementById(sid);
    if(t&&s)t.addEventListener('click',()=>{t.classList.toggle('on');s.style.display=t.classList.contains('on')?'block':'none'});
  });
  [['et_inv','es_inv'],['et_react','es_react'],['et_ads','es_ads']].forEach(([tid,sid])=>{
    const t=document.getElementById(tid),s=document.getElementById(sid);
    if(t&&s)t.addEventListener('click',()=>{t.classList.toggle('on');s.style.display=t.classList.contains('on')?'block':'none'});
  });

  // Add prize
  const pb=document.getElementById('addPrize'),pi=document.getElementById('cf_prize'),pl=document.getElementById('prizes_list');
  if(pb&&pi&&pl){
    pb.addEventListener('click',()=>{
      const v=pi.value.trim();if(!v)return;
      const n=pl.children.length+1;
      const d=document.createElement('div');
      d.className='prize-item an-si';
      d.innerHTML=`<div class="prize-num">${n}</div><div class="prize-text">${v}</div>
        <button type="button" class="prize-del" onclick="this.parentElement.remove()">${ic('x')}</button>`;
      pl.appendChild(d);pi.value='';pi.focus();
    });
  }

  // Create form
  const cf=document.getElementById('cForm');
  if(cf)cf.addEventListener('submit',async e=>{
    e.preventDefault();
    const name=document.getElementById('cf_name').value.trim();
    const ch=document.getElementById('cf_ch').value.trim();
    const endDate=document.getElementById('cf_end').value;
    if(!name||!ch||!endDate){toast('Заполните обязательные поля','err');return}

    const contestData={
      name,
      channel:ch.startsWith('@')?ch:'@'+ch,
      desc:document.getElementById('cf_desc').value.trim(),
      conditions:document.getElementById('cf_cond').value.trim(),
      endDate,status:'active',
      winnersCount:parseInt(document.getElementById('cf_winners').value)||1,
      buttonText:document.getElementById('cf_btn').value.trim()||'Участвовать',
      initialPoints:parseInt(document.getElementById('cf_initpts').value)||0,
      outcomeType:parseInt(document.getElementById('cf_outcome').value)||1,
      threshold:parseInt(document.getElementById('cf_thr')?.value)||0,
      creatorId:tgUser?.id||MAIN_ADMIN_ID,
      scoring:{
        invites:{on:!!document.getElementById('t_inv')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_inv_pts')?.value)||5},
        reactions:{on:!!document.getElementById('t_react')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_react_pts')?.value)||1},
        ads:{on:!!document.getElementById('t_ads')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_ads_pts')?.value)||3},
      },
      prizes:[]
    };
    document.querySelectorAll('#prizes_list .prize-text').forEach(el=>contestData.prizes.push(el.textContent));

    const saved=await saveContest(contestData);
    if(saved)await sendPost(ch,contestData.name,contestData.desc,contestData.conditions,contestData.prizes,endDate);

    toast('Конкурс создан!');
    try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success')}catch(err){}
    go('home');
  });

  // Edit form
  const ef=document.getElementById('eForm');
  if(ef)ef.addEventListener('submit',async e=>{
    e.preventDefault();
    const id=screenParams.id;
    const updates={
      name:document.getElementById('ef_name').value.trim(),
      desc:document.getElementById('ef_desc').value.trim(),
      conditions:document.getElementById('ef_cond').value.trim(),
      scoring:{
        invites:{on:document.getElementById('et_inv')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_inv')?.value)||5},
        reactions:{on:document.getElementById('et_react')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_react')?.value)||1},
        ads:{on:document.getElementById('et_ads')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_ads')?.value)||3},
      }
    };
    await updateContest(id,updates);
    toast('Изменения сохранены');
    go('detail',{id});
  });
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  НАВИГАЦИЯ И ЗАПУСК                                          ║
// ╚══════════════════════════════════════════════════════════════╝
function go(screen,params={}){
  currentScreen=screen;screenParams=params;
  render();window.scrollTo({top:0,behavior:'smooth'});
}

// Обработка deep link — ?contest=id
function handleDeepLink(){
  const urlParams=new URLSearchParams(window.location.search);
  const contestId=urlParams.get('contest');
  if(contestId){
    currentScreen='detail';
    screenParams={id:contestId};
  }
}

async function init(){
  try{
    const tg=window.Telegram?.WebApp;
    if(tg){tg.ready();tg.expand();tgUser=tg.initDataUnsafe?.user||null}
  }catch(e){}
  if(!tgUser)tgUser={id:MAIN_ADMIN_ID,first_name:'Admin',username:'Tru5tNoBody'};
  await loadContests();
  handleDeepLink();
  render();
}

init();
</script>
