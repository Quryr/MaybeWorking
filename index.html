<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FFFFFF;--bg2:#F5F5F7;--bg3:#EBEBED;
--border:#E5E5EA;--border2:#D1D1D6;
--text:#000;--text2:#6E6E73;--text3:#AEAEB2;
--black:#000;--white:#FFF;
--accent:#007AFF;
--green:#34C759;--red:#FF3B30;--orange:#FF9500;
--gold:#C5970A;--silver:#8E8E93;--bronze:#A0522D;
--r:14px;--r2:10px;--r3:8px;
--sh:0 1px 3px rgba(0,0,0,.06);
--sh2:0 4px 16px rgba(0,0,0,.08);
}
html,body{
font-family:'Inter',system-ui,-apple-system,sans-serif;
background:var(--bg);color:var(--text);
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:geometricPrecision;
overflow-x:hidden;min-height:100vh;
}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.afu{animation:fadeUp .4s ease both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}

/* === PAGE === */
.page{min-height:100vh;padding:16px 16px 24px}
.ptitle{font-size:28px;font-weight:900;letter-spacing:-.7px;line-height:1.15}
.psub{font-size:14px;color:var(--text3);margin-top:4px;margin-bottom:18px}

/* === BACK BUTTON === */
.back{
display:inline-flex;align-items:center;gap:4px;
padding:8px 14px 8px 10px;margin-bottom:14px;
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;font-size:13px;font-weight:600;
color:var(--text2);cursor:pointer;
transition:all .15s;-webkit-tap-highlight-color:transparent;
font-family:inherit;
}
.back:active{transform:scale(.96);background:var(--bg3)}
.back svg{width:16px;height:16px}

/* ============================================ */
/* CONTEST CARD — чистая, крупная, красивая     */
/* ============================================ */
.cc{
background:var(--white);
border:1px solid var(--border);
border-radius:16px;
overflow:hidden;
transition:all .18s;
cursor:pointer;
-webkit-tap-highlight-color:transparent;
}
.cc:active{transform:scale(.98);box-shadow:var(--sh2)}
.cc+.cc{margin-top:12px}
.cc-top{display:flex;align-items:stretch}
.cc-icon{
width:88px;min-height:88px;flex-shrink:0;
background:var(--black);
display:flex;align-items:center;justify-content:center;
}
.cc-icon svg{width:36px;height:36px;color:var(--white)}
.cc-body{
flex:1;padding:14px 16px;min-width:0;
display:flex;flex-direction:column;justify-content:center;
}
.cc-name{
font-size:16px;font-weight:800;letter-spacing:-.3px;
line-height:1.3;margin-bottom:4px;
overflow:hidden;text-overflow:ellipsis;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.cc-ch{font-size:13px;color:var(--text2);font-weight:500}
.cc-foot{
display:flex;align-items:center;gap:16px;
padding:10px 16px;border-top:1px solid var(--border);
background:var(--bg2);
font-size:12px;color:var(--text2);font-weight:600;
}
.cc-m{display:flex;align-items:center;gap:4px}
.cc-m svg{width:13px;height:13px;opacity:.5}
.cc-live{
margin-left:auto;display:flex;align-items:center;gap:5px;
font-weight:700;color:var(--green);font-size:12px;
}
.cc-live-dot{
width:6px;height:6px;border-radius:50%;
background:var(--green);animation:pulse 2s infinite;
}

/* === GENERIC CARD === */
.card{
background:var(--white);border:1px solid var(--border);
border-radius:var(--r);padding:16px;
box-shadow:var(--sh);transition:all .15s;
}
.card:active{transform:scale(.985)}
.card+.card{margin-top:10px}
.cr{display:flex;align-items:center;gap:12px}
.cb{flex:1;min-width:0}
.ct{font-size:14px;font-weight:700;line-height:1.3}
.cd{font-size:12px;color:var(--text3);line-height:1.3;margin-top:1px}

/* Icon box */
.ib{
width:42px;height:42px;border-radius:12px;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ib svg{width:18px;height:18px}
.ib-b{background:var(--black);color:var(--white)}
.ib-s{background:var(--bg2);border:1px solid var(--border);color:var(--text2)}

/* Badges */
.bdg{
display:inline-flex;align-items:center;gap:4px;
padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
letter-spacing:.3px;text-transform:uppercase;
}
.bdg-live{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.bdg-end{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.bdg-pts{
background:var(--black);color:var(--white);
font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;
padding:6px 14px;text-transform:none;letter-spacing:0;border-radius:10px;
}

/* Buttons */
.btn{
display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;padding:15px 20px;border:none;border-radius:var(--r);
font-family:inherit;font-size:15px;font-weight:700;
cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.975)}
.btn svg{width:18px;height:18px;flex-shrink:0}
.btn-b{background:var(--black);color:var(--white)}
.btn-s{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-r{background:var(--red);color:var(--white)}
.btn-sm{padding:10px 14px;font-size:13px;width:auto;display:inline-flex}

/* Fields */
.fld{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px}
.fh{font-size:11px;color:var(--text3);margin-top:4px}
.inp{
width:100%;padding:13px 16px;border:1.5px solid var(--border);
border-radius:var(--r2);font-family:inherit;font-size:15px;
background:var(--white);color:var(--text);transition:border-color .2s;
-webkit-appearance:none;
}
.inp:focus{outline:none;border-color:var(--black)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer}

/* Toggle */
.tgl-r{
display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;background:var(--bg2);border-radius:var(--r2);
margin-bottom:8px;border:1px solid var(--border);
}
.tgl-l{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.tgl-l svg{width:18px;height:18px;color:var(--text3)}
.tgl{
position:relative;width:48px;height:28px;
background:var(--border2);border-radius:14px;
cursor:pointer;transition:background .25s;flex-shrink:0;border:none;
}
.tgl.on{background:var(--black)}
.tgl::after{
content:'';position:absolute;top:2px;left:2px;
width:24px;height:24px;border-radius:12px;
background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.15);
transition:transform .25s cubic-bezier(.22,1,.36,1);
}
.tgl.on::after{transform:translateX(20px)}
.tgl-sub{
padding:14px 16px;background:var(--white);
border:1px solid var(--border);border-radius:var(--r2);
margin-bottom:8px;margin-top:-4px;
}
.tgl-sub .fld{margin-bottom:0}

/* Avatar */
.av{
display:flex;align-items:center;justify-content:center;
font-weight:700;color:var(--white);flex-shrink:0;letter-spacing:-.3px;
border-radius:50%;
}
.av-36{width:36px;height:36px;font-size:13px}
.av-56{width:56px;height:56px;font-size:20px}
.av-80{width:80px;height:80px;font-size:28px;border-radius:22px}

/* Leaderboard */
.lb{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.li{
display:flex;align-items:center;gap:12px;
padding:12px 16px;cursor:pointer;
transition:background .15s;border-bottom:1px solid var(--border);
}
.li:last-child{border-bottom:none}
.li:active{background:var(--bg2)}
.lr{
width:24px;text-align:center;font-size:14px;font-weight:800;
color:var(--text3);flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.ln{flex:1;min-width:0}
.ln-n{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ln-u{font-size:11px;color:var(--text3);margin-top:1px}
.lp{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.l1{background:#FFFDE7}.l1 .lr{color:var(--gold)}
.l2{background:#FAFAFA}.l2 .lr{color:var(--silver)}
.l3{background:#FFF8F0}.l3 .lr{color:var(--bronze)}
.lm{background:#F0F4FF}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat{
text-align:center;padding:16px 8px;
background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border);
}
.sv{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace}
.sl{font-size:10px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

.sec{margin-bottom:18px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st{font-size:17px;font-weight:800;letter-spacing:-.3px}

/* Hero */
.hero{
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:28px 20px;margin-bottom:18px;text-align:center;
}
.hero-i{
width:52px;height:52px;border-radius:14px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
margin:0 auto 12px;
}
.hero-i svg{width:22px;height:22px}
.hero-t{font-size:21px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px}
.hero-s{font-size:13px;color:var(--text3);line-height:1.5}
.hero-chip{
display:inline-flex;align-items:center;gap:5px;
padding:5px 12px;background:var(--white);border:1px solid var(--border);
border-radius:16px;font-size:12px;font-weight:600;color:var(--text2);margin-top:10px;
}
.hero-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* Channel connect block */
.ch-block{
padding:16px;background:var(--bg2);border:1px solid var(--border);
border-radius:var(--r);margin-bottom:16px;
}
.ch-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.ch-step:last-child{margin-bottom:0}
.ch-num{
width:26px;height:26px;border-radius:50%;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:800;flex-shrink:0;
}
.ch-step-t{font-size:13px;font-weight:700;margin-bottom:2px}
.ch-step-d{font-size:12px;color:var(--text3);line-height:1.4}
.ch-btn{
display:inline-flex;align-items:center;gap:6px;
padding:10px 16px;background:var(--black);color:var(--white);
border:none;border-radius:var(--r3);font-family:inherit;
font-size:13px;font-weight:700;cursor:pointer;
margin-top:8px;transition:all .15s;
}
.ch-btn:active{transform:scale(.96)}
.ch-btn svg{width:15px;height:15px}
.ch-status{
display:flex;align-items:center;gap:6px;
padding:9px 12px;border-radius:var(--r3);
font-size:12px;font-weight:700;margin-top:8px;
}
.ch-ok{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.ch-fail{background:#FEF2F2;color:var(--red);border:1px solid #FCA5A5}

/* Channel selector dropdown */
.ch-sel{
padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r2);
background:var(--white);display:flex;align-items:center;gap:10px;
cursor:pointer;transition:border-color .2s;margin-bottom:8px;
}
.ch-sel:focus-within{border-color:var(--black)}
.ch-sel-name{flex:1;font-size:15px;font-weight:600}
.ch-sel svg{width:16px;height:16px;color:var(--text3)}
.ch-sel-empty{color:var(--text3)}
.ch-list{
border:1px solid var(--border);border-radius:var(--r2);
overflow:hidden;margin-bottom:14px;background:var(--white);
}
.ch-item{
display:flex;align-items:center;gap:10px;padding:12px 14px;
border-bottom:1px solid var(--border);cursor:pointer;
transition:background .15s;
}
.ch-item:last-child{border-bottom:none}
.ch-item:active{background:var(--bg2)}
.ch-item.sel{background:var(--bg2)}
.ch-item-name{flex:1;font-size:14px;font-weight:600}
.ch-item-id{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.ch-item-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ch-item.sel .ch-item-check{background:var(--black);border-color:var(--black)}
.ch-item.sel .ch-item-check svg{color:var(--white)}

/* Referral */
.ref{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
padding:16px;margin-top:14px;
}
.ref-box{
display:flex;align-items:center;gap:8px;
padding:11px 12px;background:var(--white);border:1.5px dashed var(--border2);
border-radius:var(--r2);margin-top:10px;
font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);
word-break:break-all;line-height:1.4;
}
.ref-box span{flex:1}
.ref-cp{
width:36px;height:36px;border-radius:10px;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
border:none;cursor:pointer;flex-shrink:0;transition:transform .15s;
}
.ref-cp:active{transform:scale(.9)}
.ref-cp svg{width:15px;height:15px}

/* Prizes */
.pi{
display:flex;align-items:center;gap:10px;
padding:10px 14px;background:var(--bg2);
border-radius:var(--r3);margin-bottom:6px;border:1px solid var(--border);
}
.pn{
width:24px;height:24px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:800;flex-shrink:0;
background:var(--bg3);color:var(--text2);
}
.pt{flex:1;font-size:13px;font-weight:600}
.pd{
width:24px;height:24px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:var(--bg3);border:none;cursor:pointer;
color:var(--text3);transition:all .15s;
}
.pd:hover{background:var(--red);color:var(--white)}
.pd svg{width:12px;height:12px}

/* Detail header */
.dh{
background:var(--bg2);border:1px solid var(--border);
border-radius:16px;padding:20px;margin-bottom:16px;
}
.dh-ch{
display:inline-flex;align-items:center;gap:4px;
padding:4px 10px;background:var(--white);border:1px solid var(--border);
border-radius:14px;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;
}
.dh-ch svg{width:12px;height:12px}
.dh-n{font-size:20px;font-weight:900;letter-spacing:-.4px;margin-bottom:6px;line-height:1.2}
.dh-d{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.dh-m{display:flex;flex-wrap:wrap;gap:6px}
.dh-acts{display:flex;gap:8px;margin-top:12px}

/* Admin card */
.ac{
border:1px solid var(--border);border-radius:var(--r);
padding:16px;margin-bottom:10px;background:var(--white);
}
.ac-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.ac-t{font-size:15px;font-weight:800;line-height:1.25}
.ac-s{font-size:12px;color:var(--text3);margin-top:2px}
.ac-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ac-b{
padding:7px 12px;border-radius:var(--r3);
font-size:12px;font-weight:700;border:1px solid var(--border);
background:var(--white);cursor:pointer;transition:all .15s;
display:flex;align-items:center;gap:4px;font-family:inherit;
}
.ac-b:active{transform:scale(.96)}
.ac-b svg{width:13px;height:13px}
.ac-b-r{border-color:#FCA5A5;color:var(--red);background:#FEF2F2}

.sc-r{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.sc{
display:inline-flex;align-items:center;gap:3px;
padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;
}
.sc svg{width:11px;height:11px}
.sc-on{background:#ECFDF5;border:1px solid #A7F3D0;color:#166534}
.sc-off{background:var(--bg2);border:1px solid var(--border);color:var(--text3);text-decoration:line-through}

.toast{
position:fixed;top:16px;left:16px;right:16px;z-index:9999;
padding:14px 18px;border-radius:var(--r2);
font-size:14px;font-weight:700;animation:fadeUp .3s ease;box-shadow:var(--sh2);
}
.toast-ok{background:var(--black);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{
padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;
white-space:nowrap;border:1.5px solid var(--border);
background:var(--white);color:var(--text2);cursor:pointer;
transition:all .15s;flex-shrink:0;
}
.tab.on{background:var(--black);color:var(--white);border-color:var(--black)}

.divider{height:1px;background:var(--border);margin:18px 0}

.notice{
padding:12px 14px;border-radius:var(--r3);
font-size:12px;line-height:1.5;display:flex;gap:8px;align-items:flex-start;
}
.notice svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}
.notice-w{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.notice-i{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}

/* === TAB BAR === */
.tabbar{
position:fixed;bottom:0;left:0;right:0;
background:rgba(255,255,255,.92);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid var(--border);
display:grid;grid-template-columns:repeat(5,1fr);
padding:0 0 env(safe-area-inset-bottom,0px);z-index:100;
}
.tb{
display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:4px;padding:8px 0 6px;
cursor:pointer;border:none;background:none;
-webkit-tap-highlight-color:transparent;position:relative;
font-family:'Inter',system-ui,sans-serif;
}
.tb svg{width:22px;height:22px;color:var(--text3);transition:color .15s}
.tb-t{
font-family:'Inter',system-ui,sans-serif;
font-size:10px;font-weight:600;color:var(--text3);
line-height:1;transition:color .15s;
letter-spacing:0;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:geometricPrecision;
}
.tb.on svg{color:var(--black)}
.tb.on .tb-t{color:var(--black)}
.tb.on::before{
content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
width:24px;height:2px;background:var(--black);border-radius:0 0 2px 2px;
}
/* Center create button */
.tb-c{padding-top:0}
.tb-c-circle{
width:46px;height:46px;border-radius:50%;
background:var(--black);color:var(--white);
display:flex;align-items:center;justify-content:center;
border:3px solid var(--white);
box-shadow:0 2px 12px rgba(0,0,0,.2);
margin-top:-14px;transition:transform .15s;
}
.tb-c-circle:active{transform:scale(.9)}
.tb-c-circle svg{width:22px;height:22px;color:var(--white)!important}
.tb-c .tb-t{margin-top:3px}

/* Profile menu */
.pm{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.pm-i{
display:flex;align-items:center;gap:12px;padding:14px 16px;
cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);
}
.pm-i:last-child{border-bottom:none}
.pm-i:active{background:var(--bg2)}
.pm-t{font-size:14px;font-weight:700;flex:1}
.pm-a{color:var(--text3)}
.pm-a svg{width:15px;height:15px}

.empty{text-align:center;padding:40px 20px}

const avColors=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD','#F7DC6F','#BB8FCE','#85C1E9','#F8C471','#82E0AA','#F1948A','#AED6F1'];
function avaColor(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return avColors[Math.abs(h)%avColors.length]}
function initials(s){const p=s.trim().split(/\s+/);return p.length>1?(p[0][0]+p[1][0]).toUpperCase():(s.substring(0,2).toUpperCase())}
function isAdmin(){return tgUser&&tgUser.id===MAIN_ADMIN_ID}
function fmtDate(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+' МСК'}
function timeLeft(d){if(!d)return'—';const ms=new Date(d)-Date.now();if(ms<=0)return'Завершён';const days=Math.floor(ms/864e5),hrs=Math.floor((ms%864e5)/36e5),mins=Math.floor((ms%36e5)/6e4);if(days>0)return`${days}д ${hrs}ч`;if(hrs>0)return`${hrs}ч ${mins}м`;return`${mins}м`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function toast(msg,type='ok'){
  const d=document.createElement('div');
  d.className=`toast toast-${type}`;d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transform='translateY(-10px)';d.style.transition='all .3s'},2500);
  setTimeout(()=>d.remove(),2800);
}

async function tgApi(method,body={}){
  try{const r=await fetch(`${TGAPI}/${method}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return await r.json()}
  catch(e){console.error('TG API error:',e);return{ok:false}}
}

async function checkBotInChannel(channelId){
  try{
    const r=await tgApi('getChatAdministrators',{chat_id:channelId});
    if(!r.ok)return{botAdmin:false,userAdmin:false,title:''};
    const botId=parseInt(BOT_TOKEN.split(':')[0]);
    const botAdmin=r.result.some(a=>a.user.id===botId);
    const userAdmin=tgUser?r.result.some(a=>a.user.id===tgUser.id):false;
    // Получаем название канала
    const chatInfo=await tgApi('getChat',{chat_id:channelId});
    const title=chatInfo.ok?chatInfo.result.title:'';
    return{botAdmin,userAdmin,title};
  }catch(e){return{botAdmin:false,userAdmin:false,title:''}}
}

async function sendPost(channelId,contest){
  const name=contest.name;
  const desc=contest.desc;
  const conditions=contest.conditions;
  const prizes=contest.prizes||[];
  const endDate=contest.endDate;
  const winnersCount=contest.winnersCount||1;
  const scoring=contest.scoring||{};
  const btnText=contest.buttonText||'Участвовать';

  let text='';
  text+=`<b>━━━━━━━━━━━━━━━━━━</b>\n`;
  text+=`<b>🏆 ${name.toUpperCase()}</b>\n`;
  text+=`<b>━━━━━━━━━━━━━━━━━━</b>\n\n`;

  if(desc)text+=`${desc}\n\n`;

  if(conditions){
    text+=`<b>📋 Условия участия:</b>\n`;
    text+=`${conditions}\n\n`;
  }

  // Призы с распределением по местам
  if(prizes.length){
    text+=`<b>🎁 Призы:</b>\n`;
    const medals=['🥇','🥈','🥉'];
    prizes.forEach((p,i)=>{
      const medal=i<3?medals[i]:`  ${i+1}.`;
      text+=`${medal} <b>${i+1}-е место</b> — ${p}\n`;
    });
    text+='\n';
  }

  // Количество победителей
  text+=`<b>👥 Призовых мест:</b> ${winnersCount}\n`;

  // Как заработать баллы
  const methods=[];
  if(scoring.invites?.on)methods.push(`приглашение друзей (+${scoring.invites.pts} за друга)`);
  if(scoring.reactions?.on)methods.push(`реакции на постах (+${scoring.reactions.pts} за реакцию)`);
  if(scoring.ads?.on)methods.push(`просмотр рекламы (+${scoring.ads.pts} за просмотр)`);
  if(methods.length){
    text+=`\n<b>⚡ Как заработать баллы:</b>\n`;
    methods.forEach(m=>text+=`  • ${m}\n`);
    text+='\n';
  }

  // Тип определения победителя
  const outcomeNames={1:'по лидерборду (больше баллов)',2:'рандом среди набравших порог',3:'взвешенный рандом по баллам'};
  text+=`<b>🎯 Победитель:</b> ${outcomeNames[contest.outcomeType]||outcomeNames[1]}\n\n`;

  text+=`<b>⏰ До:</b> ${fmtDate(endDate)}\n\n`;
  text+=`<b>━━━━━━━━━━━━━━━━━━</b>\n`;
  text+=`Нажмите кнопку ниже, чтобы участвовать!`;

  const miniAppUrl=window.location.href.split('?')[0]+`?contest=${contest.id||'new'}`;
  await tgApi('sendMessage',{
    chat_id:channelId,
    text,
    parse_mode:'HTML',
    reply_markup:{inline_keyboard:[[{text:`🏆 ${btnText}`,web_app:{url:miniAppUrl}}]]}
  });
}

async function sendResultsPost(contest){
  const sorted=[...contest.participants].sort((a,b)=>b.points-a.points);
  const winners=sorted.slice(0,contest.winnersCount||1);
  let text=`<b>🏆 Конкурс завершён!</b>\n\n<b>${contest.name}</b>\n\n<b>Победители:</b>`;
  winners.forEach((w,i)=>{
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    const mention=w.username?`@${w.username}`:w.name;
    text+=`\n${medal} ${mention} — ${w.points} баллов`;
  });
  text+=`\n\nВсего участников: ${sorted.length}`;

  const miniAppUrl=window.location.href.split('?')[0]+`?contest=${contest.id}`;
  await tgApi('sendMessage',{
    chat_id:contest.channelId||contest.channel,
    text,parse_mode:'HTML',
    reply_markup:{inline_keyboard:[[{text:'📊 Посмотреть итоги',web_app:{url:miniAppUrl}}]]}
  });
}

// Загрузка каналов пользователя из Firebase
async function loadMyChannels(){
  if(!useFirebase||!tgUser)return;
  try{
    const snap=await db.collection('channels').where('adminId','==',tgUser.id).get();
    myChannels=[];
    snap.forEach(doc=>{const d=doc.data();myChannels.push({id:doc.id,channelId:d.channelId,title:d.title,...d})});
  }catch(e){console.warn('loadMyChannels error:',e)}
}

// Сканирование updates — автоматическое обнаружение каналов
async function scanBotUpdates(){
  if(!tgUser)return;
  try{
    const data=await tgApi('getUpdates',{allowed_updates:JSON.stringify(['my_chat_member'])});
    if(!data||!data.result)return;
    let maxId=0;
    for(const upd of data.result){
      if(upd.update_id>maxId)maxId=upd.update_id;
      const mcm=upd.my_chat_member;
      if(!mcm)continue;
      const chat=mcm.chat;
      const newStatus=mcm.new_chat_member?.status;
      // Бот стал админом в канале или группе
      if(newStatus==='administrator'&&(chat.type==='channel'||chat.type==='supergroup')){
        const channelId=chat.username?'@'+chat.username:String(chat.id);
        const title=chat.title||channelId;
        // Проверяем что юзер — админ этого канала
        const result=await checkBotInChannel(channelId);
        if(result.userAdmin){
          await addChannelToMyList(channelId,title);
        }
      }
    }
    // Подтверждаем обработку updates
    if(maxId>0)await tgApi('getUpdates',{offset:maxId+1});
  }catch(e){console.warn('scanBotUpdates error:',e)}
}

async function addChannelToMyList(channelId,title){
  if(!useFirebase||!tgUser)return;
  // Проверяем, не добавлен ли уже
  const existing=myChannels.find(c=>c.channelId===channelId);
  if(existing)return;
  try{
    const docRef=await db.collection('channels').add({
      channelId,title,adminId:tgUser.id,addedAt:new Date().toISOString()
    });
    myChannels.push({id:docRef.id,channelId,title,adminId:tgUser.id});
  }catch(e){console.warn('addChannel error:',e)}
}

        for(const doc of snap.docs){
          const d=doc.data();
          const pSnap=await db.collection('contests').doc(doc.id).collection('participants').get();
          const participants=[];
          pSnap.forEach(p=>participants.push({id:p.id,...p.data()}));
          contests.push({id:doc.id,...d,participants});
        }
        return;
      }
    }catch(e){console.warn('Firebase load error:',e)}
  }
  contests=[...demoContests];
}

async function saveContest(data){
  const c={...data,participants:data.participants||[],createdAt:new Date().toISOString()};
  if(useFirebase){
    try{
      const docRef=await db.collection('contests').add(c);
      c.id=docRef.id;contests.push(c);return c;
    }catch(e){console.warn('Firebase save error:',e)}
  }
  c.id=uid();contests.push(c);return c;
}

async function updateContest(id,updates){
  const c=contests.find(x=>x.id===id);if(!c)return;
  Object.assign(c,updates);
  if(useFirebase){try{await db.collection('contests').doc(id).update(updates)}catch(e){}}
}

async function deleteContest(id){
  contests=contests.filter(c=>c.id!==id);
  if(useFirebase){try{await db.collection('contests').doc(id).delete()}catch(e){}}
}

async function joinContest(id,user){
  const c=contests.find(x=>x.id===id);if(!c)return;
  if(c.participants.find(p=>p.tgId===user.id))return;
  const p={tgId:user.id,name:user.first_name||'User',username:user.username||'',points:c.initialPoints||0,joinedAt:new Date().toISOString()};
  c.participants.push(p);
  if(useFirebase){try{await db.collection('contests').doc(id).collection('participants').add(p)}catch(e){}}
}

  h+=`<div style="text-align:center;padding:20px 0" class="afu">
    <div class="av av-80" style="background:${col};margin:0 auto 12px">${initials(name)}</div>
    <div style="font-size:22px;font-weight:900;letter-spacing:-.3px">${name}</div>
    <div style="font-size:13px;color:var(--text3);margin-top:3px">@${uname}</div>
    ${isAdmin()?'<div class="bdg bdg-live" style="margin-top:10px">Администратор</div>':''}
  </div>`;

  h+=`<div class="stats afu d1">
    <div class="stat"><div class="sv">${myContests.length}</div><div class="sl">Конкурсов</div></div>
    <div class="stat"><div class="sv">${totalPts}</div><div class="sl">Баллов</div></div>
    <div class="stat"><div class="sv">—</div><div class="sl">Побед</div></div>
  </div>`;

  if(myContests.length){
    h+=`<div class="sec afu d2"><div class="sh"><div class="st">Мои конкурсы</div></div>`;
    myContests.forEach(c=>{
      h+=`<div class="card clk mb8" data-go="detail" data-id="${c.id}">
        <div class="cr"><div class="ib ib-b">${ic('award')}</div>
          <div class="cb"><div class="ct">${c.name}</div>
            <div class="cd">${c.channel}</div></div>
          <span class="bdg bdg-pts">${c.myPts}</span></div></div>`;
    });
    h+='</div>';
  }

  h+=`<div class="pm afu d3">
    <div class="pm-i clk" data-nav="points">
      <div class="ib ib-s" style="width:36px;height:36px;border-radius:10px">${ic('barChart')}</div>
      <div class="pm-t">Статистика</div>
      <div class="pm-a">${ic('chevR')}</div>
    </div>
    <div class="pm-i clk" data-nav="create">
      <div class="ib ib-s" style="width:36px;height:36px;border-radius:10px">${ic('plus')}</div>
      <div class="pm-t">Создать конкурс</div>
      <div class="pm-a">${ic('chevR')}</div>
    </div>
    <div class="pm-i">
      <div class="ib ib-s" style="width:36px;height:36px;border-radius:10px">${ic('info')}</div>
      <div class="pm-t">О приложении v1.0</div>
      <div class="pm-a">${ic('chevR')}</div>
    </div>
  </div>`;

  h+='</div>';return h;
}

// === РЕДАКТИРОВАНИЕ ===
function rEdit(){
  const c=contests.find(x=>x.id===screenParams.id);
  if(!c)return'<div class="page"><div class="empty"><div class="empty-t">Конкурс не найден</div></div></div>';

  let h='<div class="page">';
  h+=`<button class="back afu clk" data-go="detail" data-id="${c.id}">${ic('chevL')} Назад</button>`;
  h+=`<div class="afu d1"><div class="ptitle">Редактировать</div><div class="psub">${c.name}</div></div>`;

  h+=`<form id="eForm" class="afu d2">
  <div class="fld"><label class="fl">Название</label>
    <input class="inp" id="ef_name" value="${c.name}"></div>
  <div class="fld"><label class="fl">Описание</label>
    <textarea class="inp" id="ef_desc">${c.desc||''}</textarea></div>
  <div class="fld"><label class="fl">Условия</label>
    <textarea class="inp" id="ef_cond" style="min-height:64px">${c.conditions||''}</textarea></div>

  <div class="divider"></div>
  <div style="font-size:17px;font-weight:800;margin-bottom:4px">Начисление баллов</div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Измените настройки</div>

  <div class="tgl-r"><div class="tgl-l">${ic('users')} Приглашения</div>
    <button type="button" class="tgl${c.scoring?.invites?.on?' on':''}" id="et_inv"></button></div>
  <div class="tgl-sub" id="es_inv" style="display:${c.scoring?.invites?.on?'block':'none'}">
    <div class="fld"><label class="fl">Баллов за друга</label>
      <input class="inp" id="ef_inv" type="number" min="1" value="${c.scoring?.invites?.pts||5}"></div></div>

  <div class="tgl-r"><div class="tgl-l">${ic('heart')} Реакции</div>
    <button type="button" class="tgl${c.scoring?.reactions?.on?' on':''}" id="et_react"></button></div>
  <div class="tgl-sub" id="es_react" style="display:${c.scoring?.reactions?.on?'block':'none'}">
    <div class="fld"><label class="fl">Баллов за реакцию</label>
      <input class="inp" id="ef_react" type="number" min="1" value="${c.scoring?.reactions?.pts||1}"></div></div>

  <div class="tgl-r"><div class="tgl-l">${ic('play')} Реклама</div>
    <button type="button" class="tgl${c.scoring?.ads?.on?' on':''}" id="et_ads"></button></div>
  <div class="tgl-sub" id="es_ads" style="display:${c.scoring?.ads?.on?'block':'none'}">
    <div class="fld"><label class="fl">Баллов за просмотр</label>
      <input class="inp" id="ef_ads" type="number" min="1" value="${c.scoring?.ads?.pts||3}"></div>
    <div class="notice notice-w">${ic('info')} Модуль рекламы в разработке</div></div>

  <div class="divider"></div>
  <button type="submit" class="btn btn-b">${ic('check')} Сохранить</button>
  </form></div>`;
  return h;
}

// ╔════════════════════════════════════════════╗
// ║  СОБЫТИЯ                                    ║
// ╚════════════════════════════════════════════╝
function bind(){
  // Навигация
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>go(el.dataset.nav));
  });
  document.querySelectorAll('[data-go]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      go(el.dataset.go,{id:el.dataset.id});
    });
  });

  // Действия
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      const act=el.dataset.act;
      if(act==='join'){
        await joinContest(el.dataset.id,tgUser);
        toast('Вы участвуете!');
        try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success')}catch(e){}
        render();
      }else if(act==='end'){
        if(confirm('Завершить конкурс досрочно?')){
          const contest=contests.find(x=>x.id===el.dataset.id);
          await updateContest(el.dataset.id,{status:'ended'});
          if(contest)await sendResultsPost(contest);
          toast('Конкурс завершён');
          render();
        }
      }else if(act==='delete'){
        if(confirm('Удалить конкурс навсегда?')){
          await deleteContest(el.dataset.id);
          toast('Конкурс удалён');go('admin');
        }
      }else if(act==='copyRef'){
        try{await navigator.clipboard.writeText(el.dataset.ref);toast('Ссылка скопирована!')}
        catch(e){const ta=document.createElement('textarea');ta.value=el.dataset.ref;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Скопировано!')}
      }else if(act==='openUser'){
        if(el.dataset.link)window.open(el.dataset.link,'_blank');
      }
    });
  });

  // Admin tabs
  document.querySelectorAll('[data-atab]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('[data-atab]').forEach(t=>t.classList.remove('on'));
      el.classList.add('on');
      const f=el.dataset.atab;
      document.querySelectorAll('[data-filter]').forEach(card=>{
        card.style.display=(f==='all'||card.dataset.filter===f)?'':'none';
      });
    });
  });

  // Outcome type threshold toggle
  const oc=document.getElementById('cf_outcome');
  if(oc)oc.addEventListener('change',()=>{
    const w=document.getElementById('cf_thr_wrap');
    if(w)w.style.display=oc.value==='2'?'block':'none';
  });

  // Toggles
  [['t_inv','s_inv'],['t_react','s_react'],['t_ads','s_ads'],
   ['et_inv','es_inv'],['et_react','es_react'],['et_ads','es_ads']].forEach(([tid,sid])=>{
    const t=document.getElementById(tid),s=document.getElementById(sid);
    if(t&&s)t.addEventListener('click',()=>{t.classList.toggle('on');s.style.display=t.classList.contains('on')?'block':'none'});
  });

  // Add prize
  const pb=document.getElementById('addPrize'),pi=document.getElementById('cf_prize'),pl=document.getElementById('prizes_list');
  if(pb&&pi&&pl){
    pb.addEventListener('click',()=>{
      const v=pi.value.trim();if(!v)return;
      const n=pl.children.length+1;
      const d=document.createElement('div');d.className='pi';
      d.innerHTML=`<div class="pn">${n}</div><div class="pt">${v}</div>
        <button type="button" class="pd" onclick="this.parentElement.remove()">${ic('x')}</button>`;
      pl.appendChild(d);pi.value='';pi.focus();
    });
  }

  // Добавить бота в канал
  const addBotBtn=document.getElementById('addBotBtn');
  if(addBotBtn){
    addBotBtn.addEventListener('click',()=>{
      const deeplink=`https://t.me/${BOT_USERNAME}?startchannel&admin=post_messages+edit_messages+delete_messages`;
      window.open(deeplink,'_blank');
    });
  }

  // Сканировать каналы — автоматический поиск
  const scanBtn=document.getElementById('scanChannelsBtn');
  if(scanBtn){
    scanBtn.addEventListener('click',async()=>{
      const statusDiv=document.getElementById('scanStatus');
      if(statusDiv)statusDiv.innerHTML='<div style="padding:10px;font-size:13px;color:var(--text2);font-weight:600;text-align:center">Ищу каналы...</div>';
      await scanBotUpdates();
      await loadMyChannels();
      if(myChannels.length){
        if(statusDiv)statusDiv.innerHTML=`<div class="ch-status ch-ok">${ic('check')} Найдено каналов: ${myChannels.length}</div>`;
        render();
      }else{
        if(statusDiv)statusDiv.innerHTML=`<div class="ch-status ch-fail">${ic('x')} Каналы не найдены. Убедитесь что бот добавлен администратором</div>`;
      }
    });
  }

  // Выбор канала из списка
  document.querySelectorAll('[data-ch-select]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('[data-ch-select]').forEach(i=>i.classList.remove('sel'));
      el.classList.add('sel');
      const chId=el.dataset.chSelect;
      const chTitle=el.dataset.chTitle;
      document.getElementById('cf_channel_id').value=chId;
      document.getElementById('cf_channel_title').value=chTitle;
      const statusDiv=document.getElementById('channelStatus');
      if(statusDiv)statusDiv.innerHTML=`<div class="ch-status ch-ok">${ic('check')} Выбран: ${chTitle||chId}</div>`;
    });
  });

  // Create form submit
  const cf=document.getElementById('cForm');
  if(cf)cf.addEventListener('submit',async e=>{
    e.preventDefault();
    const channelId=document.getElementById('cf_channel_id').value;
    const channelTitle=document.getElementById('cf_channel_title').value;
    const name=document.getElementById('cf_name').value.trim();
    const endDate=document.getElementById('cf_end').value;
    if(!name){toast('Введите название','err');return}
    if(!channelId){toast('Сначала подключите канал','err');return}
    if(!endDate){toast('Укажите дату окончания','err');return}

    const contestData={
      name,
      channel:channelTitle||channelId,
      channelId:channelId,
      desc:document.getElementById('cf_desc').value.trim(),
      conditions:document.getElementById('cf_cond').value.trim(),
      endDate,status:'active',
      winnersCount:parseInt(document.getElementById('cf_winners').value)||1,
      buttonText:document.getElementById('cf_btn').value.trim()||'Участвовать',
      initialPoints:parseInt(document.getElementById('cf_initpts').value)||0,
      outcomeType:parseInt(document.getElementById('cf_outcome').value)||1,
      threshold:parseInt(document.getElementById('cf_thr')?.value)||0,
      creatorId:tgUser?.id||MAIN_ADMIN_ID,
      scoring:{
        invites:{on:!!document.getElementById('t_inv')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_inv_pts')?.value)||5},
        reactions:{on:!!document.getElementById('t_react')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_react_pts')?.value)||1},
        ads:{on:!!document.getElementById('t_ads')?.classList.contains('on'),pts:parseInt(document.getElementById('cf_ads_pts')?.value)||3},
      },
      prizes:[]
    };
    document.querySelectorAll('#prizes_list .pt').forEach(el=>contestData.prizes.push(el.textContent));

    const saved=await saveContest(contestData);
    // Отправляем пост в канал с кнопкой «Участвовать»
    if(saved){contestData.id=saved.id||saved;await sendPost(channelId,contestData);}

    toast('Конкурс создан и опубликован!');
    try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success')}catch(e){}
    go('home');
  });

  // Edit form submit
  const ef=document.getElementById('eForm');
  if(ef)ef.addEventListener('submit',async e=>{
    e.preventDefault();
    const id=screenParams.id;
    const updates={
      name:document.getElementById('ef_name').value.trim(),
      desc:document.getElementById('ef_desc').value.trim(),
      conditions:document.getElementById('ef_cond').value.trim(),
      scoring:{
        invites:{on:document.getElementById('et_inv')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_inv')?.value)||5},
        reactions:{on:document.getElementById('et_react')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_react')?.value)||1},
        ads:{on:document.getElementById('et_ads')?.classList.contains('on'),pts:parseInt(document.getElementById('ef_ads')?.value)||3},
      }
    };
    await updateContest(id,updates);
    toast('Сохранено');go('detail',{id});
  });
}

// ╔════════════════════════════════════════════╗
// ║  НАВИГАЦИЯ                                  ║
// ╚════════════════════════════════════════════╝
function go(screen,params={}){
  currentScreen=screen;screenParams=params;
  render();window.scrollTo({top:0,behavior:'smooth'});
}

function handleDeepLink(){
  const p=new URLSearchParams(window.location.search);
  const cid=p.get('contest');
  if(cid){currentScreen='detail';screenParams={id:cid}}
}

async function init(){
  try{
    const tg=window.Telegram?.WebApp;
    if(tg){tg.ready();tg.expand();tgUser=tg.initDataUnsafe?.user||null}
  }catch(e){}
  if(!tgUser)tgUser={id:MAIN_ADMIN_ID,first_name:'Admin',username:'Tru5tNoBody'};
  await loadContests();
  await loadMyChannels();
  // Автоматическое сканирование каналов при запуске
  await scanBotUpdates();
  await loadMyChannels();
  handleDeepLink();
  render();
}

init();
</script>
