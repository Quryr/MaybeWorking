<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --white:#FFFFFF;--bg:#FFFFFF;--bg2:#F5F5F7;--bg3:#EBEBED;
  --text:#1D1D1F;--text2:#6E6E73;--text3:#AEAEB2;
  --border:#D2D2D7;--border-light:#E8E8ED;
  --black:#1D1D1F;--accent:#0071E3;
  --green:#34C759;--red:#FF3B30;--orange:#FF9500;
  --gold:#FFD700;--silver:#A8A8A8;--bronze:#CD7F32;
  --shadow-xs:0 1px 3px rgba(0,0,0,.04);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --r:16px;--r-lg:22px;--r-full:999px;
}
html,body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
body{padding-bottom:100px}
::-webkit-scrollbar{display:none}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}

.fu{animation:fadeUp .5s cubic-bezier(.25,.46,.45,.94) both}
.fi{animation:fadeIn .4s ease both}
.si{animation:scaleIn .35s ease both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}
.d7{animation-delay:.28s}.d8{animation-delay:.32s}.d9{animation-delay:.36s}

/* ── Layout ── */
.wrap{padding:0 20px;max-width:500px;margin:0 auto}
.flex{display:flex}.col{flex-direction:column}.aic{align-items:center}
.jcsb{justify-content:space-between}.jcc{justify-content:center}
.g1{gap:6px}.g2{gap:10px}.g3{gap:14px}.g4{gap:20px}
.f1{flex:1}.w100{width:100%}
.mt1{margin-top:6px}.mt2{margin-top:12px}.mt3{margin-top:20px}.mt4{margin-top:28px}
.mb1{margin-bottom:6px}.mb2{margin-bottom:12px}.mb3{margin-bottom:20px}

/* ── Typography ── */
.t-xs{font-size:11px;line-height:1.3}
.t-sm{font-size:13px;line-height:1.4}
.t-base{font-size:15px;line-height:1.5}
.t-lg{font-size:17px;line-height:1.35}
.t-xl{font-size:22px;line-height:1.25}
.t-2xl{font-size:28px;line-height:1.15}
.t-3xl{font-size:34px;line-height:1.1}
.fw4{font-weight:400}.fw5{font-weight:500}.fw6{font-weight:600}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.tc{text-align:center}.tr{text-align:right}
.c2{color:var(--text2)}.c3{color:var(--text3)}
.ls-t{letter-spacing:-.3px}.ls-tt{letter-spacing:-.5px}
.upper{text-transform:uppercase;letter-spacing:.5px}
.mono{font-family:'SF Mono','Fira Code',monospace}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Card ── */
.card{
  background:var(--white);border:1px solid var(--border-light);
  border-radius:var(--r-lg);padding:20px;
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.card:active{transform:scale(.985)}
.card-hover:hover{box-shadow:var(--shadow-md);border-color:var(--border)}
.card-s{padding:16px;border-radius:var(--r)}
.flat{background:var(--bg2);border:none;border-radius:var(--r);padding:16px}

/* ── Button ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:15px 24px;border-radius:13px;
  font-size:15px;font-weight:600;font-family:inherit;
  border:none;cursor:pointer;transition:all .15s;
  user-select:none;position:relative;
}
.btn:active{transform:scale(.965)}
.btn-p{
  background:var(--black);color:var(--white);
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.btn-p:hover{box-shadow:0 4px 20px rgba(0,0,0,.2)}
.btn-s{background:var(--bg2);color:var(--text);border:1px solid var(--border-light)}
.btn-s:hover{background:var(--bg3);border-color:var(--border)}
.btn-d{background:var(--red);color:var(--white)}
.btn-g{background:var(--green);color:var(--white)}
.btn-sm{padding:10px 16px;font-size:13px;border-radius:10px}
.btn-block{width:100%}

/* ── Input ── */
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.inp,.txa,.sel{
  width:100%;padding:14px 16px;background:var(--bg2);
  border:1.5px solid transparent;border-radius:13px;
  font-size:15px;font-family:inherit;color:var(--text);
  transition:all .2s;outline:none;
}
.inp:focus,.txa:focus,.sel:focus{
  background:var(--white);border-color:var(--black);
  box-shadow:0 0 0 4px rgba(0,0,0,.05);
}
.inp::placeholder,.txa::placeholder{color:var(--text3)}
.txa{resize:vertical;min-height:80px}
.sel{
  -webkit-appearance:none;appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23AEAEB2' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 16px center;padding-right:40px;
}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:var(--r-full);
  font-size:11px;font-weight:600;letter-spacing:.3px;
}
.b-green{background:#E8FAF0;color:#1B9E4B}
.b-red{background:#FFEFEE;color:#E63B2E}
.b-orange{background:#FFF4E6;color:#C67C00}
.b-gray{background:var(--bg2);color:var(--text2)}

/* ── Avatar ── */
.av{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:var(--white);
  flex-shrink:0;overflow:hidden;
  box-shadow:var(--shadow-xs);
}
.av img{width:100%;height:100%;object-fit:cover}
.av-sm{width:34px;height:34px;font-size:12px}
.av-lg{width:56px;height:56px;font-size:20px}
.av-xl{width:72px;height:72px;font-size:26px;border-radius:20px}

/* ── Icon container ── */
.ic{
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.ic svg{display:block}

/* ── Tab Bar ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.88);
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-top:1px solid var(--border-light);
  padding-bottom:env(safe-area-inset-bottom,0);
}
.tabbar-inner{
  display:grid;grid-template-columns:repeat(5,1fr);
  max-width:500px;margin:0 auto;
  height:56px;
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;user-select:none;
  transition:all .15s;position:relative;
}
.tab svg{
  width:22px;height:22px;
  stroke:var(--text3);stroke-width:1.7;fill:none;
  transition:all .15s;
}
.tab span{font-size:10px;font-weight:500;color:var(--text3);transition:all .15s}
.tab.on svg{stroke:var(--black);stroke-width:2}
.tab.on span{color:var(--black);font-weight:700}
.tab.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:20px;height:2.5px;border-radius:0 0 2px 2px;
  background:var(--black);
}
.tab-c{position:relative}
.tab-c .plus-circle{
  width:44px;height:44px;border-radius:50%;
  background:var(--black);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.18);
  margin-top:-14px;margin-bottom:-2px;
  transition:transform .15s;
}
.tab-c .plus-circle svg{stroke:var(--white);stroke-width:2.2;width:20px;height:20px}
.tab-c:active .plus-circle{transform:scale(.9)}
.tab-c span{font-size:10px;font-weight:500;color:var(--text3)}
.tab-c.on span{color:var(--black);font-weight:700}

/* ── Participant Row ── */
.p-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:14px;
  cursor:pointer;transition:all .15s;
  border:1.5px solid transparent;
}
.p-row:hover{background:var(--bg2)}
.p-row:active{background:var(--bg3);transform:scale(.99)}
.p-row .rank{
  width:26px;font-size:14px;font-weight:700;
  color:var(--text3);text-align:center;flex-shrink:0;
}
.p-row .info{flex:1;min-width:0}
.p-row .nm{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-row .un{font-size:12px;color:var(--text3)}
.p-row .pts{
  font-size:14px;font-weight:700;
  background:var(--bg2);padding:6px 12px;border-radius:9px;
  flex-shrink:0;
}
.p-row.t1 .rank{color:var(--gold)}
.p-row.t2 .rank{color:var(--silver)}
.p-row.t3 .rank{color:var(--bronze)}
.p-row.t1 .pts{background:#FFFBEB;color:#B8860B}
.p-row.t2 .pts{background:#F4F4F5;color:#71717A}
.p-row.t3 .pts{background:#FFF7ED;color:#9A3412}
.p-row.me{background:var(--bg2);border-color:var(--border)}

/* ── Hero ── */
.hero{
  border-radius:var(--r-lg);padding:36px 24px;
  text-align:center;position:relative;overflow:hidden;
  background:linear-gradient(145deg,#F5F5F7 0%,#FFFFFF 50%,#F5F5F7 100%);
  border:1px solid var(--border-light);
}
.hero-deco{
  position:absolute;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,0,.03) 0%,transparent 70%);
  pointer-events:none;
}
.hero-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--black);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;box-shadow:0 8px 24px rgba(0,0,0,.15);
  animation:float 3.5s ease-in-out infinite;
}
.hero-icon svg{width:34px;height:34px;stroke:var(--white);stroke-width:1.6;fill:none}
.hero-chip{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--white);border:1px solid var(--border-light);
  padding:8px 16px;border-radius:var(--r-full);
  font-size:13px;font-weight:500;box-shadow:var(--shadow-xs);
}
.dot-live{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);animation:pulse 2s ease infinite;
}

/* ── Progress ── */
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;background:var(--black);border-radius:3px;animation:barGrow .7s ease both}

/* ── Contest Card ── */
.cc{
  border:1px solid var(--border-light);border-radius:var(--r-lg);
  padding:20px;background:var(--white);cursor:pointer;
  transition:all .2s;margin-bottom:12px;
}
.cc:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.cc:active{transform:scale(.985)}
.cc-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.cc-meta span{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--text2);
}
.cc-meta svg{width:13px;height:13px;stroke:var(--text3);stroke-width:2;fill:none}
.cc-channel{
  display:inline-flex;align-items:center;gap:5px;
  font-size:13px;font-weight:500;color:var(--text2);
  background:var(--bg2);padding:5px 12px;border-radius:9px;
  margin-top:10px;
}

/* ── Section ── */
.sec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sec-t{font-size:20px;font-weight:800;letter-spacing:-.3px}

/* ── Stats grid ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sb{
  background:var(--bg2);border-radius:var(--r);
  padding:18px;text-align:center;
}
.sb .v{font-size:30px;font-weight:800;letter-spacing:-.5px}
.sb .l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* ── Toggle ── */
.toggle{
  width:50px;height:30px;background:var(--bg3);border-radius:15px;
  cursor:pointer;transition:all .25s;flex-shrink:0;position:relative;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:24px;height:24px;background:var(--white);border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,.15);transition:all .25s;
}
.toggle.on{background:var(--black)}
.toggle.on::after{left:23px}

/* ── Prize ── */
.prize{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:var(--bg2);
  border-radius:12px;font-size:14px;font-weight:500;
}
.prize-n{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--white);flex-shrink:0;
}
.pn1{background:linear-gradient(135deg,#FFD700,#FFA500)}
.pn2{background:linear-gradient(135deg,#C0C0C0,#A0A0A0)}
.pn3{background:linear-gradient(135deg,#CD7F32,#A0522D)}
.pn-d{background:var(--text3)}

/* ── Toast ── */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--black);color:var(--white);
  padding:14px 24px;border-radius:14px;
  font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);z-index:9999;
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
  max-width:90vw;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s;
}
.modal{
  background:var(--white);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:8px 20px 40px;
  width:100%;max-width:500px;max-height:85vh;overflow-y:auto;
  animation:slideUp .3s ease;
}
.modal-bar{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:8px auto 20px}

/* ── Divider ── */
.divider{height:1px;background:var(--border-light);margin:20px 0}

/* ── Back ── */
.back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:15px;font-weight:500;color:var(--text2);
  cursor:pointer;padding:8px 0;margin-bottom:8px;transition:color .15s;
}
.back:hover{color:var(--text)}
.back svg{width:20px;height:20px}

/* ── Empty ── */
.empty{text-align:center;padding:48px 20px}
.empty-ic{
  width:80px;height:80px;background:var(--bg2);border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
}
.empty-ic svg{width:36px;height:36px;stroke:var(--text3);stroke-width:1.5;fill:none}

/* ── My points card ── */
.my-pts{
  background:#F0FDF4;border:1.5px solid #BBF7D0;
  border-radius:var(--r);padding:18px;
}
</style>
</head>

function fmtDate(d){
  if(!d)return'—';
  const dt=new Date(d);
  const pad=n=>String(n).padStart(2,'0');
  return`${pad(dt.getDate())}.${pad(dt.getMonth()+1)}.${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())} МСК`;
}

function timeLeft(d){
  if(!d)return'—';
  const diff=new Date(d)-new Date();
  if(diff<=0)return'Завершён';
  const days=Math.floor(diff/864e5);
  const hrs=Math.floor((diff%864e5)/36e5);
  const mins=Math.floor((diff%36e5)/6e4);
  if(days>0)return`${days}д ${hrs}ч`;
  if(hrs>0)return`${hrs}ч ${mins}м`;
  return`${mins}м`;
}

}

  const showTabs=['home','mypoints','create','admin','profile'];

/* ── Tab Bar ── */
function buildTabBar(){
  const bar=el('nav','tabbar','');
  const inner=el('div','tabbar-inner','');
  const tabs=[
    {id:'home',icon:'home',label:'Главная'},
    {id:'mypoints',icon:'star',label:'Баллы'},
    {id:'create',icon:'plus',label:'Создать',center:true},
    {id:'admin',icon:'settings',label:'Админ'},
    {id:'profile',icon:'user',label:'Профиль'},
  ];

  tabs.forEach(t=>{
    const isOn=state.screen===t.id;
    if(t.center){
      const tab=el('div',`tab tab-c${isOn?' on':''}`,'');
      tab.innerHTML=`<div class="plus-circle">${I.plus}</div><span>${t.label}</span>`;
      tab.onclick=()=>{state.screen=t.id;render();if(tg?.HapticFeedback)tg.HapticFeedback.selectionChanged()};
      inner.appendChild(tab);
    }else{
      const tab=el('div',`tab${isOn?' on':''}`,'');
      tab.innerHTML=`${I[t.icon]}<span>${t.label}</span>`;
      tab.onclick=()=>{state.screen=t.id;render();if(tg?.HapticFeedback)tg.HapticFeedback.selectionChanged()};
      inner.appendChild(tab);
    }
  });

  bar.appendChild(inner);
  return bar;
}

        channel_username:channel.startsWith('@')?channel:'@'+channel,
        end_datetime_msk:end,
        button_text:$('#f-btn').value.trim()||'Участвовать',
        initial_points:parseInt($('#f-initpts').value)||0,
        winners_count:parseInt($('#f-winners').value)||1,
        outcome_type:parseInt(outcSel.value),
        threshold:outcSel.value==='2'?parseInt($('#f-thresh').value)||50:null,
        status:'active',scoring_enabled:false,scoring_config:null,
        prizes:$('#f-prizes').value.trim().split('\n').filter(Boolean),
        participants:[]
      };

      state.contests.unshift(contest);

      // Публикация поста в канал через Bot API
      try{
        const prizesText=contest.prizes.length?'\n\nПризы:\n'+contest.prizes.map((p,i)=>`  ${i+1}. ${p}`).join('\n'):'';
        const text=`🎉 <b>Новый конкурс!</b>\n\n<b>${contest.name}</b>\n${contest.description?'\n'+contest.description:''}${contest.conditions?'\n\nУсловия: '+contest.conditions:''}${prizesText}\n\nОкончание: ${fmtDate(contest.end_datetime_msk)}\nПобедителей: ${contest.winners_count}`;
        await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({chat_id:contest.channel_username,text,parse_mode:'HTML'})
        });
      }catch(e){console.log('Post to channel:',e)}

      showToast('Конкурс создан!');
      if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      state.screen='home';render();
    };
  },50);
}

    btn.innerHTML=`${ic('zap',18,18)} ${ct.button_text||'Участвовать'}`;
    btn.onclick=()=>{
      ct.participants.push({user_tg_id:tgUser.id,first_name:tgUser.first_name,last_name:tgUser.last_name||'',username:tgUser.username,points:ct.initial_points||0,photo_url:null});
      if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');
      showToast('Вы участвуете!');

    };

  }else if(isJoined){
    const mp=el('div','my-pts mt3 fu d5','');

    mp.innerHTML=`

        <div>
          <div class="t-xs fw6" style="color:#1B9E4B">Вы участвуете</div>

    `;

    c.appendChild(el('div','sec-h mt4 fu d6',`<span class="sec-t t-lg">Участники</span><span class="t-sm c3">${participants.length}</span>`));

      <div class="flex jcsb"><span class="c2">Начальные баллы</span><span class="fw6">${ct.initial_points}</span></div>
      <div class="flex jcsb"><span class="c2">Начисление</span><span class="fw6" style="color:${ct.scoring_enabled?'#1B9E4B':'var(--text3)'}">${ct.scoring_enabled?'Включено':'Выключено'}</span></div>

        <div class="field f1" style="margin-bottom:0"><label>За реакцию</label><input class="inp" type="number" id="sc-rp" value="${ct.scoring_config?.reactions?.pts||1}" min="1"></div>
        <div class="field f1" style="margin-bottom:0"><label>Лимит/день</label><input class="inp" type="number" id="sc-rl" value="${ct.scoring_config?.reactions?.limit||10}" min="1"></div>
      </div>
    `;
    wrap.appendChild(r);

    // Invites
    const inv=el('div','card card-s mt2','');
    inv.innerHTML=`
      <div class="flex aic g3 mb2">
        <div class="av" style="background:var(--bg2);width:40px;height:40px"><span class="ic" style="width:20px;height:20px;color:var(--text)">${I.users}</span></div>
        <div><div class="t-base fw6">Приглашения</div><div class="t-xs c2">Баллы за приведённых друзей</div></div>
      </div>
      <div class="field" style="margin-bottom:10px"><label>За приглашение</label><input class="inp" type="number" id="sc-ip" value="${ct.scoring_config?.invites?.pts||5}" min="1"></div>
      <label class="flex aic g2 t-sm" style="cursor:pointer"><input type="checkbox" id="sc-isub" ${ct.scoring_config?.invites?.require_sub!==false?'checked':''}> Требовать подписку на канал</label>
    `;
    wrap.appendChild(inv);

    // Ads
    const ads=el('div','card card-s mt2','');
    ads.innerHTML=`
      <div class="flex aic g3 mb2">
        <div class="av" style="background:var(--bg2);width:40px;height:40px"><span class="ic" style="width:20px;height:20px;color:var(--text)">${I.zap}</span></div>
        <div><div class="t-base fw6">Реклама</div><div class="t-xs c2">Баллы за просмотр видео</div></div>
      </div>
      <div class="flex g2">
        <div class="field f1" style="margin-bottom:10px"><label>За просмотр</label><input class="inp" type="number" id="sc-ap" value="${ct.scoring_config?.ads?.pts||3}" min="1"></div>
      </div>
      <div class="field" style="margin-bottom:0"><label>Ссылка на видео</label><input class="inp" id="sc-au" placeholder="https://..." value="${ct.scoring_config?.ads?.url||''}"></div>
    `;
    wrap.appendChild(ads);

    // Save
    const saveBtn=el('button','btn btn-p btn-block mt3','');
    saveBtn.style.padding='17px';
    saveBtn.innerHTML=`${ic('check',18,18)} Сохранить`;
    saveBtn.onclick=()=>{
      ct.scoring_enabled=true;ct.status='active';
      ct.scoring_config={
        reactions:{pts:+$('#sc-rp').value||1,limit:+$('#sc-rl').value||10},
        invites:{pts:+$('#sc-ip').value||5,require_sub:$('#sc-isub').checked},

    setTimeout(()=>{
      const t=$('#sc-tog');

    },50);
  }

  setTimeout(()=>{
    renderSettings(0);
    const sel=$('#sc-sel');
    if(sel)sel.onchange=()=>renderSettings(+sel.value);
  },50);
}

  const info=el('div','flat mt3 fu d3','');
  info.innerHTML=`
    <div class="col g2 t-sm">
      <div class="flex jcsb"><span class="c2">Telegram ID</span><span class="fw6 mono">${tgUser.id}</span></div>
      <div class="flex jcsb"><span class="c2">Username</span><span class="fw6">${tgUser.username?'@'+tgUser.username:'—'}</span></div>
      <div class="flex jcsb"><span class="c2">Статус</span><span class="fw6">${isAdmin?'Администратор':'Пользователь'}</span></div>
    </div>
  `;
  c.appendChild(info);

  if(tgUser.username){
    const tgBtn=el('button','btn btn-s btn-block mt3 fu d4','');
    tgBtn.innerHTML=`${ic('ext',16,16)} Открыть в Telegram`;
    tgBtn.onclick=()=>window.open(`https://t.me/${tgUser.username}`,'_blank');
    c.appendChild(tgBtn);
  }
}

/* ── СТАРТ ── */
render();
</script>
</body>
</html>
