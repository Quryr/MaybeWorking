<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFFFF;--card:#FFFFFF;--card-border:#E5E5EA;
  --text:#000000;--text2:#6E6E73;--text3:#AEAEB2;
  --accent:#000000;--accent-text:#FFFFFF;
  --danger:#FF3B30;--danger-bg:#FFF1F0;
  --success:#34C759;--success-bg:#E8F9EE;
  --warn:#FF9500;--warn-bg:#FFF8EC;
  --section-bg:#F2F2F7;--hover:#F5F5F7;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
}
html,body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:geometricPrecision;
  overflow-x:hidden;min-height:100vh;
}
body{padding-bottom:calc(88px + env(safe-area-inset-bottom,0px))}
input,textarea,select,button{font-family:inherit;font-size:inherit;-webkit-appearance:none;appearance:none}
a{color:inherit;text-decoration:none}

/* ===== APP ===== */
.app{max-width:480px;margin:0 auto;padding:16px 16px 0}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;gap:12px;padding:12px 0 24px}
.header h1{font-size:28px;font-weight:900;letter-spacing:-0.8px;flex:1;line-height:1.1}
.header-sub{font-size:14px;font-weight:500;color:var(--text2);margin-top:4px}
.header-badge{font-size:11px;font-weight:700;background:#000;color:#fff;padding:4px 12px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}

/* ===== BACK BUTTON ===== */
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px 10px 14px;background:var(--section-bg);
  border:1px solid var(--card-border);border-radius:40px;
  font-size:14px;font-weight:600;color:var(--text);cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;margin-bottom:20px;
}
.back-btn:active{transform:scale(.95);background:var(--card-border)}
.back-btn svg{width:18px;height:18px;flex-shrink:0}

/* ===== CARD ===== */
.card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(.985)}
.card-clickable{cursor:pointer}

/* ===== CONTEST CARD ===== */
.ccard{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  display:flex;gap:14px;align-items:flex-start;cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.ccard:active{transform:scale(.985);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ccard-icon{
  width:64px;height:64px;border-radius:16px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;overflow:hidden;
}
.ccard-icon::after{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 100%);
  border-radius:16px 16px 0 0;
}
.ccard-icon svg{width:30px;height:30px;stroke:#fff;stroke-width:1.8;fill:none;position:relative;z-index:1}
.ccard-body{flex:1;min-width:0}
.ccard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.ccard-title{font-size:16px;font-weight:800;letter-spacing:-0.3px;line-height:1.25}
.ccard-channel{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px}
.ccard-meta{display:flex;gap:14px;flex-wrap:wrap}
.ccard-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text2)}
.ccard-meta-item svg{width:14px;height:14px;stroke:var(--text3);stroke-width:2;fill:none}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.badge-live{background:var(--success-bg);color:#1B9E4B}
.badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
.badge-ended{background:var(--section-bg);color:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== BUTTONS ===== */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:15px;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;border:none;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;letter-spacing:-0.2px;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:var(--accent-text)}
.btn-primary:active{background:#333}
.btn-secondary{background:var(--section-bg);color:var(--text);border:1px solid var(--card-border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-sm{padding:10px 16px;font-size:13px;width:auto;border-radius:var(--radius-xs)}
.btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}

/* ===== FORMS ===== */
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:.2px;text-transform:uppercase}
.form-hint{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.4}
.form-input{
  width:100%;padding:14px 16px;border:1.5px solid var(--card-border);
  border-radius:var(--radius-sm);font-size:16px;font-weight:500;
  background:var(--card);color:var(--text);transition:border-color .2s;outline:none;
}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:88px;line-height:1.5}
select.form-input{
  cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23AEAEB2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 16px center;padding-right:40px;
}

/* ===== TOGGLE ===== */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--section-bg);border-radius:var(--radius-sm);margin-bottom:8px;gap:12px}
.toggle-row-info{display:flex;flex-direction:column;gap:3px;flex:1}
.toggle-row-title{font-size:15px;font-weight:700}
.toggle-row-desc{font-size:12px;color:var(--text2);line-height:1.4}
.toggle{position:relative;width:52px;height:32px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--card-border);border-radius:16px;cursor:pointer;transition:all .3s}
.toggle-slider::before{content:'';position:absolute;width:26px;height:26px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px)}
.toggle-sub{padding:12px 16px 16px;display:none}
.toggle-sub.show{display:block}

/* ===== SECTION TITLE ===== */
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin:28px 0 12px;padding:0 4px}

/* ===== TAB BAR ===== */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--card-border);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  padding:0 0 env(safe-area-inset-bottom,0px);
  z-index:1000;
}
.tab-bar.cols-4{grid-template-columns:repeat(4,1fr)}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 0 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .2s;position:relative;gap:4px;
}
.tab svg{width:24px;height:24px;stroke:var(--text3);stroke-width:1.8;fill:none;transition:stroke .2s}
.tab span{font-size:10px;font-weight:600;color:var(--text3);transition:color .2s;letter-spacing:.3px}
.tab.active svg{stroke:var(--text)}
.tab.active span{color:var(--text)}
.tab.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;height:3px;background:var(--accent);border-radius:0 0 3px 3px}
.tab-create{position:relative}
.tab-create .tab-create-circle{
  width:48px;height:48px;background:var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-top:-22px;border:3px solid #fff;
  box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .2s;
}
.tab-create:active .tab-create-circle{transform:scale(.9)}
.tab-create .tab-create-circle svg{width:24px;height:24px;stroke:#fff!important;stroke-width:2.5}
.tab-create span{margin-top:4px}

/* ===== LEADERBOARD ===== */
.lb-item{
  display:flex;align-items:center;gap:12px;padding:14px;
  border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  background:var(--card);border:1px solid var(--card-border);
}
.lb-item:active{transform:scale(.98)}
.lb-item.me{border-color:var(--accent);background:#FAFAFA;box-shadow:0 0 0 1px var(--accent)}
.lb-rank{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border-radius:50%;flex-shrink:0}
.lb-rank.r1{background:#FFF3D6;color:#C58800}
.lb-rank.r2{background:#F0F0F0;color:#666}
.lb-rank.r3{background:#FFE8D6;color:#B5651D}
.lb-rank.rn{background:var(--section-bg);color:var(--text2)}
.lb-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.lb-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-username{font-size:12px;color:var(--text3);font-weight:500;margin-top:1px}
.lb-stats{display:flex;align-items:center;gap:10px;margin-top:4px}
.lb-stat{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--text2)}
.lb-stat svg{width:13px;height:13px;stroke:var(--text3);stroke-width:2;fill:none}
.lb-points-col{text-align:right;flex-shrink:0}
.lb-points{font-size:18px;font-weight:900;letter-spacing:-.5px}
.lb-points-label{font-size:10px;color:var(--text3);font-weight:600}

/* ===== INVITE BOX ===== */
.invite-box{background:var(--section-bg);border:1.5px solid var(--card-border);border-radius:var(--radius);padding:16px;margin:16px 0}
.invite-box-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.invite-box-title svg{width:18px;height:18px;stroke:var(--text);stroke-width:2;fill:none}
.invite-box-row{display:flex;gap:8px;align-items:center}
.invite-box-link{flex:1;padding:12px 14px;background:#fff;border:1px solid var(--card-border);border-radius:var(--radius-xs);font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'SF Mono','Menlo',monospace}
.invite-box-copy{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--accent);border-radius:var(--radius-xs);cursor:pointer;flex-shrink:0;transition:all .15s;border:none}
.invite-box-copy:active{transform:scale(.88)}
.invite-box-copy svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none}
.invite-box-hint{font-size:12px;color:var(--text2);margin-top:10px;font-weight:500;line-height:1.4}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));animation:slideUp .3s}
.modal-handle{width:40px;height:4px;background:var(--card-border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:4px;text-align:center;letter-spacing:-0.3px}
.modal-subtitle{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions .btn{flex:1}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}

/* ===== PRIZE ROW ===== */
.prize-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prize-medal{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}
.prize-medal.m1{background:#FFF3D6;color:#C58800}
.prize-medal.m2{background:#F0F0F0;color:#666}
.prize-medal.m3{background:#FFE8D6;color:#B5651D}
.prize-medal.mn{background:var(--section-bg);color:var(--text2)}
.prize-input{flex:1}
.prize-remove{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--danger-bg);border:none;border-radius:50%;cursor:pointer;flex-shrink:0;transition:all .15s}
.prize-remove:active{transform:scale(.85)}
.prize-remove svg{width:16px;height:16px;stroke:var(--danger);stroke-width:2;fill:none}

/* ===== STAT ROW ===== */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.stat-box{background:var(--section-bg);border-radius:var(--radius-sm);padding:16px 8px;text-align:center}
.stat-box-val{font-size:24px;font-weight:900;letter-spacing:-.5px}
.stat-box-label{font-size:11px;font-weight:600;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* ===== INFO ROW ===== */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--card-border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:14px;color:var(--text2);font-weight:500}
.info-value{font-size:14px;font-weight:700;text-align:right;max-width:60%}

/* ===== DIVIDER ===== */
.divider{height:1px;background:var(--card-border);margin:16px 0}

/* ===== NOTICE ===== */
.notice{padding:14px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;line-height:1.5;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.notice svg{width:18px;height:18px;flex-shrink:0;margin-top:1px}
.notice-warn{background:var(--warn-bg);color:#8A5A00}
.notice-warn svg{stroke:#FF9500}
.notice-info{background:#EFF6FF;color:#1D4ED8}
.notice-info svg{stroke:#3B82F6}
.notice-success{background:var(--success-bg);color:#1B9E4B}
.notice-success svg{stroke:var(--success)}
.notice-error{background:var(--danger-bg);color:var(--danger)}
.notice-error svg{stroke:var(--danger)}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:60px 24px}
.empty-icon{width:80px;height:80px;border-radius:50%;background:var(--section-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.empty-icon svg{width:36px;height:36px;stroke:var(--text3);stroke-width:1.5;fill:none}
.empty-title{font-size:20px;font-weight:800;margin-bottom:8px}
.empty-desc{font-size:14px;color:var(--text2);line-height:1.6;max-width:280px;margin:0 auto}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:3000;animation:fadeIn .3s;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.toast-success{background:var(--success-bg);color:#1B9E4B;border:1px solid #B8EDCB}
.toast-error{background:var(--danger-bg);color:var(--danger);border:1px solid #FFBABA}

/* ===== CHANNEL CARD ===== */
.ch-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--section-bg);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.ch-card:active{transform:scale(.98)}
.ch-card.selected{border-color:var(--accent);background:#FAFAFA}
.ch-card-title{font-size:15px;font-weight:700;flex:1}
.ch-card-id{font-size:11px;color:var(--text3);font-weight:500}

/* ===== ADMIN TABS ===== */
.admin-tabs{display:flex;gap:4px;background:var(--section-bg);border-radius:var(--radius-xs);padding:4px;margin-bottom:16px}
.admin-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;border-radius:var(--radius-xs);cursor:pointer;transition:all .2s;color:var(--text2)}
.admin-tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ===== LOADING ===== */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getInitials(n){if(!n)return'?';const p=n.split(' ');return p.length>1?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase()}
const AVATAR_COLORS=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F8C471','#82E0AA'];
function getAvatarColor(n){if(!n)return AVATAR_COLORS[0];let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]}

function avatarHTML(user,size=40){

  const photo=photoCache[uid];
  if(photo){

  }
  return`<div class="lb-avatar" style="background:${getAvatarColor(user.first_name)};width:${size}px;height:${size}px;font-size:${Math.round(size*.38)}px">${getInitials(user.first_name)}</div>`;
}

// ═══════════════════════════════════════
// MSK TIME (UTC+3) — всё время в Москве
// ═══════════════════════════════════════
function formatDateMSK(dateStr){
  if(!dateStr)return'—';
  try{
    const d=new Date(dateStr);
    return d.toLocaleString('ru-RU',{timeZone:'Europe/Moscow',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+' МСК';
  }catch(e){return dateStr}
}
function timeLeft(dateStr){
  if(!dateStr)return'—';
  const now=Date.now();
  const end=new Date(dateStr).getTime();
  const diff=end-now;
  if(diff<=0)return'Завершён';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  if(d>0)return d+'д '+h+'ч';
  if(h>0)return h+'ч '+m+'м';
  return m+'м';
}
// Конвертация из datetime-local (МСК) в ISO UTC
function mskInputToUTC(val){
  if(!val)return'';
  // val = "2026-03-15T18:00" — пользователь вводит по МСК
  return new Date(val+':00+03:00').toISOString();
}
// Конвертация из ISO UTC в datetime-local (МСК) для формы
function utcToMskInput(iso){
  if(!iso)return'';
  const d=new Date(iso);
  const msk=new Date(d.getTime()+3*3600000);
  return msk.toISOString().slice(0,16);
}

}

function startParticipantsListener(contestId){

  unsubParts[contestId]=onSnapshot(
    query(collection(db,'participants'),where('contest_id','==',contestId)),
    (snap)=>{
      state.participants[contestId]=snap.docs.map(d=>({_id:d.id,...d.data()}));
      const parts=state.participants[contestId];
      loadPhotosForUsers(parts).then(()=>render());

  );

// TELEGRAM BOT API
// ═══════════════════════════════════════
async function tgApi(method,params={}){
  if(!BOT_TOKEN)return{ok:false};
  try{
    const r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(params)
    });
    return await r.json();
  }catch(e){console.error('TG API error:',e);return{ok:false,description:e.message}}
}

// ═══════════════════════════════════════
// USER PHOTOS (аватарки из Telegram)
// ═══════════════════════════════════════
async function getUserPhoto(userId){
  if(photoCache[userId]!==undefined)return photoCache[userId];
  if(!BOT_TOKEN){photoCache[userId]=null;return null}
  try{
    const r=await tgApi('getUserProfilePhotos',{user_id:userId,limit:1});
    if(r.ok&&r.result.total_count>0){
      const fileId=r.result.photos[0][0].file_id;
      const r2=await tgApi('getFile',{file_id:fileId});
      if(r2.ok){
        const url=`https://api.telegram.org/file/bot${BOT_TOKEN}/${r2.result.file_path}`;
        photoCache[userId]=url;
        return url;
      }
    }
  }catch(e){}
  photoCache[userId]=null;
  return null;
}
async function loadPhotosForUsers(users){
  const toLoad=users.filter(u=>{
    const uid=u.user_id||u.id;
    return photoCache[uid]===undefined;
  }).slice(0,15);
  await Promise.allSettled(toLoad.map(u=>getUserPhoto(u.user_id||u.id)));
}

async function loadChannels(){

  const all=await fbGetAll('channels');
  // Показываем только каналы текущего пользователя (где он админ)
  state.channels=all.filter(ch=>ch.admin_id===currentUser.id||currentUser.is_admin);
}

async function scanForChannels(){
  if(!BOT_TOKEN)return;
  try{
    const r=await tgApi('getUpdates',{offset:-100,limit:100});
    if(!r.ok)return;
    const found=new Map();
    for(const u of r.result){
      // Бота добавили в канал как админа
      const mc=u.my_chat_member;
      if(mc&&(mc.chat.type==='channel'||mc.chat.type==='supergroup')){
        const chat=mc.chat;
        const newStatus=mc.new_chat_member?.status;
        if(newStatus==='administrator'||newStatus==='member'){
          found.set(chat.id,{
            chat_id:chat.id,
            title:chat.title||'Канал',
            username:chat.username||'',
            admin_id:mc.from?.id||currentUser.id,
          });
        }
      }
    }
    // Сохраняем найденные каналы в Firebase
    for(const[chatId,ch]of found){
      const existing=state.channels.find(c=>c.chat_id===chatId);
      if(!existing&&fbReady){
        const id=await fbAdd('channels',ch);
        if(id)state.channels.push({_id:id,...ch});
      }
    }
  }catch(e){console.error('Scan error:',e)}
}

// Ручная проверка канала по @username
async function checkChannelManual(username){
  if(!BOT_TOKEN||!username)return null;
  const chatId=username.startsWith('@')?username:('@'+username);
  // Проверяем что бот — админ
  const r=await tgApi('getChatAdministrators',{chat_id:chatId});
  if(!r.ok)return{error:'Канал не найден или бот не добавлен в администраторы'};
  const botInfo=await tgApi('getMe');
  const botId=botInfo.ok?botInfo.result.id:null;
  const botIsAdmin=r.result.some(a=>a.user.id===botId);
  if(!botIsAdmin)return{error:'Бот не является администратором канала'};
  const userIsAdmin=r.result.some(a=>a.user.id===currentUser.id);
  if(!userIsAdmin&&!currentUser.is_admin)return{error:'Вы не являетесь администратором этого канала'};
  // Получаем инфо о канале
  const chatInfo=await tgApi('getChat',{chat_id:chatId});
  if(!chatInfo.ok)return{error:'Не удалось получить информацию о канале'};
  const ch={
    chat_id:chatInfo.result.id,
    title:chatInfo.result.title||'Канал',
    username:chatInfo.result.username||'',
    admin_id:currentUser.id
  };
  // Сохраняем
  const existing=state.channels.find(c=>c.chat_id===ch.chat_id);
  if(!existing&&fbReady){
    const id=await fbAdd('channels',ch);
    state.channels.push({_id:id,...ch});
  }
  return{success:true,channel:ch};
}

// ═══════════════════════════════════════
// SEND CONTEST POST TO CHANNEL
// ═══════════════════════════════════════
async function sendContestPost(contest){
  if(!BOT_TOKEN)return false;
  const chatId=contest.channel_id;
  if(!chatId){toast('Канал не указан','error');return false}

  // Формируем красивый пост
  let text='━━━━━━━━━━━━━━━━━━\n';
  text+=`<b>🏆 ${contest.name}</b>\n`;
  text+='━━━━━━━━━━━━━━━━━━\n\n';
  if(contest.description)text+=contest.description+'\n\n';
  if(contest.conditions)text+=`📋 <b>Условия:</b>\n${contest.conditions}\n\n`;

  // Призы по местам
  const prizes=contest.prizes||[];
  const validPrizes=prizes.filter(p=>p&&p.trim());
  if(validPrizes.length>0){
    text+='<b>🎁 Призы:</b>\n';
    const medals=['🥇','🥈','🥉'];
    validPrizes.forEach((p,i)=>{
      text+=`${medals[i]||('  '+(i+1)+'.')} <b>${i+1}-е место</b> — ${p}\n`;
    });
    text+='\n';
    text+=`👥 <b>Призовых мест:</b> ${validPrizes.length}\n\n`;
  }

  // Способы заработка
  const methods=[];
  if(contest.scoring?.invites?.enabled)methods.push(`👥 Приглашение друзей — <b>+${contest.scoring.invites.points} баллов</b> за друга`);
  if(contest.scoring?.reactions?.enabled)methods.push(`❤️ Реакции на постах — <b>+${contest.scoring.reactions.points} баллов</b> за реакцию`);
  if(contest.scoring?.ads?.enabled)methods.push(`▶️ Просмотр рекламы — <b>+${contest.scoring.ads.points} баллов</b>`);
  if(methods.length>0){
    text+='<b>⚡ Как заработать баллы:</b>\n';
    methods.forEach(m=>text+=m+'\n');
    text+='\n';
  }

  // Тип определения
  const outcomes={leaderboard:'по лидерборду (больше баллов)',random:'случайный выбор среди участников',weighted:'взвешенный рандом (чем больше баллов, тем выше шанс)'};
  text+=`🎯 <b>Победитель:</b> ${outcomes[contest.outcome_type]||'по лидерборду'}\n`;
  if(contest.outcome_type==='random'&&contest.threshold)text+=`   Порог: от ${contest.threshold} баллов\n`;
  text+='\n';
  text+=`⏰ <b>До:</b> ${formatDateMSK(contest.end_date)}\n\n`;
  text+='━━━━━━━━━━━━━━━━━━\n';
  text+='<b>Нажмите кнопку ниже, чтобы участвовать!</b>';

  const btnText=contest.button_text||'Участвовать';

  // Попытка 1: web_app кнопка
  let result=await tgApi('sendMessage',{
    chat_id:chatId,text,parse_mode:'HTML',
    reply_markup:{inline_keyboard:[[{text:'🏆 '+btnText,web_app:{url:MINI_APP_URL+'?contest='+contest._id}}]]}
  });
  if(result.ok){toast('Пост опубликован в канале!');return true}
  console.log('web_app button failed:',result.description);

  // Попытка 2: url кнопка
  result=await tgApi('sendMessage',{
    chat_id:chatId,text,parse_mode:'HTML',
    reply_markup:{inline_keyboard:[[{text:'🏆 '+btnText,url:MINI_APP_URL+'?contest='+contest._id}]]}
  });
  if(result.ok){toast('Пост опубликован! (кнопка откроется в браузере)');return true}
  console.log('url button failed:',result.description);

  // Попытка 3: без кнопки
  result=await tgApi('sendMessage',{chat_id:chatId,text,parse_mode:'HTML'});
  if(result.ok){toast('Пост опубликован (без кнопки — настройте домен в BotFather)','error');return true}

  // Полный провал
  toast('Ошибка: '+(result.description||'Неизвестная ошибка'),'error');
  return false;
}

    if(prize)text+=` → ${prize}`;
    text+='\n';
  });
  text+='\n━━━━━━━━━━━━━━━━━━\n';
  text+='Спасибо всем участникам! 🎉';

  // Отправляем с кнопкой "Посмотреть итоги"
  let r=await tgApi('sendMessage',{
    chat_id:chatId,text,parse_mode:'HTML',
    reply_markup:{inline_keyboard:[[{text:'📊 Посмотреть итоги',web_app:{url:MINI_APP_URL+'?contest='+contest._id}}]]}
  });
  if(!r.ok){
    r=await tgApi('sendMessage',{
      chat_id:chatId,text,parse_mode:'HTML',
      reply_markup:{inline_keyboard:[[{text:'📊 Посмотреть итоги',url:MINI_APP_URL+'?contest='+contest._id}]]}
    });
  }
  if(!r.ok){
    await tgApi('sendMessage',{chat_id:chatId,text,parse_mode:'HTML'});
  }
}

async function createContest(fd){
  if(!fd.name||!fd.name.trim()){toast('Укажите название','error');return false}
  if(!fd.channel_id){toast('Выберите канал','error');return false}
  if(!fd.end_date){toast('Укажите дату окончания','error');return false}

  const contest={
    name:fd.name.trim(),
    description:(fd.description||'').trim(),
    conditions:(fd.conditions||'').trim(),
    channel_id:fd.channel_id,
    channel_title:fd.channel_title||'',
    channel_username:fd.channel_username||'',
    end_date:mskInputToUTC(fd.end_date),
    button_text:(fd.button_text||'Участвовать').trim(),
    initial_points:parseInt(fd.initial_points)||0,
    outcome_type:fd.outcome_type||'leaderboard',
    threshold:parseInt(fd.threshold)||0,
    prizes:(fd.prizes||[]).filter(p=>p&&p.trim()),
    scoring:{
      invites:{enabled:!!fd.invites_enabled,points:parseInt(fd.invites_points)||5},
      reactions:{enabled:!!fd.reactions_enabled,points:parseInt(fd.reactions_points)||1},
      ads:{enabled:!!fd.ads_enabled,points:parseInt(fd.ads_points)||3}
    },
    status:'active',
    creator_id:currentUser.id,
    creator_name:currentUser.first_name,
    created_at:new Date().toISOString()
  };

  try{
    const id=await fbAdd('contests',contest);
    if(!id){toast('Ошибка создания','error');return false}
    contest._id=id;
    // Отправляем пост в канал
    await sendContestPost(contest);
    toast('Конкурс создан!');
    return true;
  }catch(e){
    toast('Ошибка: '+e.message,'error');
    return false;
  }
}

async function joinContest(contestId){
  const contest=state.contests.find(c=>c._id===contestId);
  if(!contest)return;
  const parts=state.participants[contestId]||[];
  if(parts.some(p=>p.user_id===currentUser.id)){toast('Вы уже участвуете!');return}

  const participant={
    contest_id:contestId,
    user_id:currentUser.id,
    first_name:currentUser.first_name,
    username:currentUser.username,
    points:contest.initial_points||0,
    invites_count:0,reactions_count:0,ads_count:0,
    invite_link:'',
    joined_at:new Date().toISOString()
  };

  try{
    // Создаём invite link для участника
    if(contest.scoring?.invites?.enabled&&contest.channel_id){
      const link=await createInviteLink(contest.channel_id,contestId,currentUser.id);
      if(link)participant.invite_link=link;
    }
    const id=await fbAdd('participants',participant);
    if(id){
      participant._id=id;
      if(!state.participants[contestId])state.participants[contestId]=[];
      state.participants[contestId].push(participant);
      // Начинаем слушать обновления участников
      startParticipantsListener(contestId);
      toast('Вы участвуете!');
      render();
    }
  }catch(e){toast('Ошибка: '+e.message,'error')}
}

async function endContest(contestId){
  if(!confirm('Завершить конкурс?'))return;
  const contest=state.contests.find(c=>c._id===contestId);
  if(!contest)return;
  // Проверка прав — создатель или админ
  if(contest.creator_id!==currentUser.id&&!currentUser.is_admin){
    toast('Нет прав','error');return;
  }
  const parts=(state.participants[contestId]||[]).slice().sort((a,b)=>(b.points||0)-(a.points||0));
  const winnersCount=contest.prizes?.length||1;
  let winners=[];
  if(contest.outcome_type==='leaderboard'){
    winners=parts.slice(0,winnersCount);
  }else if(contest.outcome_type==='random'){
    const eligible=parts.filter(p=>(p.points||0)>=(contest.threshold||0));
    for(let i=0;i<winnersCount&&eligible.length>0;i++){
      const idx=Math.floor(Math.random()*eligible.length);
      winners.push(eligible.splice(idx,1)[0]);
    }
  }else{
    const totalPts=parts.reduce((s,p)=>s+(p.points||0),0);
    if(totalPts>0){
      for(let i=0;i<winnersCount&&parts.length>0;i++){
        const weights=parts.map(p=>p.points||0);
        let r=Math.random()*weights.reduce((a,b)=>a+b,0);
        let idx=0;
        for(;idx<weights.length;idx++){r-=weights[idx];if(r<=0)break}
        winners.push(parts.splice(idx,1)[0]);
      }
    }
  }
  try{
    await fbSet('contests',contestId,{status:'ended',winners:winners.map(w=>w._id)});
    await sendEndPost(contest,winners);
    toast('Конкурс завершён!');
    render();
  }catch(e){toast('Ошибка: '+e.message,'error')}
}

async function deleteContest(contestId){
  if(!confirm('Удалить конкурс? Это действие необратимо.'))return;
  const contest=state.contests.find(c=>c._id===contestId);
  if(!contest)return;
  if(contest.creator_id!==currentUser.id&&!currentUser.is_admin){toast('Нет прав','error');return}
  try{
    // Удаляем участников
    const parts=state.participants[contestId]||[];
    for(const p of parts)await fbDelete('participants',p._id);
    // Удаляем конкурс
    await fbDelete('contests',contestId);
    // Отписываемся от слушателя
    if(unsubParts[contestId]){unsubParts[contestId]();delete unsubParts[contestId]}
    delete state.participants[contestId];
    state.contests=state.contests.filter(c=>c._id!==contestId);
    // ВАЖНО: сброс состояния
    if(state.selectedContest===contestId){
      state.selectedContest=null;
      state.screen='home';
    }
    // Сброс формы
    state.formData={prizes:[''],outcome_type:'leaderboard'};
    toast('Конкурс удалён');
    render();
  }catch(e){toast('Ошибка: '+e.message,'error')}
}

async function addPointsToParticipant(pid,type,count,contest){
  const parts=state.participants[contest._id]||[];
  const p=parts.find(pp=>pp._id===pid);
  if(!p)return;
  const scoring=contest.scoring||{};
  let ptsPerUnit=0;
  if(type==='invites')ptsPerUnit=scoring.invites?.points||5;
  else if(type==='reactions')ptsPerUnit=scoring.reactions?.points||1;
  else if(type==='ads')ptsPerUnit=scoring.ads?.points||3;
  const totalPts=ptsPerUnit*count;
  const updates={points:(p.points||0)+totalPts};
  if(type==='invites')updates.invites_count=(p.invites_count||0)+count;
  if(type==='reactions')updates.reactions_count=(p.reactions_count||0)+count;
  if(type==='ads')updates.ads_count=(p.ads_count||0)+count;
  try{
    await fbSet('participants',pid,updates);
    Object.assign(p,updates);
    toast(`+${totalPts} баллов (${count} ${type})`);
    state.modal={type:'participant',participant:p,contest};
    render();
  }catch(e){toast('Ошибка: '+e.message,'error')}
}

  let html='';

  else if(state.screen==='detail')html=renderDetail();

  h+=`</div>`;

  // Статистика
  h+=`<div class="stat-row">`;
  h+=`<div class="stat-box"><div class="stat-box-val">${parts.length}</div><div class="stat-box-label">Участников</div></div>`;
  h+=`<div class="stat-box"><div class="stat-box-val">${(c.prizes||[]).filter(p=>p&&p.trim()).length||1}</div><div class="stat-box-label">Призов</div></div>`;
  h+=`<div class="stat-box"><div class="stat-box-val">${timeLeft(c.end_date)}</div><div class="stat-box-label">Осталось</div></div>`;
  h+=`</div>`;

  // Описание, условия
  if(c.description){
    h+=`<div class="section-title">Описание</div>`;
    h+=`<div class="card"><div style="font-size:14px;line-height:1.6;color:var(--text2)">${esc(c.description)}</div></div>`;
  }
  if(c.conditions){
    h+=`<div class="section-title">Условия</div>`;
    h+=`<div class="card"><div style="font-size:14px;line-height:1.6;color:var(--text2)">${esc(c.conditions)}</div></div>`;
  }

  // Призы
  const validPrizes=(c.prizes||[]).filter(p=>p&&p.trim());
  if(validPrizes.length>0){
    h+=`<div class="section-title">Призы</div><div class="card">`;
    const medals=['🥇','🥈','🥉'];
    validPrizes.forEach((p,i)=>{
      h+=`<div class="info-row"><span class="info-label">${medals[i]||((i+1)+'-е место')}</span><span class="info-value">${esc(p)}</span></div>`;
    });
    h+=`</div>`;
  }

  // Инфо
  h+=`<div class="section-title">Информация</div><div class="card">`;
  h+=`<div class="info-row"><span class="info-label">Окончание</span><span class="info-value">${formatDateMSK(c.end_date)}</span></div>`;
  const outcomes={leaderboard:'По лидерборду',random:'Случайный выбор',weighted:'Взвешенный рандом'};
  h+=`<div class="info-row"><span class="info-label">Тип</span><span class="info-value">${outcomes[c.outcome_type]||'По лидерборду'}</span></div>`;
  if(c.initial_points)h+=`<div class="info-row"><span class="info-label">Начальные баллы</span><span class="info-value">${c.initial_points}</span></div>`;
  h+=`</div>`;

  // Кнопка участия или мои баллы
  if(isActive){
    if(me){
      h+=`<div class="card" style="text-align:center;padding:20px">`;
      h+=`<div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:4px">ВАШИ БАЛЛЫ</div>`;
      h+=`<div style="font-size:36px;font-weight:900">${me.points||0}</div>`;
      h+=`<div class="lb-stats" style="justify-content:center;margin-top:8px">`;
      if(me.invites_count)h+=`<div class="lb-stat">${IC.users}<span>${me.invites_count} приглаш.</span></div>`;
      if(me.reactions_count)h+=`<div class="lb-stat">${IC.heart}<span>${me.reactions_count} реакц.</span></div>`;
      if(me.ads_count)h+=`<div class="lb-stat">${IC.play}<span>${me.ads_count} просм.</span></div>`;
      h+=`</div></div>`;

      // Invite link
      if(me.invite_link&&c.scoring?.invites?.enabled){
        h+=`<div class="invite-box">`;
        h+=`<div class="invite-box-title">${IC.link} Ваша ссылка для приглашений</div>`;
        h+=`<div class="invite-box-row">`;
        h+=`<div class="invite-box-link">${me.invite_link}</div>`;
        h+=`<button class="invite-box-copy" data-action="copyInvite" data-link="${me.invite_link}">${IC.copy}</button>`;
        h+=`</div>`;
        h+=`<div class="invite-box-hint">+${c.scoring.invites.points} баллов за каждого друга, подписавшегося по вашей ссылке</div>`;
        h+=`</div>`;
      }
    }else{
      h+=`<button class="btn btn-primary" style="margin:16px 0" data-action="joinContest" data-id="${c._id}">${IC.zap} ${esc(c.button_text||'Участвовать')}</button>`;
    }
  }

  // Кнопки управления
  if(isOwner){
    h+=`<div class="btn-row" style="margin-top:16px">`;
    if(isActive)h+=`<button class="btn btn-sm btn-danger" data-action="endContest" data-id="${c._id}">${IC.stop} Завершить</button>`;
    h+=`<button class="btn btn-sm btn-secondary" style="color:var(--danger)" data-action="deleteContest" data-id="${c._id}">${IC.trash} Удалить</button>`;
    h+=`</div>`;
  }

  // Лидерборд
  h+=`<div class="section-title">Лидерборд (${parts.length})</div>`;
  if(parts.length===0){
    h+=`<div class="card" style="text-align:center;padding:24px;color:var(--text3)">Пока нет участников</div>`;
  }else{
    parts.forEach((p,i)=>{
      const rank=i+1;
      const rClass=rank===1?'r1':rank===2?'r2':rank===3?'r3':'rn';
      const isMe=p.user_id===currentUser.id;
      const canManage=isOwner&&isActive;
      h+=`<div class="lb-item${isMe?' me':''}" ${canManage?`data-action="openParticipant" data-pid="${p._id}" data-cid="${c._id}"`:''}>`;
      h+=`<div class="lb-rank ${rClass}">${rank}</div>`;
      h+=avatarHTML(p,40);
      h+=`<div class="lb-info">`;
      h+=`<div class="lb-name">${esc(p.first_name||'Участник')}</div>`;
      if(p.username)h+=`<div class="lb-username">@${p.username}</div>`;
      h+=`<div class="lb-stats">`;
      if(p.invites_count)h+=`<div class="lb-stat">${IC.users}<span>${p.invites_count}</span></div>`;
      if(p.reactions_count)h+=`<div class="lb-stat">${IC.heart}<span>${p.reactions_count}</span></div>`;
      if(p.ads_count)h+=`<div class="lb-stat">${IC.play}<span>${p.ads_count}</span></div>`;
      h+=`</div></div>`;
      h+=`<div class="lb-points-col"><div class="lb-points">${p.points||0}</div><div class="lb-points-label">баллов</div></div>`;
      h+=`</div>`;
    });
  }

  h+='</div>';
  return h;
}

// ─── MANAGE ────────────────────────────
function renderManage(){
  let h='<div class="app fade-up"><div class="header"><h1>Управление</h1></div>';

  const tab=state.adminTab||'all';
  h+=`<div class="admin-tabs">`;
  h+=`<div class="admin-tab${tab==='all'?' active':''}" data-action="setAdminTab" data-tab="all">Все</div>`;
  h+=`<div class="admin-tab${tab==='active'?' active':''}" data-action="setAdminTab" data-tab="active">Активные</div>`;
  h+=`<div class="admin-tab${tab==='ended'?' active':''}" data-action="setAdminTab" data-tab="ended">Завершённые</div>`;
  h+=`</div>`;

  // Фильтрация: показываем только свои конкурсы (или все для админа)
  let list=state.contests;

  if(tab==='ended')list=list.filter(c=>c.status==='ended');

  if(list.length===0){
    h+=`<div class="empty"><div class="empty-icon">${IC.settings}</div>`;

      h+=`<div class="card">`;
      h+=`<div style="display:flex;gap:12px;align-items:center;margin-bottom:10px;cursor:pointer" data-action="openContest" data-id="${c._id}">`;
      h+=`<div class="ccard-icon" style="width:48px;height:48px;border-radius:12px">${IC.award}</div>`;
      h+=`<div style="flex:1"><div style="font-size:15px;font-weight:700">${esc(c.name)}</div>`;
      h+=`<div style="font-size:12px;color:var(--text2);margin-top:2px">${parts} участн. · ${c.status==='active'?timeLeft(c.end_date):'Завершён'}</div></div>`;
      h+=`<span class="badge ${c.status==='active'?'badge-live':'badge-ended'}">${c.status==='active'?'Live':'Завершён'}</span>`;
      h+=`</div>`;
      h+=`<div class="btn-row">`;
      h+=`<button class="btn btn-sm btn-secondary" data-action="openContest" data-id="${c._id}">${IC.ext} Открыть</button>`;
      if(c.status==='active')h+=`<button class="btn btn-sm btn-danger" data-action="endContest" data-id="${c._id}">${IC.stop} Завершить</button>`;
      h+=`<button class="btn btn-sm btn-secondary" style="color:var(--danger)" data-action="deleteContest" data-id="${c._id}">${IC.trash} Удалить</button>`;
      h+=`</div></div>`;
    });
  }

  h+='</div>';
  return h;
}

// ─── PROFILE ───────────────────────────
function renderProfile(){
  let h='<div class="app fade-up"><div class="header"><h1>Профиль</h1></div>';

  // User card
  h+=`<div class="card" style="text-align:center;padding:28px 20px">`;
  h+=avatarHTML(currentUser,72);
  h+=`<div style="font-size:22px;font-weight:900;letter-spacing:-0.3px;margin-top:14px">${esc(currentUser.first_name)}</div>`;
  if(currentUser.username)h+=`<div style="font-size:14px;color:var(--text2);margin-top:4px;font-weight:500">@${currentUser.username}</div>`;
  if(currentUser.is_admin)h+=`<span class="header-badge" style="margin-top:12px;display:inline-block">Администратор</span>`;
  h+=`</div>`;

  // Stats
  const myParts=[];
  for(const c of state.contests){
    const parts=state.participants[c._id]||[];
    const me=parts.find(p=>p.user_id===currentUser.id);
    if(me)myParts.push({contest:c,me});
  }
  const total=myParts.reduce((s,x)=>s+(x.me.points||0),0);
  const totalInvites=myParts.reduce((s,x)=>s+(x.me.invites_count||0),0);
  const totalReactions=myParts.reduce((s,x)=>s+(x.me.reactions_count||0),0);

  h+=`<div class="stat-row">`;
  h+=`<div class="stat-box"><div class="stat-box-val">${myParts.length}</div><div class="stat-box-label">Конкурсов</div></div>`;
  h+=`<div class="stat-box"><div class="stat-box-val">${total}</div><div class="stat-box-label">Баллов</div></div>`;
  h+=`<div class="stat-box"><div class="stat-box-val">${totalInvites}</div><div class="stat-box-label">Приглашений</div></div>`;
  h+=`</div>`;

  // Детальная статистика
  h+=`<div class="section-title">Статистика</div><div class="card">`;
  h+=`<div class="info-row"><span class="info-label">Telegram ID</span><span class="info-value">${currentUser.id}</span></div>`;
  h+=`<div class="info-row"><span class="info-label">Реакций всего</span><span class="info-value">${totalReactions}</span></div>`;
  h+=`<div class="info-row"><span class="info-label">Приглашений всего</span><span class="info-value">${totalInvites}</span></div>`;
  h+=`</div>`;

  // Мои конкурсы
  if(myParts.length>0){
    h+=`<div class="section-title">Мои конкурсы</div>`;
    myParts.forEach(({contest:c,me})=>{
      h+=`<div class="card card-clickable" data-action="openContest" data-id="${c._id}">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center">`;
      h+=`<div style="font-size:14px;font-weight:700">${esc(c.name)}</div>`;
      h+=`<div style="font-size:16px;font-weight:800">${me.points||0} б.</div>`;
      h+=`</div></div>`;
    });
  }

  h+='</div>';
  return h;
}

// ═══════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════
function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',async(e)=>{
      e.stopPropagation();
      const action=el.dataset.action;

      // Navigation
      if(action==='nav'){
        const screen=el.dataset.screen;
        if(screen==='create'){
          state.formData={prizes:[''],outcome_type:'leaderboard'};
        }
        state.screen=screen;
        state.selectedContest=null;
        render();
        window.scrollTo(0,0);
        return;
      }
      if(action==='goHome'){
        state.screen='home';state.selectedContest=null;render();window.scrollTo(0,0);return;
      }
      if(action==='openContest'){
        state.selectedContest=el.dataset.id;
        state.screen='detail';
        await loadParticipants(el.dataset.id);
        startParticipantsListener(el.dataset.id);
        render();window.scrollTo(0,0);
        return;
      }

      // Channel management
      if(action==='addBotToChannel'){
        window.open(`https://t.me/${BOT_USERNAME}?startchannel&admin=post_messages+edit_messages+delete_messages+invite_users`,'_blank');
        return;
      }
      if(action==='scanChannels'){
        toast('Ищем каналы...');
        await scanForChannels();
        await loadChannels();
        if(state.channels.length>0)toast(`Найдено каналов: ${state.channels.length}`);
        else toast('Каналы не найдены. Добавьте бота в канал и нажмите ещё раз','error');
        render();return;
      }
      if(action==='checkChannelManual'){
        const input=document.getElementById('f-manual-ch');
        if(!input||!input.value.trim()){toast('Введите @username','error');return}
        toast('Проверяем...');
        const result=await checkChannelManual(input.value.trim());
        if(result?.error){toast(result.error,'error')}
        else if(result?.success){
          toast('Канал добавлен!');
          state.formData.channel_id=result.channel.chat_id;
          state.formData.channel_title=result.channel.title;
          state.formData.channel_username=result.channel.username;
        }
        render();return;
      }
      if(action==='selectChannel'){
        collectFormData();
        state.formData.channel_id=parseInt(el.dataset.chatid);
        state.formData.channel_title=el.dataset.title;
        state.formData.channel_username=el.dataset.username;
        render();return;
      }

      // Prizes
      if(action==='addPrize'){collectFormData();state.formData.prizes=(state.formData.prizes||['']).concat(['']);render();return}
      if(action==='removePrize'){collectFormData();state.formData.prizes.splice(parseInt(el.dataset.idx),1);render();return}

      // Create contest
      if(action==='submitContest'){
        collectFormData();
        const ok=await createContest(state.formData);
        if(ok){
          state.screen='home';
          state.formData={prizes:[''],outcome_type:'leaderboard'};
          render();
        }
        return;
      }

      // Join
      if(action==='joinContest'){await joinContest(el.dataset.id);return}

      // End / Delete
      if(action==='endContest'){await endContest(el.dataset.id);return}
      if(action==='deleteContest'){await deleteContest(el.dataset.id);return}

      // Copy
      if(action==='copyInvite'){
        try{await navigator.clipboard.writeText(el.dataset.link);toast('Ссылка скопирована!')}
        catch(err){const ta=document.createElement('textarea');ta.value=el.dataset.link;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Ссылка скопирована!')}
        return;
      }

      // Participant modal
      if(action==='openParticipant'){
        const parts=state.participants[el.dataset.cid]||[];
        const part=parts.find(p=>p._id===el.dataset.pid);
        const contest=state.contests.find(c=>c._id===el.dataset.cid);
        state.modal={type:'participant',participant:part,contest};
        render();return;
      }
      if(action==='closeModal'){state.modal=null;render();return}

      // Add points (typed)
      if(action==='addPoints'){
        const type=el.dataset.type;
        const inputId=type==='invites'?'modal-inv':type==='reactions'?'modal-react':'modal-ads';
        const count=parseInt(document.getElementById(inputId)?.value)||1;
        const contest=state.contests.find(c=>c._id===el.dataset.cid);
        await addPointsToParticipant(el.dataset.pid,type,count,contest);
        return;
      }

      // Manual points
      if(action==='addManualPoints'){
        const count=parseInt(document.getElementById('modal-manual')?.value)||1;
        const cid=el.dataset.cid;
        const parts=state.participants[cid]||[];
        const part=parts.find(p=>p._id===el.dataset.pid);
        if(part){
          await fbSet('participants',el.dataset.pid,{points:(part.points||0)+count});
          part.points=(part.points||0)+count;
          toast(`+${count} баллов вручную`);
          const contest=state.contests.find(c=>c._id===cid);
          state.modal={type:'participant',participant:part,contest};
          render();
        }
        return;
      }

      // Admin tabs
      if(action==='setAdminTab'){state.adminTab=el.dataset.tab;render();return}
    });
  });

  // Toggle handlers
  [{id:'f-inv-on',sub:'inv-sub'},{id:'f-react-on',sub:'react-sub'},{id:'f-ads-on',sub:'ads-sub'}].forEach(t=>{
    const el=document.getElementById(t.id);
    if(el){el.addEventListener('change',()=>{
      const sub=document.getElementById(t.sub);
      if(sub)sub.classList.toggle('show',el.checked);
    })}
  });

  // Outcome type change
  const outcomeEl=document.getElementById('f-outcome');
  if(outcomeEl){outcomeEl.addEventListener('change',()=>{collectFormData();render()})}
}

// ═══════════════════════════════════════
// COLLECT FORM DATA
// ═══════════════════════════════════════
function collectFormData(){
  const fd=state.formData;
  const g=id=>document.getElementById(id);
  if(g('f-name'))fd.name=g('f-name').value;
  if(g('f-desc'))fd.description=g('f-desc').value;
  if(g('f-cond'))fd.conditions=g('f-cond').value;
  if(g('f-date'))fd.end_date=g('f-date').value;
  if(g('f-btn'))fd.button_text=g('f-btn').value;
  if(g('f-init'))fd.initial_points=g('f-init').value;
  if(g('f-outcome'))fd.outcome_type=g('f-outcome').value;
  if(g('f-thresh'))fd.threshold=g('f-thresh').value;
  if(g('f-inv-on'))fd.invites_enabled=g('f-inv-on').checked;
  if(g('f-inv-pts'))fd.invites_points=g('f-inv-pts').value;
  if(g('f-react-on'))fd.reactions_enabled=g('f-react-on').checked;
  if(g('f-react-pts'))fd.reactions_points=g('f-react-pts').value;
  if(g('f-ads-on'))fd.ads_enabled=g('f-ads-on').checked;
  if(g('f-ads-pts'))fd.ads_points=g('f-ads-pts').value;
  // Prizes
  const prizeInputs=document.querySelectorAll('.prize-input');
  if(prizeInputs.length>0)fd.prizes=Array.from(prizeInputs).map(el=>el.value);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init(){
  initTg();
  await initFirebase();

  if(fbReady){
    // Real-time listener для конкурсов
    startContestsListener();
    // Загружаем каналы
    await loadChannels();
    await scanForChannels();
    // Загружаем участников для всех конкурсов
    await loadContests();
    for(const c of state.contests){
      await loadParticipants(c._id);
      startParticipantsListener(c._id);
    }
    // Загружаем фото текущего пользователя
    getUserPhoto(currentUser.id).then(()=>render());
  }

  state.loading=false;

  // Deep link
  const params=new URLSearchParams(window.location.search);
  const contestId=params.get('contest');
  if(contestId){
    state.selectedContest=contestId;
    state.screen='detail';
    if(fbReady){
      await loadParticipants(contestId);
      startParticipantsListener(contestId);
    }
  }

  render();
}

init();
</script>
