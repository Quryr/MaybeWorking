<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Конкурсы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================
   GLOBAL RESET & VARIABLES
   ============================================ */
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg: #FFFFFF;
  --card: #FFFFFF;
  --card-border: #E5E5EA;
  --text: #000000;
  --text2: #6E6E73;
  --text3: #AEAEB2;
  --accent: #000000;
  --accent-text: #FFFFFF;
  --danger: #FF3B30;
  --danger-bg: #FFF1F0;
  --success: #34C759;
  --success-bg: #E8F9EE;
  --warn: #FF9500;
  --warn-bg: #FFF8EC;
  --section-bg: #F2F2F7;
  --hover: #F5F5F7;
  --radius: 16px;
  --radius-sm: 12px;
  --radius-xs: 8px;
}
html, body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: geometricPrecision;
  overflow-x: hidden;
  min-height: 100vh;
}
body {
  padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px));
}
input, textarea, select, button {
  font-family: inherit;
  font-size: inherit;
  -webkit-appearance: none;
  appearance: none;
}
a { color: inherit; text-decoration: none; }

/* ============================================
   APP CONTAINER
   ============================================ */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 16px 0;
}

/* ============================================
   HEADER
   ============================================ */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0 24px;
  position: relative;
}
.header h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.8px;
  flex: 1;
  line-height: 1.1;
}
.header-sub {
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  margin-top: 4px;
}
.header-badge {
  font-size: 11px;
  font-weight: 700;
  background: #000;
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ============================================
   BACK BUTTON
   ============================================ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px 10px 14px;
  background: var(--section-bg);
  border: 1px solid var(--card-border);
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .2s ease;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 20px;
}
.back-btn:active {
  transform: scale(.95);
  background: var(--card-border);
}
.back-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* ============================================
   CARDS
   ============================================ */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  transition: all .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.card:active {
  transform: scale(.985);
}
.card-clickable {
  cursor: pointer;
}

/* Contest card — full redesign */
.ccard {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  cursor: pointer;
  transition: all .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.ccard:active {
  transform: scale(.985);
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}

/* Contest icon — bold, visible, stylish */
.ccard-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.ccard-icon::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 100%);
  border-radius: 16px 16px 0 0;
}
.ccard-icon svg {
  width: 30px;
  height: 30px;
  stroke: #fff;
  stroke-width: 1.8;
  fill: none;
  position: relative;
  z-index: 1;
}
.ccard-body {
  flex: 1;
  min-width: 0;
}
.ccard-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.ccard-title {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  line-height: 1.25;
}
.ccard-channel {
  font-size: 13px;
  color: var(--text2);
  font-weight: 600;
  margin-bottom: 8px;
}
.ccard-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.ccard-meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}
.ccard-meta-item svg {
  width: 14px;
  height: 14px;
  stroke: var(--text3);
  stroke-width: 2;
  fill: none;
}

/* ============================================
   BADGES
   ============================================ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-live {
  background: var(--success-bg);
  color: #1B9E4B;
}
.badge-live::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}
.badge-ended {
  background: var(--section-bg);
  color: var(--text3);
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .3; }
}

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 15px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all .15s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: -0.2px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: var(--accent-text); }
.btn-primary:active { background: #333; }
.btn-secondary {
  background: var(--section-bg);
  color: var(--text);
  border: 1px solid var(--card-border);
}
.btn-danger { background: var(--danger); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-warn { background: var(--warn); color: #fff; }
.btn-sm {
  padding: 10px 16px;
  font-size: 13px;
  width: auto;
  border-radius: var(--radius-xs);
}
.btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
}
.btn:disabled { opacity: .4; pointer-events: none; }
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.btn-row .btn { flex: 1; }

/* ============================================
   FORMS
   ============================================ */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}
.form-hint {
  font-size: 12px;
  color: var(--text3);
  margin-top: 6px;
  line-height: 1.4;
}
.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 500;
  background: var(--card);
  color: var(--text);
  transition: border-color .2s ease;
  outline: none;
}
.form-input:focus {
  border-color: var(--accent);
}
.form-input::placeholder {
  color: var(--text3);
}
textarea.form-input {
  resize: vertical;
  min-height: 88px;
  line-height: 1.5;
}
select.form-input {
  cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23AEAEB2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 16px center;
  padding-right: 40px;
}

/* ============================================
   TOGGLE ROWS
   ============================================ */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  background: var(--section-bg);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  gap: 12px;
}
.toggle-row-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
}
.toggle-row-title {
  font-size: 15px;
  font-weight: 700;
}
.toggle-row-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.4;
}
.toggle {
  position: relative;
  width: 52px;
  height: 32px;
  flex-shrink: 0;
}
.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--card-border);
  border-radius: 16px;
  cursor: pointer;
  transition: all .3s ease;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 26px;
  height: 26px;
  background: #fff;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform .3s ease;
  box-shadow: 0 1px 4px rgba(0,0,0,.15);
}
.toggle input:checked + .toggle-slider {
  background: var(--accent);
}
.toggle input:checked + .toggle-slider::before {
  transform: translateX(20px);
}
.toggle-sub {
  padding: 12px 16px 16px;
  display: none;
}
.toggle-sub.show { display: block; }

/* ============================================
   SECTION TITLE
   ============================================ */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin: 28px 0 12px;
  padding: 0 4px;
}

/* ============================================
   TAB BAR — FIXED BOTTOM
   ============================================ */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,.94);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--card-border);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 0 0 env(safe-area-inset-bottom, 0px);
  z-index: 1000;
}
.tab-bar.tabs-4 {
  grid-template-columns: repeat(4, 1fr);
}
.tab-bar.tabs-4 .tab-create {
  display: none;
}
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 0 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color .2s ease;
  position: relative;
  gap: 4px;
}
.tab svg {
  width: 24px;
  height: 24px;
  stroke: var(--text3);
  stroke-width: 1.8;
  fill: none;
  transition: stroke .2s ease;
}
.tab span {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  transition: color .2s ease;
  letter-spacing: 0.3px;
}
.tab.active svg { stroke: var(--text); }
.tab.active span { color: var(--text); }
.tab.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 36px;
  height: 3px;
  background: var(--accent);
  border-radius: 0 0 3px 3px;
}
.tab-create { position: relative; }
.tab-create .tab-create-circle {
  width: 48px;
  height: 48px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -22px;
  border: 3px solid #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
  transition: transform .2s ease;
}
.tab-create:active .tab-create-circle {
  transform: scale(.9);
}
.tab-create .tab-create-circle svg {
  width: 24px;
  height: 24px;
  stroke: #fff !important;
  stroke-width: 2.5;
}
.tab-create span { margin-top: 4px; }

/* ============================================
   LEADERBOARD
   ============================================ */
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .15s ease;
  -webkit-tap-highlight-color: transparent;
  background: var(--card);
  border: 1px solid var(--card-border);
}
.lb-item:active { transform: scale(.98); }
.lb-item.me {
  border-color: var(--accent);
  background: #FAFAFA;
  box-shadow: 0 0 0 1px var(--accent);
}
.lb-rank {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  border-radius: 50%;
  flex-shrink: 0;
}
.lb-rank.r1 { background: #FFF3D6; color: #C58800; }
.lb-rank.r2 { background: #F0F0F0; color: #666; }
.lb-rank.r3 { background: #FFE8D6; color: #B5651D; }
.lb-rank.rn { background: var(--section-bg); color: var(--text2); }
.lb-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.lb-info { flex: 1; min-width: 0; }
.lb-name {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lb-username {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  margin-top: 1px;
}
.lb-stats {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.lb-stat {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
}
.lb-stat svg {
  width: 13px;
  height: 13px;
  stroke: var(--text3);
  stroke-width: 2;
  fill: none;
}
.lb-points-col {
  text-align: right;
  flex-shrink: 0;
}
.lb-points {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.lb-points-label {
  font-size: 10px;
  color: var(--text3);
  font-weight: 600;
}

/* ============================================
   INVITE LINK BOX
   ============================================ */
.invite-box {
  background: var(--section-bg);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 16px 0;
}
.invite-box-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.invite-box-title svg {
  width: 18px;
  height: 18px;
  stroke: var(--text);
  stroke-width: 2;
  fill: none;
}
.invite-box-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.invite-box-link {
  flex: 1;
  padding: 12px 14px;
  background: #fff;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xs);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'SF Mono', 'Menlo', monospace;
}
.invite-box-copy {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border-radius: var(--radius-xs);
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
  border: none;
}
.invite-box-copy:active { transform: scale(.88); }
.invite-box-copy svg {
  width: 18px;
  height: 18px;
  stroke: #fff;
  stroke-width: 2;
  fill: none;
}
.invite-box-hint {
  font-size: 12px;
  color: var(--text2);
  margin-top: 10px;
  font-weight: 500;
  line-height: 1.4;
}

/* ============================================
   MODAL
   ============================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 2000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn .2s ease;
}
.modal {
  background: #fff;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
  animation: slideUp .3s ease;
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--card-border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
  text-align: center;
  letter-spacing: -0.3px;
}
.modal-subtitle {
  font-size: 14px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 20px;
}
.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.modal-actions .btn { flex: 1; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* ============================================
   PRIZE ROW
   ============================================ */
.prize-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.prize-medal {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  flex-shrink: 0;
}
.prize-medal.m1 { background: #FFF3D6; color: #C58800; }
.prize-medal.m2 { background: #F0F0F0; color: #666; }
.prize-medal.m3 { background: #FFE8D6; color: #B5651D; }
.prize-medal.mn { background: var(--section-bg); color: var(--text2); }
.prize-input { flex: 1; }
.prize-remove {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--danger-bg);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
}
.prize-remove:active { transform: scale(.85); }
.prize-remove svg {
  width: 16px;
  height: 16px;
  stroke: var(--danger);
  stroke-width: 2;
  fill: none;
}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty {
  text-align: center;
  padding: 60px 24px;
}
.empty-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--section-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}
.empty-icon svg {
  width: 36px;
  height: 36px;
  stroke: var(--text3);
  stroke-width: 1.5;
  fill: none;
}
.empty-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 8px;
}
.empty-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  max-width: 280px;
  margin: 0 auto;
}

/* ============================================
   TOAST
   ============================================ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  z-index: 3000;
  animation: toastIn .3s ease;
  max-width: 90%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
}
.toast-success {
  background: var(--success-bg);
  color: #1B9E4B;
  border: 1px solid #B8EDCB;
}
.toast-error {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid #FFBABA;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ============================================
   CHANNEL CARDS
   ============================================ */
.ch-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--section-bg);
  border: 2px solid transparent;

async function fbGetAll(col) {
  if (!fbReady) return [];
  const { collection, getDocs } = window._fb;
  const snap = await getDocs(collection(db, col));
  return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}

async function fbGet(col, id) {
  if (!fbReady) return null;
  const { doc, getDoc } = window._fb;
  const snap = await getDoc(doc(db, col, id));
  return snap.exists() ? { _id: snap.id, ...snap.data() } : null;
}

async function fbSet(col, id, data) {
  if (!fbReady) return;
  const { doc, setDoc } = window._fb;
  await setDoc(doc(db, col, id), data, { merge: true });
}

async function fbAdd(col, data) {
  if (!fbReady) return null;
  const { collection, addDoc } = window._fb;
  const ref = await addDoc(collection(db, col), data);
  return ref.id;
}

async function fbDel(col, id) {
  if (!fbReady) return;
  const { doc, deleteDoc } = window._fb;
  await deleteDoc(doc(db, col, id));
}

async function fbQuery(col, field, op, val) {
  if (!fbReady) return [];
  const { collection, getDocs, query, where } = window._fb;
  const snap = await getDocs(query(collection(db, col), where(field, op, val)));

}

const $ = s => document.querySelector(s);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);

const AVATAR_COLORS = [
  '#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7',
  '#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9',
  '#F0B27A','#82E0AA'
];

function getAvatarColor(name) {
  let hash = 0;
  for (let i = 0; i < (name || '').length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function getInitials(name) {
  if (!name) return '?';
  const parts = name.split(' ');
  return parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
}

function timeLeft(dateStr) {
  if (!dateStr) return '—';
  const diff = new Date(dateStr) - new Date();
  if (diff <= 0) return 'Завершён';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (d > 0) return `${d}д ${h}ч`;
  if (h > 0) return `${h}ч ${m}м`;
  return `${m}м`;
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleString('ru-RU', {
    day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Moscow'
  }) + ' МСК';
}

  const parts = await fbQuery('participants', 'contest_id', '==', contestId);
  state.participants[contestId] = parts.sort((a, b) => (b.points || 0) - (a.points || 0));
}

async function loadChannels() {
  if (!currentUser.id) return;
  state.channels = await fbQuery('channels', 'admin_id', '==', currentUser.id);
}

// ─── SCAN FOR CHANNELS WHERE BOT IS ADMIN ──
async function scanForChannels() {
  const result = await botApi('getUpdates', { offset: -100, limit: 100 });
  if (!result.ok || !result.result) return;

  const channelMap = {};
  for (const upd of result.result) {
    const msg = upd.my_chat_member;
    if (!msg) continue;
    const chat = msg.chat;
    if (chat.type !== 'channel') continue;
    const newMember = msg.new_chat_member;
    if (newMember?.user?.id !== parseInt(BOT_TOKEN.split(':')[0])) continue;
    if (newMember.status === 'administrator' || newMember.status === 'member') {
      channelMap[chat.id] = {
        chat_id: chat.id,
        title: chat.title || 'Канал',
        username: chat.username || '',
        admin_id: msg.from?.id || currentUser.id
      };
    }
  }

  for (const [chatId, chData] of Object.entries(channelMap)) {
    // Проверяем: текущий пользователь — админ этого канала?
    const admins = await botApi('getChatAdministrators', { chat_id: parseInt(chatId) });
    if (!admins.ok) continue;
    const isUserAdmin = admins.result?.some(a => a.user.id === currentUser.id);
    if (!isUserAdmin && !currentUser.is_admin) continue;

    // Сохраняем канал в Firebase с привязкой к текущему пользователю
    const channelDoc = {
      ...chData,
      admin_id: currentUser.id,
      added_at: new Date().toISOString()
    };
    await fbSet('channels', String(chatId), channelDoc);
  }

  await loadChannels();
}

async function createContest(data) {
  if (!data.channel_id) {
    toast('Выберите канал', 'error');
    return false;
  }
  if (!data.name?.trim()) {
    toast('Введите название', 'error');
    return false;
  }
  if (!data.end_date) {
    toast('Укажите дату окончания', 'error');
    return false;
  }

  // Проверяем права бота
  const admins = await botApi('getChatAdministrators', { chat_id: data.channel_id });
  if (!admins.ok) {
    toast('Бот не является администратором канала', 'error');
    return false;
  }
  const botId = parseInt(BOT_TOKEN.split(':')[0]);
  const botAdmin = admins.result?.find(a => a.user.id === botId);
  if (!botAdmin) {
    toast('Добавьте бота администратором канала', 'error');
    return false;
  }

  // Формируем scoring config
  const scoring = {};
  if (data.invites_enabled) {
    scoring.invites = { enabled: true, points: parseInt(data.invites_points) || 1 };
  }
  if (data.reactions_enabled) {
    scoring.reactions = { enabled: true, points: parseInt(data.reactions_points) || 1 };
  }
  if (data.ads_enabled) {
    scoring.ads = { enabled: true, points: parseInt(data.ads_points) || 1 };
  }

  const contest = {
    name: data.name.trim(),
    description: data.description?.trim() || '',
    conditions: data.conditions?.trim() || '',
    channel_id: data.channel_id,
    channel_title: data.channel_title || '',
    channel_username: data.channel_username || '',
    end_date: data.end_date,
    button_text: data.button_text?.trim() || 'Участвовать',
    initial_points: parseInt(data.initial_points) || 0,
    outcome_type: data.outcome_type || 'leaderboard',
    threshold: parseInt(data.threshold) || 0,
    prizes: (data.prizes || []).filter(p => p.trim()),
    scoring: scoring,
    status: 'active',
    creator_id: currentUser.id,
    creator_name: currentUser.first_name,
    created_at: new Date().toISOString()
  };

  const contestId = await fbAdd('contests', contest);
  if (!contestId) {
    toast('Ошибка создания', 'error');
    return false;
  }

  // Отправляем пост в канал
  await sendContestPost(contest, contestId);
  toast('Конкурс создан!');
  return true;
}

// ─── SEND BEAUTIFUL POST TO CHANNEL ────────
async function sendContestPost(c, contestId) {
  // Формируем красивый текст
  let text = '';
  text += `<b>━━━━━━━━━━━━━━━━━━━</b>\n`;
  text += `<b>🏆 ${c.name}</b>\n`;
  text += `<b>━━━━━━━━━━━━━━━━━━━</b>\n\n`;

  if (c.description) {
    text += `${c.description}\n\n`;
  }

  if (c.conditions) {
    text += `<b>📋 Условия участия:</b>\n${c.conditions}\n\n`;
  }

  // Призы по местам
  if (c.prizes?.length) {
    text += `<b>🎁 Призы:</b>\n`;
    c.prizes.forEach((p, i) => {
      const medals = ['🥇', '🥈', '🥉'];
      const medal = i < 3 ? medals[i] : `  ${i + 1}.`;
      text += `${medal} <b>${i + 1}-е место</b> — ${p}\n`;
    });
    text += `\n<b>👥 Призовых мест:</b> ${c.prizes.length}\n\n`;
  }

  // Способы заработка
  const ways = [];
  if (c.scoring?.invites?.enabled) ways.push(`👫 Приглашение друзей (+${c.scoring.invites.points} за друга)`);
  if (c.scoring?.reactions?.enabled) ways.push(`❤️ Реакции на постах (+${c.scoring.reactions.points} за реакцию)`);
  if (c.scoring?.ads?.enabled) ways.push(`📺 Просмотр рекламы (+${c.scoring.ads.points} за просмотр)`);

  if (ways.length) {
    text += `<b>⚡ Как заработать баллы:</b>\n`;
    ways.forEach(w => { text += `  • ${w}\n`; });
    text += `\n`;
  }

  if (c.initial_points > 0) {
    text += `<b>🎯 Стартовые баллы:</b> ${c.initial_points}\n\n`;
  }

  // Тип определения победителя
  const outcomes = {
    leaderboard: '📊 По лидерборду (кто набрал больше баллов)',
    random: '🎲 Случайный выбор среди участников',
    weighted: '⚖️ Взвешенный случай (больше баллов = больше шанс)'
  };
  text += `<b>🏅 Определение победителя:</b>\n${outcomes[c.outcome_type] || ''}\n\n`;

  text += `<b>⏰ Окончание:</b> ${formatDate(c.end_date)}\n\n`;
  text += `<b>━━━━━━━━━━━━━━━━━━━</b>\n`;
  text += `Нажмите кнопку ниже, чтобы участвовать!`;

  // Inline-кнопка "Участвовать" — web_app
  const keyboard = {
    inline_keyboard: [[{
      text: `🏆 ${c.button_text || 'Участвовать'}`,
      web_app: { url: `${MINI_APP_URL}?contest=${contestId}` }
    }]]
  };

  const result = await botApi('sendMessage', {
    chat_id: c.channel_id,
    text: text,
    parse_mode: 'HTML',
    reply_markup: keyboard
  });

  if (!result.ok) {
    console.error('Post send error:', result);
    toast('Пост не отправлен. Проверьте права бота', 'error');
  }
}

// ─── JOIN CONTEST ──────────────────────────
async function joinContest(contestId) {
  const contest = state.contests.find(c => c._id === contestId);
  if (!contest) return;

  // Проверяем не участвует ли уже
  const existing = (state.participants[contestId] || []).find(p => p.user_id === currentUser.id);
  if (existing) {
    toast('Вы уже участвуете!', 'error');
    return;
  }

  // Создаём персональную ссылку-приглашение в канал
  let inviteLink = '';
  if (contest.scoring?.invites?.enabled && contest.channel_id) {
    const invResult = await botApi('createChatInviteLink', {
      chat_id: contest.channel_id,
      name: `contest_${contestId}_user_${currentUser.id}`,
      creates_join_request: false
    });
    if (invResult.ok) {
      inviteLink = invResult.result.invite_link;
    }
  }

  const participant = {
    contest_id: contestId,
    user_id: currentUser.id,
    username: currentUser.username,
    first_name: currentUser.first_name,
    points: contest.initial_points || 0,
    invites_count: 0,
    reactions_count: 0,
    ads_count: 0,
    invite_link: inviteLink,
    joined_at: new Date().toISOString()
  };

  await fbAdd('participants', participant);
  await loadParticipants(contestId);
  toast('Вы участвуете!');
  render();
}

// ─── END CONTEST ───────────────────────────
async function endContest(contestId) {
  if (!confirm('Завершить конкурс? Это действие нельзя отменить.')) return;

  const contest = state.contests.find(c => c._id === contestId);
  if (!contest) return;

  await fbSet('contests', contestId, { status: 'ended' });

  // Отправляем результаты в канал
  const parts = state.participants[contestId] || [];
  if (parts.length > 0 && contest.channel_id) {
    await sendResultsPost(contest, parts, contestId);
  }

  await loadContests();
  toast('Конкурс завершён!');
  render();
}

// ─── SEND RESULTS POST ────────────────────
async function sendResultsPost(c, parts, contestId) {
  const sorted = [...parts].sort((a, b) => (b.points || 0) - (a.points || 0));
  const winners = sorted.slice(0, c.prizes?.length || 1);
  const medals = ['🥇', '🥈', '🥉'];

  let text = '';
  text += `<b>━━━━━━━━━━━━━━━━━━━</b>\n`;
  text += `<b>🏁 Итоги: ${c.name}</b>\n`;
  text += `<b>━━━━━━━━━━━━━━━━━━━</b>\n\n`;

  text += `<b>🏆 Победители:</b>\n\n`;
  winners.forEach((w, i) => {
    const medal = i < 3 ? medals[i] : `  ${i + 1}.`;
    const name = w.username ? `@${w.username}` : w.first_name;
    const prize = c.prizes?.[i] ? ` — ${c.prizes[i]}` : '';
    text += `${medal} <b>${name}</b> (${w.points} баллов)${prize}\n`;
  });

  text += `\n<b>👥 Всего участников:</b> ${sorted.length}\n`;
  text += `\n<b>━━━━━━━━━━━━━━━━━━━</b>\n`;
  text += `Спасибо всем за участие!`;

  const keyboard = {
    inline_keyboard: [[{
      text: '📊 Посмотреть итоги',
      web_app: { url: `${MINI_APP_URL}?contest=${contestId}` }
    }]]
  };

  await botApi('sendMessage', {
    chat_id: c.channel_id,
    text: text,
    parse_mode: 'HTML',
    reply_markup: keyboard
  });
}

// ─── DELETE CONTEST ────────────────────────
async function deleteContest(contestId) {
  if (!confirm('Удалить конкурс навсегда? Все данные участников будут потеряны.')) return;

  // Удаляем участников
  const parts = state.participants[contestId] || [];
  for (const p of parts) {
    await fbDel('participants', p._id);
  }
  delete state.participants[contestId];

  // Удаляем конкурс
  await fbDel('contests', contestId);
  state.contests = state.contests.filter(c => c._id !== contestId);

  if (state.selectedContest === contestId) {
    state.selectedContest = null;
    state.screen = 'home';
  }

  toast('Конкурс удалён');
  render();
}

// ─── ADD POINTS TO PARTICIPANT ─────────────
async function addPointsToParticipant(partId, type, count, contest) {
  const part = Object.values(state.participants).flat().find(p => p._id === partId);
  if (!part || !contest) return;

  const scoring = contest.scoring?.[type];
  if (!scoring) return;

  const pointsToAdd = count * (scoring.points || 1);
  const countKey = type === 'invites' ? 'invites_count' : type === 'reactions' ? 'reactions_count' : 'ads_count';

  await fbSet('participants', partId, {
    points: (part.points || 0) + pointsToAdd,
    [countKey]: (part[countKey] || 0) + count
  });

  toast(`+${pointsToAdd} баллов (${count} ${type === 'invites' ? 'приглашений' : type === 'reactions' ? 'реакций' : 'просмотров'})`);
  await loadParticipants(contest._id);

  // Обновляем модалку
  const updatedPart = (state.participants[contest._id] || []).find(p => p._id === partId);
  if (updatedPart) {
    state.modal = { type: 'participant', participant: updatedPart, contest };
  }
  render();
}

// ─── RENDER ENGINE ─────────────────────────
function render() {
  let html = '';

  switch (state.screen) {
    case 'home': html = renderHome(); break;
    case 'points': html = renderPoints(); break;
    case 'create': html = renderCreate(); break;
    case 'detail': html = renderDetail(); break;
    case 'manage': html = renderManage(); break;
    case 'profile': html = renderProfile(); break;
    default: html = renderHome();
  }

  html += renderModal();
  html += renderTabBar();

  document.getElementById('app').innerHTML = html;
  bindEvents();
}

// ─── CONTEST DETAIL SCREEN ─────────────────
function renderDetail() {
  const c = state.contests.find(x => x._id === state.selectedContest);
  if (!c) return renderHome();

  const parts = state.participants[c._id] || [];
  const myPart = parts.find(p => p.user_id === currentUser.id);
  const isActive = c.status === 'active';
  const canManage = c.creator_id === currentUser.id || currentUser.is_admin;

  let h = `<div class="app fade-up">`;
  h += `<button class="back-btn" data-action="goHome">${IC.chevL} Назад</button>`;

  // Hero
  h += `<div class="detail-hero">`;
  h += `<div class="detail-hero-icon">${IC.award}</div>`;
  h += `<div class="detail-hero-title">${esc(c.name)}</div>`;
  h += `<div class="detail-hero-channel">${esc(c.channel_title || c.channel_username || '')}</div>`;
  if (isActive) {
    h += `<div class="detail-hero-timer">${timeLeft(c.end_date)}</div>`;
    h += `<div class="detail-hero-timer-label">До окончания</div>`;
  } else {
    h += `<div style="margin-top:16px"><span class="badge badge-ended" style="font-size:14px;padding:6px 16px">Завершён</span></div>`;
  }
  h += `</div>`;

  // Stats
  h += `<div class="stat-row">`;
  h += `<div class="stat-box"><div class="stat-box-val">${parts.length}</div><div class="stat-box-label">Участников</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${c.prizes?.length || 0}</div><div class="stat-box-label">Мест</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${myPart ? myPart.points : '—'}</div><div class="stat-box-label">Мои баллы</div></div>`;
  h += `</div>`;

  // Join button
  if (isActive && !myPart) {
    h += `<button class="btn btn-primary" style="margin-bottom:16px" data-action="joinContest" data-id="${c._id}">${IC.zap} ${esc(c.button_text || 'Участвовать')}</button>`;
  }

  // Invite link (if participant and invites enabled)
  if (myPart && c.scoring?.invites?.enabled && myPart.invite_link) {
    h += `<div class="invite-box">`;
    h += `<div class="invite-box-title">${IC.link} Ваша пригласительная ссылка</div>`;
    h += `<div class="invite-box-row">`;
    h += `<div class="invite-box-link" id="inv-link">${myPart.invite_link}</div>`;
    h += `<button class="invite-box-copy" data-action="copyInvite" data-link="${myPart.invite_link}">${IC.copy}</button>`;
    h += `</div>`;
    h += `<div class="invite-box-hint">+${c.scoring.invites.points} баллов за каждого друга, вступившего по вашей ссылке</div>`;
    h += `</div>`;
  }

  // Scoring badges
  const scoringTypes = [];
  if (c.scoring?.invites?.enabled) scoringTypes.push({ icon: IC.users, label: `Приглашения +${c.scoring.invites.points}` });
  if (c.scoring?.reactions?.enabled) scoringTypes.push({ icon: IC.heart, label: `Реакции +${c.scoring.reactions.points}` });
  if (c.scoring?.ads?.enabled) scoringTypes.push({ icon: IC.play, label: `Реклама +${c.scoring.ads.points}` });
  if (scoringTypes.length) {
    h += `<div style="margin:12px 0;display:flex;flex-wrap:wrap;gap:4px">`;
    scoringTypes.forEach(s => {
      h += `<span class="scoring-badge">${s.icon} ${s.label}</span>`;
    });
    h += `</div>`;
  }

  // Info
  h += `<div class="section-title">Информация</div>`;
  h += `<div class="card">`;
  if (c.description) h += `<div class="info-row"><span class="info-label">Описание</span><span class="info-value">${esc(c.description)}</span></div>`;
  if (c.conditions) h += `<div class="info-row"><span class="info-label">Условия</span><span class="info-value">${esc(c.conditions)}</span></div>`;
  h += `<div class="info-row"><span class="info-label">Окончание</span><span class="info-value">${formatDate(c.end_date)}</span></div>`;
  const outcomeNames = { leaderboard: 'Лидерборд', random: 'Случайный выбор', weighted: 'Взвешенный случай' };
  h += `<div class="info-row"><span class="info-label">Определение</span><span class="info-value">${outcomeNames[c.outcome_type] || ''}</span></div>`;
  if (c.initial_points > 0) h += `<div class="info-row"><span class="info-label">Стартовые баллы</span><span class="info-value">${c.initial_points}</span></div>`;
  h += `</div>`;

  // Prizes
  if (c.prizes?.length) {
    h += `<div class="section-title">Призы</div><div class="card">`;
    c.prizes.forEach((p, i) => {
      const mc = i === 0 ? 'm1' : i === 1 ? 'm2' : i === 2 ? 'm3' : 'mn';
      h += `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i < c.prizes.length - 1 ? 'border-bottom:1px solid var(--card-border)' : ''}">`;
      h += `<div class="prize-medal ${mc}">${i + 1}</div>`;
      h += `<div><div style="font-size:15px;font-weight:700">${i + 1}-е место</div><div style="font-size:13px;color:var(--text2);margin-top:2px">${esc(p)}</div></div>`;
      h += `</div>`;
    });
    h += `</div>`;
  }

  // Leaderboard
  h += `<div class="section-title">Таблица лидеров</div>`;
  if (parts.length === 0) {
    h += `<div style="padding:32px;text-align:center;color:var(--text2);font-size:14px;background:var(--section-bg);border-radius:var(--radius-sm);border:1px solid var(--card-border)">Пока нет участников</div>`;
  } else {
    parts.forEach((p, i) => {
      const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
      const isMe = p.user_id === currentUser.id;
      const clickable = canManage ? ` data-action="openParticipant" data-pid="${p._id}" data-cid="${c._id}"` : '';
      h += `<div class="lb-item${isMe ? ' me' : ''}"${clickable}>`;
      h += `<div class="lb-rank ${rc}">${i + 1}</div>`;
      h += `<div class="lb-avatar" style="background:${getAvatarColor(p.first_name)}">${getInitials(p.first_name)}</div>`;
      h += `<div class="lb-info"><div class="lb-name">${esc(p.first_name)}</div>`;
      if (p.username) h += `<div class="lb-username">@${p.username}</div>`;
      h += `<div class="lb-stats">`;
      if (c.scoring?.invites?.enabled) h += `<div class="lb-stat">${IC.users} ${p.invites_count || 0}</div>`;
      if (c.scoring?.reactions?.enabled) h += `<div class="lb-stat">${IC.heart} ${p.reactions_count || 0}</div>`;
      if (c.scoring?.ads?.enabled) h += `<div class="lb-stat">${IC.play} ${p.ads_count || 0}</div>`;
      h += `</div></div>`;
      h += `<div class="lb-points-col"><div class="lb-points">${p.points || 0}</div><div class="lb-points-label">баллов</div></div>`;
      h += `</div>`;
    });
  }

  // Admin actions
  if (canManage) {
    h += `<div class="section-title">Управление</div>`;
    if (isActive) {
      h += `<button class="btn btn-danger" style="margin-bottom:8px" data-action="endContest" data-id="${c._id}">${IC.stop} Завершить конкурс</button>`;
    }
    h += `<button class="btn btn-secondary" data-action="deleteContest" data-id="${c._id}">${IC.trash} Удалить конкурс</button>`;
  }

  h += `<div style="height:32px"></div></div>`;
  return h;
}

// ─── PROFILE SCREEN ────────────────────────
function renderProfile() {
  let h = `<div class="app fade-up"><div class="header"><h1>Профиль</h1></div>`;

  // User card
  h += `<div class="card" style="text-align:center;padding:28px 20px">`;
  h += `<div class="lb-avatar" style="background:${getAvatarColor(currentUser.first_name)};width:72px;height:72px;font-size:26px;margin:0 auto 14px">${getInitials(currentUser.first_name)}</div>`;
  h += `<div style="font-size:22px;font-weight:900;letter-spacing:-0.3px">${esc(currentUser.first_name)}</div>`;
  if (currentUser.username) h += `<div style="font-size:14px;color:var(--text2);margin-top:4px;font-weight:500">@${currentUser.username}</div>`;
  if (currentUser.is_admin) h += `<span class="header-badge" style="margin-top:12px;display:inline-block">Администратор</span>`;
  h += `</div>`;

  // Stats
  const myParts = Object.values(state.participants).flat().filter(p => p.user_id === currentUser.id);
  const total = myParts.reduce((s, p) => s + (p.points || 0), 0);
  const totalInvites = myParts.reduce((s, p) => s + (p.invites_count || 0), 0);

  h += `<div class="stat-row">`;
  h += `<div class="stat-box"><div class="stat-box-val">${myParts.length}</div><div class="stat-box-label">Конкурсов</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${total}</div><div class="stat-box-label">Баллов</div></div>`;
  h += `<div class="stat-box"><div class="stat-box-val">${totalInvites}</div><div class="stat-box-label">Приглашений</div></div>`;
  h += `</div>`;

  // Detailed stats
  h += `<div class="section-title">Статистика</div>`;
  h += `<div class="card">`;
  h += `<div class="info-row"><span class="info-label">Telegram ID</span><span class="info-value">${currentUser.id}</span></div>`;
  h += `<div class="info-row"><span class="info-label">Реакций всего</span><span class="info-value">${totalReactions}</span></div>`;
  h += `<div class="info-row"><span class="info-label">Приглашений всего</span><span class="info-value">${totalInvites}</span></div>`;
  h += `</div>`;

  // My contests list
  if (myParts.length > 0) {
    h += `<div class="section-title">Мои конкурсы</div>`;
    myParts.forEach(p => {
      const contest = state.contests.find(c => {
        const parts = state.participants[c._id] || [];
        return parts.some(pp => pp._id === p._id);

      if (contest) {
        h += `<div class="card card-clickable" data-action="openContest" data-id="${contest._id}">`;

        h += `<div style="font-size:16px;font-weight:800">${p.points || 0} б.</div>`;
        h += `</div></div>`;
      }
    });
  }

  h += `</div>`;
  return h;
}

// ─── EVENT BINDING ─────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = el.dataset.action;

      // Navigation
      if (action === 'nav') {
        state.screen = el.dataset.screen;
        if (el.dataset.screen === 'create') {
          state.formData = { prizes: [''], outcome_type: 'leaderboard' };
        }
        state.selectedContest = null;
        render();
        window.scrollTo(0, 0);
        return;
      }
      if (action === 'goHome') {
        state.screen = 'home';
        state.selectedContest = null;
        render();
        window.scrollTo(0, 0);
        return;
      }
      if (action === 'openContest') {
        state.selectedContest = el.dataset.id;
        state.screen = 'detail';
        await loadParticipants(el.dataset.id);
        render();
        window.scrollTo(0, 0);
        return;
      }

      // Channel management
      if (action === 'addBotToChannel') {
        window.open(`https://t.me/${BOT_USERNAME}?startchannel&admin=post_messages+edit_messages+delete_messages+invite_users`, '_blank');
        return;
      }
      if (action === 'scanChannels') {
        toast('Ищем каналы...');
        await scanForChannels();
        if (state.channels.length > 0) toast(`Найдено каналов: ${state.channels.length}`);
        else toast('Каналы не найдены. Добавьте бота в канал и нажмите ещё раз', 'error');
        render();
        return;
      }
      if (action === 'selectChannel') {
        state.formData.channel_id = parseInt(el.dataset.chatid);
        state.formData.channel_title = el.dataset.title;
        state.formData.channel_username = el.dataset.username;
        render();
        return;
      }

      // Prizes
      if (action === 'addPrize') {
        collectFormData();
        state.formData.prizes = (state.formData.prizes || ['']).concat(['']);
        render();
        return;
      }
      if (action === 'removePrize') {
        collectFormData();
        const idx = parseInt(el.dataset.idx);
        state.formData.prizes.splice(idx, 1);
        render();
        return;
      }

      // Create contest
      if (action === 'submitContest') {
        collectFormData();
        const ok = await createContest(state.formData);
        if (ok) {
          await loadContests();
          for (const c of state.contests) {
            await loadParticipants(c._id);
          }
          state.screen = 'home';
          state.formData = { prizes: [''], outcome_type: 'leaderboard' };
          render();
        }
        return;
      }

      // Join contest
      if (action === 'joinContest') {
        await joinContest(el.dataset.id);
        return;
      }

      // End / Delete contest
      if (action === 'endContest') {
        await endContest(el.dataset.id);
        return;
      }
      if (action === 'deleteContest') {
        await deleteContest(el.dataset.id);
        return;
      }

      // Copy invite link
      if (action === 'copyInvite') {
        try {
          await navigator.clipboard.writeText(el.dataset.link);
          toast('Ссылка скопирована!');
        } catch {
          // Fallback
          const ta = document.createElement('textarea');
          ta.value = el.dataset.link;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          toast('Ссылка скопирована!');
        }
        return;
      }

      // Participant modal
      if (action === 'openParticipant') {
        const parts = state.participants[el.dataset.cid] || [];
        const part = parts.find(p => p._id === el.dataset.pid);
        const contest = state.contests.find(c => c._id === el.dataset.cid);
        state.modal = { type: 'participant', participant: part, contest };
        render();
        return;
      }
      if (action === 'closeModal') {
        state.modal = null;
        render();
        return;
      }

      // Add points (typed)
      if (action === 'addPoints') {
        const type = el.dataset.type;
        const inputId = type === 'invites' ? 'modal-inv' : type === 'reactions' ? 'modal-react' : 'modal-ads';
        const count = parseInt(document.getElementById(inputId)?.value) || 1;
        const contest = state.contests.find(c => c._id === el.dataset.cid);
        await addPointsToParticipant(el.dataset.pid, type, count, contest);
        return;
      }

      // Add manual points
      if (action === 'addManualPoints') {
        const count = parseInt(document.getElementById('modal-manual')?.value) || 1;
        const part = Object.values(state.participants).flat().find(p => p._id === el.dataset.pid);
        if (part) {
          const cid = el.dataset.cid;
          await fbSet('participants', el.dataset.pid, { points: (part.points || 0) + count });
          toast(`+${count} баллов вручную`);
          await loadParticipants(cid);
          const updatedPart = (state.participants[cid] || []).find(p => p._id === el.dataset.pid);
          const contest = state.contests.find(c => c._id === cid);
          if (updatedPart && contest) {
            state.modal = { type: 'participant', participant: updatedPart, contest };
          } else {
            state.modal = null;
          }
          render();
        }
        return;
      }

      // Admin tabs
      if (action === 'setAdminTab') {
        state.adminTab = el.dataset.tab;
        render();
        return;
      }
    });
  });

  // Toggle handlers for scoring settings
  const toggles = [
    { id: 'f-inv-on', key: 'invites_enabled', sub: 'inv-sub' },
    { id: 'f-react-on', key: 'reactions_enabled', sub: 'react-sub' },
    { id: 'f-ads-on', key: 'ads_enabled', sub: 'ads-sub' }
  ];
  toggles.forEach(t => {
    const el = document.getElementById(t.id);
    if (el) {
      el.addEventListener('change', () => {
        state.formData[t.key] = el.checked;
        const sub = document.getElementById(t.sub);
        if (sub) sub.classList.toggle('show', el.checked);
      });
    }
  });

  // Outcome type change
  const outcomeEl = document.getElementById('f-outcome');
  if (outcomeEl) {
    outcomeEl.addEventListener('change', () => {
      collectFormData();
      render();
    });
  }
}

// ─── COLLECT FORM DATA ────────────────────
function collectFormData() {
  const fd = state.formData;
  const get = id => document.getElementById(id);

  fd.name = get('f-name')?.value || fd.name || '';
  fd.description = get('f-desc')?.value || fd.description || '';
  fd.conditions = get('f-cond')?.value || fd.conditions || '';
  fd.end_date = get('f-date')?.value || fd.end_date || '';
  fd.button_text = get('f-btn')?.value || fd.button_text || '';
  fd.initial_points = get('f-init')?.value || fd.initial_points || 0;
  fd.outcome_type = get('f-outcome')?.value || fd.outcome_type || 'leaderboard';
  fd.threshold = get('f-thresh')?.value || fd.threshold || 0;
  fd.invites_enabled = get('f-inv-on')?.checked || false;
  fd.invites_points = get('f-inv-pts')?.value || fd.invites_points || 5;
  fd.reactions_enabled = get('f-react-on')?.checked || false;
  fd.reactions_points = get('f-react-pts')?.value || fd.reactions_points || 1;
  fd.ads_enabled = get('f-ads-on')?.checked || false;
  fd.ads_points = get('f-ads-pts')?.value || fd.ads_points || 3;

  // Collect prizes from inputs
  const prizeInputs = document.querySelectorAll('.prize-input');
  if (prizeInputs.length > 0) {
    fd.prizes = Array.from(prizeInputs).map(el => el.value);
  }
}

// ─── INITIALIZATION ────────────────────────
async function init() {
  initTg();
  await initFirebase();

  if (fbReady) {
    await loadContests();
    await loadChannels();

    // Auto-scan for channels
    await scanForChannels();

    // Load participants for all contests
    for (const c of state.contests) {
      await loadParticipants(c._id);
    }
  }

  state.loading = false;

  // Check URL params for deep link (contest detail)
  const params = new URLSearchParams(window.location.search);
  const contestId = params.get('contest');
  if (contestId) {
    state.selectedContest = contestId;
    state.screen = 'detail';
    if (fbReady) await loadParticipants(contestId);
  }

  render();
}

init();
</script>
